name: Financial Dashboard Update

on:
  schedule:
    # Daily at KST 8:30 AM (UTC 23:30 previous day), 30min after Data Keeper
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: financial-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write credentials
        run: |
          cat > .env << ENVEOF
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          ENVEOF

      - name: Generate fin_data.js
        run: python -u tools/generate_fin_data.py

      - name: Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/financial-dashboard/fin_data.js
          git diff --cached --quiet || git commit -m "auto: update financial dashboard data [skip ci]"
          git pull --rebase || true
          git push || echo "[WARN] Push failed"

      - name: Sync fin_data.js to EC2
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no \
            docs/financial-dashboard/fin_data.js \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/export_calculator/docs/financial-dashboard/fin_data.js
          echo "fin_data.js synced to EC2"
