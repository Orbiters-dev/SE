name: Financial Dashboard Update

on:
  schedule:
    # Daily at KST 8:30 AM (UTC 23:30 previous day), 30min after Data Keeper
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: financial-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write credentials
        run: |
          cat > .env << ENVEOF
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          AMZ_SP_CLIENT_ID=${{ secrets.AMZ_SP_CLIENT_ID }}
          AMZ_SP_CLIENT_SECRET=${{ secrets.AMZ_SP_CLIENT_SECRET }}
          AMZ_SP_REFRESH_TOKEN_GROSMIMI=${{ secrets.AMZ_SP_REFRESH_TOKEN_GROSMIMI }}
          ENVEOF

      - name: Generate fin_data.js
        run: python -u tools/generate_fin_data.py

      - name: Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/financial-dashboard/fin_data.js
          git diff --cached --quiet || git commit -m "auto: update financial dashboard data [skip ci]"
          git pull --rebase || true
          git push || echo "[WARN] Push failed"
