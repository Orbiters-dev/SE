name: Data Keeper - Daily Collection

on:
  schedule:
    - cron: '0 13 * * *'   # KST 22:00 (= UTC 13:00 = PST 5:00) - full daily (Amazon Ads 확정 후)
    - cron: '0 2 * * *'    # KST 11:00 (= UTC 02:00 = PST 18:00) - midday refresh
    - cron: '0 23 * * *'   # KST 8:00 AM (= UTC 23:00) - daily status email only
  workflow_dispatch:         # manual trigger
    inputs:
      channel:
        description: 'Channel to collect (all, amazon_ads, amazon_ads_search_terms, amazon_ads_keywords, amazon_brand_analytics, amazon_sales, meta, google, google_ads_search_terms, ga4, klaviyo, shopify, gsc, dataforseo)'
        required: false
        default: 'all'
      days:
        description: 'Lookback days'
        required: false
        default: '35'
      skip_pg:
        description: 'Skip PostgreSQL push (true/false)'
        required: false
        default: 'false'
      notify_only:
        description: 'Send status email only (true/false)'
        required: false
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests python-dotenv google-ads

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          AMZ_SP_CLIENT_ID=${{ secrets.AMZ_SP_CLIENT_ID }}
          AMZ_SP_CLIENT_SECRET=${{ secrets.AMZ_SP_CLIENT_SECRET }}
          AMZ_SP_REFRESH_TOKEN=${{ secrets.AMZ_SP_REFRESH_TOKEN }}
          AMZ_SP_REFRESH_TOKEN_GROSMIMI=${{ secrets.AMZ_SP_REFRESH_TOKEN_GROSMIMI }}
          AMZ_SP_REFRESH_TOKEN_FLEETERS=${{ secrets.AMZ_SP_REFRESH_TOKEN_FLEETERS }}
          AMZ_SP_REFRESH_TOKEN_ORBITOOL=${{ secrets.AMZ_SP_REFRESH_TOKEN_ORBITOOL }}
          AMZ_SP_GROSMIMI_CLIENT_ID=${{ secrets.AMZ_SP_GROSMIMI_CLIENT_ID }}
          AMZ_SP_GROSMIMI_CLIENT_SECRET=${{ secrets.AMZ_SP_GROSMIMI_CLIENT_SECRET }}
          AMZ_SP_MARKETPLACE_ID=ATVPDKIKX0DER
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GA4_CLIENT_ID=${{ secrets.GA4_CLIENT_ID }}
          GA4_CLIENT_SECRET=${{ secrets.GA4_CLIENT_SECRET }}
          GA4_REFRESH_TOKEN=${{ secrets.GA4_REFRESH_TOKEN }}
          GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}
          KLAVIYO_API_KEY=${{ secrets.KLAVIYO_API_KEY }}
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD=${{ secrets.DATAFORSEO_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          DATA_KEEPER_RECIPIENT=${{ secrets.DATA_KEEPER_RECIPIENT }}
          ENVEOF
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^[[:space:]]*//' .env

      - name: Install additional deps
        run: |
          pip install --quiet openpyxl \
            google-auth google-auth-oauthlib google-api-python-client

      - name: Write PayPal credentials
        run: |
          echo "PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }}" >> .env
          echo "PAYPAL_SECRET=${{ secrets.PAYPAL_SECRET }}" >> .env

      - name: Write credential files
        run: |
          mkdir -p credentials
          echo '${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Determine run mode
        id: mode
        run: |
          CRON="${{ github.event.schedule }}"
          NOTIFY_ONLY="${{ github.event.inputs.notify_only || 'false' }}"
          if [ "$CRON" = "0 23 * * *" ] || [ "$NOTIFY_ONLY" = "true" ]; then
            echo "notify_only=true" >> $GITHUB_OUTPUT
          else
            echo "notify_only=false" >> $GITHUB_OUTPUT
          fi
          # KST 22:00 (UTC 13:00) = main daily → send full email to all@
          if [ "$CRON" = "0 13 * * *" ]; then
            echo "is_daily=true" >> $GITHUB_OUTPUT
          else
            echo "is_daily=false" >> $GITHUB_OUTPUT
          fi

      - name: Send daily status email (KST 8 AM)
        if: steps.mode.outputs.notify_only == 'true'
        run: |
          python -u tools/data_keeper.py --notify-only --notify-to "wj.choi@orbiters.co.kr"

      - name: Run Data Keeper
        if: steps.mode.outputs.notify_only == 'false'
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'all' }}"
          DAYS="${{ github.event.inputs.days || '35' }}"
          SKIP_PG="${{ github.event.inputs.skip_pg || 'false' }}"
          CMD="python -u tools/data_keeper.py --channel $CHANNEL --days $DAYS"
          if [ "$SKIP_PG" = "true" ]; then CMD="$CMD --skip-pg"; fi
          # Only the main daily schedule (KST 22:00) sends email; manual dispatch = no email
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.mode.outputs.is_daily }}" = "true" ]; then
            CMD="$CMD --notify"
          fi
          $CMD

      - name: Run PayPal fetch
        if: steps.mode.outputs.notify_only == 'false' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all')
        run: |
          cd tools && python -u fetch_paypal_transactions.py || echo "PayPal fetch failed (non-fatal)"

      - name: Run influencer orders fetch
        if: steps.mode.outputs.notify_only == 'false' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all')
        run: |
          cd tools && python -u fetch_influencer_orders.py || echo "Influencer orders fetch failed (non-fatal)"

      - name: Collect Amazon Ads Keywords & Search Terms
        if: steps.mode.outputs.notify_only == 'false' && steps.mode.outputs.is_daily == 'true' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all' || github.event.inputs.channel == 'amazon_ads_search_terms' || github.event.inputs.channel == 'amazon_ads_keywords')
        run: |
          python -u tools/data_keeper.py --channel amazon_ads_search_terms --days 14 || echo "Search terms collection failed (non-fatal)"
          python -u tools/data_keeper.py --channel amazon_ads_keywords --days 14 || echo "Keywords collection failed (non-fatal)"

      - name: Collect Google Ads Search Terms
        if: steps.mode.outputs.notify_only == 'false' && steps.mode.outputs.is_daily == 'true' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all' || github.event.inputs.channel == 'google_ads_search_terms')
        run: |
          python -u tools/data_keeper.py --channel google_ads_search_terms --days 14 || echo "Google Ads search terms collection failed (non-fatal)"

      - name: Collect Amazon Brand Analytics
        if: steps.mode.outputs.notify_only == 'false' && steps.mode.outputs.is_daily == 'true' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all' || github.event.inputs.channel == 'amazon_brand_analytics')
        run: |
          python -u tools/data_keeper.py --channel amazon_brand_analytics --days 35 || echo "Brand Analytics collection failed (non-fatal)"

      - name: Run Amazon PPC Analysis
        if: steps.mode.outputs.notify_only == 'false' && (github.event.inputs.channel == '' || github.event.inputs.channel == 'all' || github.event.inputs.channel == 'amazon_ads')
        run: |
          python -u tools/run_amazon_ppc_daily.py --dry-run || echo "PPC analysis failed (non-fatal)"

      - name: Upload cache as artifact
        if: always() && steps.mode.outputs.notify_only == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: datakeeper-cache
          path: |
            .tmp/datakeeper/*.json
            .tmp/polar_data/q10_influencer_orders.json
            .tmp/polar_data/q11_paypal_transactions.json
            .tmp/ppc_report_*.html
            .tmp/ppc_payload_*.json
          retention-days: 7
