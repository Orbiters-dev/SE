name: Amazon PPC Pipeline

on:
  schedule:
    - cron: '30 22 * * *'   # KST 07:30 (= UTC 22:30) - propose + auto-execute tier 1-2
  workflow_dispatch:

jobs:
  ppc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            gspread

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH=credentials/google_sa.json
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write Google SA credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_sa.json

      - name: Write autopilot config
        run: |
          mkdir -p .tmp
          cat > .tmp/dashboard_config_override.json << 'CFGEOF'
          {
            "naeiae": {"daily_budget":180,"target_roas":2.5,"manual_acos":25,"auto_acos":35,"max_bid":3,"max_campaign":50},
            "grosmimi": {"daily_budget":3000,"target_roas":2.5,"manual_acos":20,"auto_acos":30,"max_bid":3,"max_campaign":50},
            "chaenmom": {"daily_budget":150,"target_roas":2.5,"manual_acos":30,"auto_acos":40,"max_bid":3,"max_campaign":50},
            "_autopilot": {
              "naeiae":    {"tier1":"auto","tier2":"auto","tier3":"approve","tier4":"off"},
              "grosmimi":  {"tier1":"approve","tier2":"approve","tier3":"approve","tier4":"off"},
              "chaenmom":  {"tier1":"auto","tier2":"auto","tier3":"approve","tier4":"off"}
            }
          }
          CFGEOF
          sed -i 's/^[[:space:]]*//' .tmp/dashboard_config_override.json

      - name: Run Daily Report
        run: python -u tools/run_amazon_ppc_daily.py
        continue-on-error: true

      - name: Run Propose + Auto-Execute (tier 1-2)
        run: |
          python -u tools/amazon_ppc_executor.py \
            --propose \
            --auto-execute \
            --no-email

      - name: Upload proposal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppc-proposal-latest
          path: .tmp/
          retention-days: 3
          overwrite: true
          include-hidden-files: true
