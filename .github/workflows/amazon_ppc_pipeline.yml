name: Amazon PPC Pipeline

on:
  schedule:
    - cron: '30 14 * * *'   # KST 23:30 (= UTC 14:30) - daily report + propose
    - cron: '30 22 * * *'   # KST 07:30 (= UTC 22:30) - send proposal email
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: propose / send-email / both'
        required: false
        default: 'both'

jobs:
  ppc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            gspread

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${INPUT_MODE:-both}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "14" ]; then
            echo "mode=propose" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "22" ]; then
            echo "mode=send-email" >> $GITHUB_OUTPUT
          else
            echo "mode=both" >> $GITHUB_OUTPUT
          fi

      - name: Restore proposal cache
        if: steps.mode.outputs.mode == 'send-email'
        uses: actions/cache/restore@v4
        with:
          path: .tmp/
          key: ppc-proposal-${{ runner.os }}-${{ github.run_id }}
          restore-keys: ppc-proposal-${{ runner.os }}-

      - name: Run Daily Report
        if: steps.mode.outputs.mode == 'propose' || steps.mode.outputs.mode == 'both'
        run: python -u tools/run_amazon_ppc_daily.py
        continue-on-error: true

      - name: Run Propose (no email)
        if: steps.mode.outputs.mode == 'propose' || steps.mode.outputs.mode == 'both'
        run: |
          mkdir -p .tmp
          python -u tools/amazon_ppc_executor.py \
            --propose \
            --no-email \
            --to "${{ secrets.PPC_REPORT_RECIPIENT }}" \
            --cc "mj.lee@orbiters.co.kr"

      - name: Save proposal cache
        if: (steps.mode.outputs.mode == 'propose' || steps.mode.outputs.mode == 'both') && always()
        uses: actions/cache/save@v4
        with:
          path: .tmp/
          key: ppc-proposal-${{ runner.os }}-${{ github.run_id }}

      - name: Send Proposal Email (KST 07:30)
        if: steps.mode.outputs.mode == 'send-email' || steps.mode.outputs.mode == 'both'
        run: |
          python -u tools/amazon_ppc_executor.py \
            --send-email \
            --to "${{ secrets.PPC_REPORT_RECIPIENT }}" \
            --cc "mj.lee@orbiters.co.kr"
