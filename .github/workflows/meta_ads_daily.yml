name: Meta Ads Daily Report

on:
  schedule:
    - cron: '0 8 * * *'    # 매일 PST 00:00 (= 08:00 UTC)
    - cron: '0 20 * * *'   # 매일 PST 12:00 (= 20:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  meta-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          META_REPORT_RECIPIENT=${{ secrets.META_REPORT_RECIPIENT || secrets.PPC_REPORT_RECIPIENT }}
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          ZEZEBAEBAE_GMAIL_TOKEN_PATH=credentials/zezebaebae_gmail_token.json
          GMAIL_SENDER=hello@zezebaebae.com
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/zezebaebae_gmail_token.json

      - name: Run Meta Ads Daily Report
        run: python -u tools/run_meta_ads_daily.py
