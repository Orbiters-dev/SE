name: KPI Weekly Report

on:
  schedule:
    - cron: '0 23 * * 0'   # 매주 월요일 KST 08:00 (= 일요일 23:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  kpi-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            openpyxl \
            python-dateutil \
            gspread \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            pandera \
            pandas

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Run KPI Weekly Report (골만이 Squad Pipeline)
        run: python -u tools/run_kpi_monthly.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-validation-report
          path: .tmp/validation_report.json
          retention-days: 30
