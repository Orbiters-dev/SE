name: Wednesday IG Competitor Scrape + Analysis

on:
  schedule:
    # Every Wednesday 10:00 KST (= 01:00 UTC)
    - cron: "0 1 * * 3"
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  competitor-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Firecrawl CLI
        run: npm install -g firecrawl-cli

      - name: Set up Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Scrape competitor IG profiles
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python tools/scrape_ig_competitor.py

      - name: Run competitor IG analysis (Excel + email)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GMAIL_OAUTH_CREDENTIALS_PATH: credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH: credentials/gmail_token.json
          GMAIL_SENDER: orbiters11@gmail.com
        run: |
          python tools/weekly_ig_competitor_analysis.py
