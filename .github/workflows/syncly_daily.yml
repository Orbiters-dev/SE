name: Syncly Daily Crawl + Sync

on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00 (= 23:00 UTC previous day)
  workflow_dispatch:        # manual trigger
    inputs:
      region:
        description: 'Region to crawl (us, jp, all)'
        required: false
        default: 'us'
      skip_crawl:
        description: 'Skip crawl, only sync sheets (true/false)'
        required: false
        default: 'false'

jobs:
  syncly-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            gspread \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            playwright
          playwright install chromium
          sudo apt-get install -y xvfb

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Write Syncly storage state
        run: |
          mkdir -p /tmp/syncly_state
          echo '${{ secrets.SYNCLY_STORAGE_STATE }}' > /tmp/syncly_state/browser_state.json

      - name: Crawl Syncly (US)
        id: crawl_us
        if: ${{ github.event.inputs.skip_crawl != 'true' && (github.event.inputs.region == 'us' || github.event.inputs.region == 'all' || github.event.inputs.region == '') }}
        env:
          SYNCLY_STORAGE_STATE_PATH: /tmp/syncly_state/browser_state.json
        run: |
          xvfb-run --auto-servernum python -u tools/fetch_syncly_export.py --region us
        continue-on-error: true

      - name: Crawl Syncly (JP)
        id: crawl_jp
        if: ${{ github.event.inputs.skip_crawl != 'true' && (github.event.inputs.region == 'jp' || github.event.inputs.region == 'all') }}
        env:
          SYNCLY_STORAGE_STATE_PATH: /tmp/syncly_state/browser_state.json
        run: |
          xvfb-run --auto-servernum python -u tools/fetch_syncly_export.py --region jp
        continue-on-error: true

      - name: Sync to Google Sheets
        id: sync_sheets
        if: steps.crawl_us.outcome == 'success' || steps.crawl_jp.outcome == 'success' || github.event.inputs.skip_crawl == 'true'
        run: python -u tools/sync_syncly_to_sheets.py
        continue-on-error: true

      - name: Fetch Shopify influencer orders
        run: python -u tools/fetch_influencer_orders.py
        continue-on-error: true

      - name: Sync SNS Tab (Grosmimi)
        id: sns_gros
        run: python -u tools/sync_sns_tab.py || echo "SNS sync failed (non-fatal)"

      - name: Sync SNS Tab (CHA&MOM)
        run: python -u tools/sync_sns_tab_chaenmom.py || echo "CHA&MOM sync failed (non-fatal)"

      - name: Sync SNS Tab (JP)
        run: python -u tools/sync_sns_tab_jp.py || echo "JP sync failed (non-fatal)"

      - name: Build report body
        id: report
        if: always()
        run: |
          if [ -f .tmp/sns_sync_summary.json ]; then
            TOTAL_NEW=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['total_new'])")
            MATCHED_NEW=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['content_matched_new'])")
            NEW_SHIP=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['new_shipments_count'])")
            NEW_MATCH=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['newly_matched_count'])")
            TOTAL_OLD=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['total_old'])")
            MATCHED_OLD=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d['diff']['content_matched_old'])")
            # Build new shipments list
            SHIP_LIST=$(python -c "
          import json
          d=json.load(open('.tmp/sns_sync_summary.json'))
          for s in d['diff']['new_shipments'][:10]:
              icon='[CONTENT]' if s['has_content'] else '[PENDING]'
              print(f\"  {icon} {s['name']} ({s['account']}) - shipped {s['ship_date']}\")
          if len(d['diff']['new_shipments'])>10: print(f\"  ... +{len(d['diff']['new_shipments'])-10} more\")
          ")
            # Build newly matched list
            MATCH_LIST=$(python -c "
          import json
          d=json.load(open('.tmp/sns_sync_summary.json'))
          for m in d['diff']['newly_matched'][:10]:
              print(f\"  [NEW LINK] {m['name']} ({m['account']})\")
          if len(d['diff']['newly_matched'])>10: print(f\"  ... +{len(d['diff']['newly_matched'])-10} more\")
          ")
            BODY="Grosmimi Content Tracker Daily Report"
            BODY="$BODY\n\n== Pipeline Status =="
            BODY="$BODY\nCrawl US: ${{ steps.crawl_us.outcome }}"
            BODY="$BODY\nCrawl JP: ${{ steps.crawl_jp.outcome || 'skipped' }}"
            BODY="$BODY\nSheet Sync: ${{ steps.sync_sheets.outcome }}"
            BODY="$BODY\nSNS Sync: ${{ steps.sns_gros.outcome }}"
            BODY="$BODY\n\n== SNS Tab Summary =="
            BODY="$BODY\nTotal rows: $TOTAL_OLD -> $TOTAL_NEW"
            BODY="$BODY\nContent matched: $MATCHED_OLD -> $MATCHED_NEW"
            BODY="$BODY\nNew sample shipments: +$NEW_SHIP"
            BODY="$BODY\nNewly matched content: +$NEW_MATCH"
            if [ -n "$SHIP_LIST" ]; then
              BODY="$BODY\n\n-- New Sample Shipments --\n$SHIP_LIST"
            fi
            if [ -n "$MATCH_LIST" ]; then
              BODY="$BODY\n\n-- Newly Matched Content --\n$MATCH_LIST"
            fi
            # Cross-check validation
            XC_TOTAL=$(python -c "import json; d=json.load(open('.tmp/sns_sync_summary.json')); print(d.get('cross_check',{}).get('total_issues',0))" 2>/dev/null || echo "0")
            if [ "$XC_TOTAL" != "0" ]; then
              XC_DETAIL=$(python -c "
          import json
          d=json.load(open('.tmp/sns_sync_summary.json'))
          labels={'content_link_no_profile':'Link but no Profile URL','metrics_no_link':'Metrics but no Link','account_no_profile':'Account but no Profile','profile_no_account':'Profile but no Account','link_account_mismatch':'Link/Account mismatch','channel_link_mismatch':'Channel/Link mismatch','link_no_metrics':'Link but no metrics','channel_profile_mismatch':'Channel/Profile mismatch'}
          for k,v in d.get('cross_check',{}).get('issues',{}).items():
              print(f\"  [{v['count']}] {labels.get(k,k)}\")
          ")
              BODY="$BODY\n\n== Cross-Check Validation =="
              BODY="$BODY\n[WARNING] $XC_TOTAL issues found:"
              BODY="$BODY\n$XC_DETAIL"
            else
              BODY="$BODY\n\n== Cross-Check =="
              BODY="$BODY\nAll checks passed."
            fi
            BODY="$BODY\n\nGrosmimi SNS: https://docs.google.com/spreadsheets/d/1SwO4uAbf25vOR0UYWOUlxzy5gCbFRrNXwO2kAWydyeA"
            BODY="$BODY\nD+60 Tracker: https://docs.google.com/spreadsheets/d/1bOXrARt8wx_YeKyXMlAS1nKzkZBypeaSilI6xDg4_Tc"
            echo "REPORT_BODY<<EOFBODY" >> $GITHUB_OUTPUT
            echo -e "$BODY" >> $GITHUB_OUTPUT
            echo "EOFBODY" >> $GITHUB_OUTPUT
          else
            echo "REPORT_BODY=Syncly pipeline completed but no summary data available.\nCrawl US: ${{ steps.crawl_us.outcome }}\nSheet Sync: ${{ steps.sync_sheets.outcome }}" >> $GITHUB_OUTPUT
          fi

      - name: Send success email
        if: steps.crawl_us.outcome == 'success' && steps.sync_sheets.outcome == 'success'
        run: |
          python -u tools/send_gmail.py \
            --to "wj.choi@orbiters.co.kr" \
            --subject "[Grosmimi Content Tracker] Daily Report $(date -u +%Y-%m-%d)" \
            --body "${{ steps.report.outputs.REPORT_BODY }}"
        continue-on-error: true

      - name: Send failure email
        if: steps.crawl_us.outcome == 'failure'
        run: |
          python -u tools/send_gmail.py \
            --to "wj.choi@orbiters.co.kr" \
            --subject "[Syncly] CRAWL FAILED - session expired? $(date -u +%Y-%m-%d)" \
            --body "Syncly crawl failed. Session likely expired.\n\nPlease re-login locally:\n  python tools/fetch_syncly_export.py --login\n\nThen update GitHub secret SYNCLY_STORAGE_STATE with contents of:\n  ~/.syncly_state/browser_state.json"
        continue-on-error: true

      - name: Upload crawl data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syncly-crawl-${{ github.run_id }}
          path: |
            Data Storage/syncly/*.csv
          retention-days: 7
