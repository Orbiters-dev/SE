name: Apify Content Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # KST Daily 08:00 (= UTC 23:00)
  workflow_dispatch:
    inputs:
      region:
        description: 'Region (us, jp, all)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run - skip API calls (true/false)'
        required: false
        default: 'false'

jobs:
  apify-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            gspread \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            apify-client \
            psycopg2-binary

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          META_GRAPH_IG_TOKEN=${{ secrets.META_GRAPH_IG_TOKEN }}
          IG_BUSINESS_USER_ID_ONZENNA=${{ secrets.IG_BUSINESS_USER_ID_ONZENNA }}
          IG_BUSINESS_USER_ID_GROSMIMI_USA=${{ secrets.IG_BUSINESS_USER_ID_GROSMIMI_USA }}
          IG_BUSINESS_USER_ID_GROSMIMI_JP=${{ secrets.IG_BUSINESS_USER_ID_GROSMIMI_JP }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Restore .tmp state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .tmp/content_detection_log.json
          key: tmp-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: tmp-state-${{ runner.os }}-

      - name: Create data directory
        run: |
          mkdir -p "Data Storage/apify"
          mkdir -p ".tmp/polar_data"

      - name: Run Apify pipeline
        id: pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          REGION="${{ github.event.inputs.region || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python -u tools/fetch_apify_content.py --daily --region $REGION"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Fetch Shopify influencer orders
        id: fetch_orders
        run: python -u tools/fetch_influencer_orders.py
        continue-on-error: true

      - name: Sync US SNS Tab (Shopify + Apify)
        id: sns_us
        run: python -u tools/sync_sns_tab.py || echo "US SNS sync failed (non-fatal)"
        continue-on-error: true

      - name: Sync CHA&MOM SNS Tab
        id: sns_chaenmom
        run: python -u tools/sync_sns_tab_chaenmom.py || echo "CHA&MOM SNS sync failed (non-fatal)"
        continue-on-error: true

      - name: Sync full Sheet data to PostgreSQL
        id: sync_pg
        run: python -u tools/fetch_apify_content.py --sync-pg --region all
        continue-on-error: true

      - name: JP Ambassador Discovery (hashtag crawl)
        id: jp_ambassador
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python -u tools/discover_jp_ambassadors.py \
            --tier 1 \
            --max-per-hashtag 30 \
            --min-followers 1000 \
            --max-followers 500000 \
            --top 50
        continue-on-error: true

      - name: Import JP discovery creators to pipeline
        id: jp_discovery
        run: |
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/import-discovery/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "days": 7, "limit": 200, "source": "ambassador_discovery"}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP Discovery] created: {d.get(\"created\",0)}, skipped: {d.get(\"skipped\",0)}')" \
            || echo "[JP Discovery] import failed (non-fatal)"
        continue-on-error: true

      - name: Trigger JP CI pipeline (Whisper transcripts)
        id: jp_ci
        run: |
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/run-ci/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "max": 20, "min_views": 3000}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP CI] {d.get(\"status\",\"?\")} pid={d.get(\"pid\",\"?\")} max={d.get(\"max\",\"?\")} min_views={d.get(\"min_views\",\"?\")}')" \
            || echo "[JP CI] trigger failed (non-fatal)"
        continue-on-error: true

      - name: Sync JP transcripts to pipeline creators
        id: jp_sync_transcripts
        run: |
          sleep 120  # wait 2 min for CI pipeline to process some posts
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/sync-transcripts/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "limit": 300, "min_length": 20}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP Transcripts] updated: {d.get(\"updated\",0)}, checked: {d.get(\"checked\",0)}, matched: {d.get(\"matched\",0)}')" \
            || echo "[JP Transcripts] sync failed (non-fatal)"
        continue-on-error: true

      - name: Weekly JP Reels Scraper (IG + TikTok)
        id: weekly_reels
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
          if [ "$DOW" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -u tools/weekly_reels_scraper.py --min-views 5000
          else
            echo "[SKIP] Weekly reels scraper runs on Mondays only (today: DOW=$DOW)"
          fi
        continue-on-error: true

      - name: Update USA_LLM tab + Content Intelligence
        id: usa_llm
        run: python -u tools/update_usa_llm.py
        continue-on-error: true

      - name: Build and send daily report
        id: report
        if: always()
        run: |
          python -u tools/build_apify_report.py
          python -u tools/send_gmail.py \
            --to "wj.choi@orbiters.co.kr" \
            --subject "[Apify+SNS] Daily Report $(date -u +%Y-%m-%d)" \
            --body-file ".tmp/apify_report.html"
        env:
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          ORDERS_OUTCOME:   ${{ steps.fetch_orders.outcome }}
          SNS_OUTCOME:      ${{ steps.sns_us.outcome }}
          USA_LLM_OUTCOME:  ${{ steps.usa_llm.outcome }}
        continue-on-error: true

      - name: Save .tmp state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .tmp/content_detection_log.json
          key: tmp-state-${{ runner.os }}-${{ github.run_id }}

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-data-${{ github.run_id }}
          path: |
            Data Storage/apify/*.json
          retention-days: 7
