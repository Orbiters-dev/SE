name: Apify Content Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00 (= UTC 23:00 previous day)
  workflow_dispatch:
    inputs:
      region:
        description: 'Region (us, jp, all)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run - skip API calls (true/false)'
        required: false
        default: 'false'

jobs:
  apify-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            gspread \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            apify-client

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Create data directory
        run: |
          mkdir -p "Data Storage/apify"
          mkdir -p ".tmp/polar_data"

      - name: Run Apify pipeline
        id: pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          REGION="${{ github.event.inputs.region || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python -u tools/fetch_apify_content.py --daily --region $REGION"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Fetch Shopify influencer orders
        id: fetch_orders
        run: python -u tools/fetch_influencer_orders.py
        continue-on-error: true

      - name: Migrate Syncly posts to Apify sheet
        id: migrate_syncly
        run: python -u tools/migrate_syncly_to_apify.py --region us || echo "Migrate failed (non-fatal)"
        continue-on-error: true

      - name: Sync Grosmimi US SNS Tab (Apify-based)
        id: sns_grosmimi
        run: python -u tools/sync_sns_tab_grosmimi.py || echo "SNS Grosmimi sync failed (non-fatal)"
        continue-on-error: true

      - name: Update USA_LLM tab + detect highlights
        id: usa_llm
        run: python -u tools/update_usa_llm.py || echo "USA_LLM update failed (non-fatal)"
        continue-on-error: true

      - name: Build and send daily report
        id: report
        if: always()
        run: |
          python -u - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          pipeline  = os.environ.get("PIPELINE_OUTCOME", "unknown")
          orders    = os.environ.get("ORDERS_OUTCOME", "unknown")
          migrate   = os.environ.get("MIGRATE_OUTCOME", "unknown")
          sns       = os.environ.get("SNS_OUTCOME", "unknown")
          llm       = os.environ.get("LLM_OUTCOME", "unknown")

          lines = []

          # === HIGHLIGHTS (상단 강조) ===
          hl_path = Path(".tmp/usa_llm_highlights.json")
          highlights = []
          total_creators = 0
          if hl_path.exists():
              hd = json.loads(hl_path.read_text(encoding="utf-8"))
              highlights = hd.get("highlights", [])
              total_creators = hd.get("total_creators", 0)

          if highlights:
              lines += ["== HIGHLIGHTS (Apify US Posts Master 기준) =="]
              for h in highlights:
                  lines.append(f"  @{h['username']} ({h.get('nickname','')})  [{h.get('date','')}]")
                  for r in h["reasons"]:
                      lines.append(f"    - {r}")
                  if h.get("url"):
                      lines.append(f"    {h['url']}")
              lines.append("")

          # === HEADER ===
          lines += [f"[Apify+SNS Daily] {datetime.utcnow().strftime('%Y-%m-%d')} KST 08:00",
                    "", "== Pipeline Status ==",
                    f"Apify Crawl:        {pipeline}",
                    f"Fetch Orders:       {orders}",
                    f"Syncly Migration:   {migrate}",
                    f"Grosmimi SNS Sync:  {sns}",
                    f"USA_LLM Update:     {llm}"]

          # === SNS SUMMARY ===
          sns_path = Path(".tmp/apify_sns_summary.json")
          if sns_path.exists():
              d = json.loads(sns_path.read_text(encoding="utf-8"))
              lines += ["", "== Grosmimi US SNS Tab ==",
                        f"Shopify PR 인플루언서: {d['total_influencers']}명",
                        f"신규 추가:             {d['new_count']}명  (링크 있음: {d['with_content']}명)",
                        f"기존 업데이트:         {d['update_count']}명"]

          # === USA_LLM SUMMARY ===
          if total_creators:
              lines += ["", "== USA_LLM ==",
                        f"크리에이터: {total_creators}명  |  하이라이트: {len(highlights)}건"]

          # === LINKS ===
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          lines += ["", "== Links ==",
                    "Grosmimi SNS: https://docs.google.com/spreadsheets/d/1SwO4uAbf25vOR0UYWOUlxzy5gCbFRrNXwO2kAWydyeA",
                    "Apify Sheet:  https://docs.google.com/spreadsheets/d/1mYofqMBYqIHS3XNQ29vDA__SzYBfkkGCPn3Jb8OxAkY",
                    f"Actions:      https://github.com/{repo}/actions/runs/{run_id}"]

          body = "\n".join(lines)
          Path(".tmp/apify_report.txt").write_text(body, encoding="utf-8")
          print(body)
          PYEOF
        env:
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          ORDERS_OUTCOME:   ${{ steps.fetch_orders.outcome }}
          MIGRATE_OUTCOME:  ${{ steps.migrate_syncly.outcome }}
          SNS_OUTCOME:      ${{ steps.sns_grosmimi.outcome }}
          LLM_OUTCOME:      ${{ steps.usa_llm.outcome }}
        continue-on-error: true

      - name: Send daily report email
        if: always()
        run: |
          BODY=$(cat .tmp/apify_report.txt 2>/dev/null || echo "Apify pipeline finished. Check Actions for details.")
          python -u tools/send_gmail.py \
            --to "wj.choi@orbiters.co.kr" \
            --subject "[Apify+SNS] Daily Report $(date -u +%Y-%m-%d)" \
            --body "$BODY"
        continue-on-error: true

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-data-${{ github.run_id }}
          path: |
            Data Storage/apify/*.json
          retention-days: 7
