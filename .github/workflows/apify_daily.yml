name: Apify Content Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # KST Daily 08:00 (= UTC 23:00)
    - cron: '0 22 * * 0'   # KST Monday 07:00 (= UTC Sunday 22:00) — weekly reels
  workflow_dispatch:
    inputs:
      region:
        description: 'Region (us, jp, all)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run - skip API calls (true/false)'
        required: false
        default: 'false'

jobs:
  apify-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            gspread \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            apify-client \
            psycopg2-binary \
            openpyxl

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          APIFY_API_TOKEN=${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          META_GRAPH_IG_TOKEN=${{ secrets.META_GRAPH_IG_TOKEN }}
          IG_BUSINESS_USER_ID_ONZENNA=${{ secrets.IG_BUSINESS_USER_ID_ONZENNA }}
          IG_BUSINESS_USER_ID_GROSMIMI_USA=${{ secrets.IG_BUSINESS_USER_ID_GROSMIMI_USA }}
          IG_BUSINESS_USER_ID_GROSMIMI_JP=${{ secrets.IG_BUSINESS_USER_ID_GROSMIMI_JP }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/google_service_account.json
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Restore .tmp state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .tmp/content_detection_log.json
          key: tmp-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: tmp-state-${{ runner.os }}-

      - name: Create data directory
        run: |
          mkdir -p "Data Storage/apify"
          mkdir -p ".tmp/polar_data"

      - name: Run Apify pipeline
        id: pipeline
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          REGION="${{ github.event.inputs.region || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python -u tools/fetch_apify_content.py --daily --region $REGION"
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Fetch Shopify influencer orders
        id: fetch_orders
        run: python -u tools/fetch_influencer_orders.py
        continue-on-error: true

      - name: Sync US SNS Tab (Shopify + Apify)
        id: sns_us
        run: python -u tools/sync_sns_tab.py || echo "US SNS sync failed (non-fatal)"
        continue-on-error: true

      - name: Sync CHA&MOM SNS Tab
        id: sns_chaenmom
        run: python -u tools/sync_sns_tab_chaenmom.py || echo "CHA&MOM SNS sync failed (non-fatal)"
        continue-on-error: true

      - name: Sync full Sheet data to PostgreSQL
        id: sync_pg
        run: python -u tools/fetch_apify_content.py --sync-pg --region all
        continue-on-error: true

      - name: JP Ambassador Discovery (hashtag crawl)
        id: jp_ambassador
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python -u tools/discover_jp_ambassadors.py \
            --tier 1 \
            --max-per-hashtag 30 \
            --min-followers 1000 \
            --max-followers 500000 \
            --top 50
        continue-on-error: true

      - name: Import JP discovery creators to pipeline
        id: jp_discovery
        run: |
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/import-discovery/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "days": 7, "limit": 200, "source": "ambassador_discovery"}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP Discovery] created: {d.get(\"created\",0)}, skipped: {d.get(\"skipped\",0)}')" \
            || echo "[JP Discovery] import failed (non-fatal)"
        continue-on-error: true

      - name: Trigger JP CI pipeline (Whisper transcripts)
        id: jp_ci
        run: |
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/run-ci/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "max": 20, "min_views": 3000}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP CI] {d.get(\"status\",\"?\")} pid={d.get(\"pid\",\"?\")} max={d.get(\"max\",\"?\")} min_views={d.get(\"min_views\",\"?\")}')" \
            || echo "[JP CI] trigger failed (non-fatal)"
        continue-on-error: true

      - name: Sync JP transcripts to pipeline creators
        id: jp_sync_transcripts
        run: |
          sleep 120  # wait 2 min for CI pipeline to process some posts
          curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/sync-transcripts/" \
            -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            -H "Content-Type: application/json" \
            -d '{"region": "jp", "limit": 300, "min_length": 20}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[JP Transcripts] updated: {d.get(\"updated\",0)}, checked: {d.get(\"checked\",0)}, matched: {d.get(\"matched\",0)}')" \
            || echo "[JP Transcripts] sync failed (non-fatal)"
        continue-on-error: true

      - name: Weekly JP Reels Scraper (IG + TikTok)
        id: weekly_reels
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          DOW=$(date -u +%u)  # UTC: 1=Mon...7=Sun — cron runs UTC 23:00 = KST next day 08:00
          # UTC Sunday(7) = KST Monday 08:00
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -u tools/weekly_reels_scraper.py --min-views 5000
          else
            echo "[SKIP] Weekly reels scraper runs KST Mondays only (UTC DOW=$DOW)"
          fi
        continue-on-error: true

      - name: Weekly Deep Crawl — fill CRM transcript gaps (JP IG + TT)
        id: weekly_deep_crawl
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ORBITOOLS_USER: ${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS: ${{ secrets.ORBITOOLS_PASS }}
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "=== Extracting JP CRM handles missing transcripts ==="
            python3 -c "
import requests, warnings, os
warnings.filterwarnings('ignore')
AUTH = (os.environ['ORBITOOLS_USER'], os.environ['ORBITOOLS_PASS'])
BASE = 'https://orbitools.orbiters.co.kr/api/onzenna'
r = requests.get(f'{BASE}/pipeline/creators/', params={'region':'jp','limit':500}, auth=AUTH, verify=False, timeout=30)
crm = r.json().get('results', [])
ig = [c['ig_handle'] for c in crm if c.get('ig_handle') and (not c.get('top_post_transcript') or len(c.get('top_post_transcript',''))<10) and 'tiktok' not in (c.get('platform') or '').lower()]
tt = [c.get('tiktok_handle') or c.get('ig_handle','') for c in crm if (c.get('tiktok_handle') or c.get('ig_handle')) and (not c.get('top_post_transcript') or len(c.get('top_post_transcript',''))<10) and 'tiktok' in (c.get('platform') or '').lower()]
with open('.tmp/jp_ig_gap.txt','w') as f: f.write('\n'.join(ig))
with open('.tmp/jp_tt_gap.txt','w') as f: f.write('\n'.join(tt))
print(f'IG gaps: {len(ig)}, TT gaps: {len(tt)}')
"
            mkdir -p .tmp/deep_crawler/output
            # IG deep crawl
            if [ -s .tmp/jp_ig_gap.txt ]; then
              python -u tools/deep_crawler.py \
                --handles-file .tmp/jp_ig_gap.txt \
                --max-posts 3 --pg-sync --platform instagram \
                --output .tmp/deep_crawler/output/weekly_jp_ig.xlsx \
                || echo "[Deep Crawl IG] failed (non-fatal)"
            fi
            # TT deep crawl
            if [ -s .tmp/jp_tt_gap.txt ]; then
              python -u tools/deep_crawler.py \
                --handles-file .tmp/jp_tt_gap.txt \
                --max-posts 3 --pg-sync --platform tiktok \
                --output .tmp/deep_crawler/output/weekly_jp_tt.xlsx \
                || echo "[Deep Crawl TT] failed (non-fatal)"
            fi
          else
            echo "[SKIP] Weekly deep crawl runs KST Mondays only (UTC DOW=$DOW)"
          fi
        continue-on-error: true

      - name: Weekly transcript sync after deep crawl (JP + US)
        id: weekly_transcript_sync
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "=== Import new discoveries ==="
            curl -sf -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
              -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/import-discovery/" \
              -H "Content-Type: application/json" \
              -d '{"region":"jp","limit":200,"days":7,"source":"apify_discovery"}' \
              && echo "[JP import OK]" || echo "[JP import failed]"
            echo "=== Sync transcripts JP ==="
            curl -sf -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
              -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/sync-transcripts/" \
              -H "Content-Type: application/json" \
              -d '{"region":"jp","limit":500}' \
              && echo "[JP transcript sync OK]" || echo "[JP transcript sync failed]"
            echo "=== Sync transcripts US ==="
            curl -sf -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
              -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/creators/sync-transcripts/" \
              -H "Content-Type: application/json" \
              -d '{"region":"us","limit":500}' \
              && echo "[US transcript sync OK]" || echo "[US transcript sync failed]"
          else
            echo "[SKIP] Weekly transcript sync runs KST Mondays only"
          fi
        continue-on-error: true

      - name: US Weekly Baby Content Report (Scrape + Excel + Email)
        id: us_weekly_report
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST || '172.31.13.240' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'orbit1234' }}
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -u tools/us_weekly_report.py \
              --days 7 \
              --min-views 5000 \
              --max-creators 100 \
              --max-ci 50 \
              --skip-ci \
              --to "wj.choi@orbiters.co.kr"
          else
            echo "[SKIP] US weekly report runs KST Mondays only (UTC DOW=$DOW)"
          fi
        continue-on-error: true

      - name: Trigger US CI scoring on EC2 (Whisper + Vision + Score)
        id: us_ci
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl -s -X POST "https://orbitools.orbiters.co.kr/api/onzenna/pipeline/run-ci/" \
              -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
              -H "Content-Type: application/json" \
              -d '{"region": "us", "max": 50, "min_views": 5000}' \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'[US CI] {d.get(\"status\",\"?\")} pid={d.get(\"pid\",\"?\")} max={d.get(\"max\",\"?\")} min_views={d.get(\"min_views\",\"?\")}')" \
              || echo "[US CI] trigger failed (non-fatal)"
          else
            echo "[SKIP] US CI runs KST Mondays only"
          fi
        continue-on-error: true

      - name: Update USA_LLM tab + Content Intelligence
        id: usa_llm
        run: python -u tools/update_usa_llm.py
        continue-on-error: true

      - name: Build and send daily report
        id: report
        if: always()
        run: |
          python -u tools/build_apify_report.py
          python -u tools/send_gmail.py \
            --to "wj.choi@orbiters.co.kr" \
            --subject "[Apify+SNS] Daily Report $(date -u +%Y-%m-%d)" \
            --body-file ".tmp/apify_report.html"
        env:
          PIPELINE_OUTCOME: ${{ steps.pipeline.outcome }}
          ORDERS_OUTCOME:   ${{ steps.fetch_orders.outcome }}
          SNS_OUTCOME:      ${{ steps.sns_us.outcome }}
          USA_LLM_OUTCOME:  ${{ steps.usa_llm.outcome }}
        continue-on-error: true

      - name: Save .tmp state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .tmp/content_detection_log.json
          key: tmp-state-${{ runner.os }}-${{ github.run_id }}

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-data-${{ github.run_id }}
          path: |
            Data Storage/apify/*.json
            .tmp/us_weekly/*.xlsx
          retention-days: 7
