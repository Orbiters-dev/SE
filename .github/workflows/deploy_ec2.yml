name: Deploy Django App to EC2

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Django app to deploy (datakeeper, onzenna, all)'
        required: true
        default: 'datakeeper'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy app files to EC2
        run: |
          APP="${{ github.event.inputs.app }}"
          EC2_USER="${{ secrets.EC2_USER || 'ubuntu' }}"
          EC2_HOST="${{ secrets.EC2_HOST }}"
          EC2_PATH="/home/ubuntu/export_calculator"
          SSH_CMD="ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST}"

          if [ "$APP" = "all" ] || [ "$APP" = "datakeeper" ]; then
            echo "=== Deploying datakeeper ==="
            ${SSH_CMD} "rm -rf ${EC2_PATH}/datakeeper && mkdir -p ${EC2_PATH}/datakeeper"
            scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -r \
              datakeeper/ ${EC2_USER}@${EC2_HOST}:${EC2_PATH}/
            # Also copy the table creation helper
            scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no \
              tools/create_missing_tables.py ${EC2_USER}@${EC2_HOST}:${EC2_PATH}/
          fi

          if [ "$APP" = "all" ] || [ "$APP" = "onzenna" ]; then
            echo "=== Deploying onzenna ==="
            scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -r \
              onzenna/ ${EC2_USER}@${EC2_HOST}:${EC2_PATH}/onzenna/ 2>/dev/null || true
          fi

      - name: Add app to settings & URLs (if needed)
        run: |
          APP="${{ github.event.inputs.app }}"
          EC2_USER="${{ secrets.EC2_USER || 'ubuntu' }}"
          EC2_HOST="${{ secrets.EC2_HOST }}"
          EC2_PATH="/home/ubuntu/export_calculator"
          SSH_CMD="ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST}"

          ${SSH_CMD} "cd ${EC2_PATH} && python3 -c \"
          import re
          # Add to INSTALLED_APPS
          path = 'export_calculator/settings/production.py'
          with open(path, 'r') as f: content = f.read()
          if '${APP}' not in content:
              content = content.replace(\\\"'onzenna',\\\", \\\"'onzenna',\n    '${APP}',\\\")
              with open(path, 'w') as f: f.write(content)
              print('Added ${APP} to INSTALLED_APPS')
          else:
              print('${APP} already in INSTALLED_APPS')

          # Add to urls.py
          path = 'export_calculator/urls.py'
          with open(path, 'r') as f: content = f.read()
          if '${APP}' not in content:
              content = content.replace('urlpatterns = [', 'urlpatterns = [\n    path(\\\"api/${APP}/\\\", include(\\\"${APP}.urls\\\")),')
              if 'include' not in content.split('from django.urls import')[1].split('\n')[0]:
                  content = content.replace('from django.urls import path', 'from django.urls import path, include')
              with open(path, 'w') as f: f.write(content)
              print('Added ${APP} URLs')
          else:
              print('${APP} URLs already configured')
          \""

      - name: Migrate & restart
        run: |
          APP="${{ github.event.inputs.app }}"
          EC2_USER="${{ secrets.EC2_USER || 'ubuntu' }}"
          EC2_HOST="${{ secrets.EC2_HOST }}"
          EC2_PATH="/home/ubuntu/export_calculator"
          SSH_CMD="ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST}"

          ${SSH_CMD} "cd ${EC2_PATH} && \
            python3 create_missing_tables.py && \
            python3 manage.py makemigrations ${APP} --settings=export_calculator.settings.production && \
            python3 manage.py migrate ${APP} --fake --settings=export_calculator.settings.production && \
            sudo systemctl restart export_calculator && \
            echo 'Deploy complete!'"

          # Fix nginx CORS: allow GitHub Pages dashboard
          ${SSH_CMD} "NGINX_CONF=\$(sudo find /etc/nginx -name '*.conf' -o -name 'default' 2>/dev/null | head -5) && \
            for f in \$NGINX_CONF; do \
              sudo sed -i 's|add_header Access-Control-Allow-Origin [^;]*;|add_header Access-Control-Allow-Origin \"*\" always;|g' \$f 2>/dev/null; \
            done && \
            sudo nginx -t && sudo systemctl reload nginx && echo 'Nginx CORS fixed'" || echo "[WARN] nginx CORS fix skipped"

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf -u "${{ secrets.ORBITOOLS_USER }}:${{ secrets.ORBITOOLS_PASS }}" \
            "https://orbitools.orbiters.co.kr/api/${{ github.event.inputs.app }}/status/" \
            && echo "API is live!" \
            || echo "API check failed (may need manual verification)"
