name: Meta JP Daily Report

on:
  schedule:
    # KST 09:00 도달 목표 — GH cron 지연/누락 대비 다중 시도 + dedup 가드
    # 5/9~5/10 실측: 단일 cron이 +3~4h 지연된 사례 다수. 비정시 분 사용으로 부하 회피.
    - cron: '47 23 * * *'   # KST 08:47
    - cron: '2 0 * * *'     # KST 09:02
    - cron: '17 0 * * *'    # KST 09:17
    - cron: '32 0 * * *'    # KST 09:32
    - cron: '52 0 * * *'    # KST 09:52 (마지막 안전망)
  workflow_dispatch:
    inputs:
      mode:
        description: '발송 모드'
        type: choice
        options: ['1d', '7d', '14d']
        default: '1d'
      skip_audit:
        description: '감사 우회 (긴급)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry-run (HTML 저장만, 메일 발송 X)'
        type: boolean
        default: false

jobs:
  dedup:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check today already succeeded (KST)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "manual/dispatch — proceed"
            exit 0
          fi
          DECISION=$(python3 - << 'EOF'
          import json, subprocess
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          today = datetime.now(KST).date()
          out = subprocess.check_output(['gh','run','list','-w','meta_jp_daily.yml','-L','20','--json','conclusion,createdAt,databaseId'])
          runs = json.loads(out)
          for r in runs:
              if r['conclusion'] != 'success': continue
              t = datetime.fromisoformat(r['createdAt'].replace('Z','+00:00')).astimezone(KST).date()
              if t == today and str(r['databaseId']) != "${{ github.run_id }}":
                  print("false")
                  break
          else:
              print("true")
          EOF
          )
          echo "should_run=$DECISION" >> $GITHUB_OUTPUT
          echo "Decision: $DECISION (today KST already succeeded? -> false means skip)"

  daily:
    needs: dedup
    if: needs.dedup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-genai \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            matplotlib

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          META_JP_ACCESS_TOKEN=${{ secrets.META_JP_ACCESS_TOKEN }}
          META_JP_AD_ACCOUNT_ID=${{ secrets.META_JP_AD_ACCOUNT_ID }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          ENVEOF

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Run Meta JP Daily (1d)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          MODE="${{ github.event.inputs.mode || '1d' }}"
          SKIP="${{ github.event.inputs.skip_audit }}"
          DRY="${{ github.event.inputs.dry_run }}"
          ARGS="--mode $MODE"
          if [ "$SKIP" = "true" ]; then
            ARGS="$ARGS --skip-audit"
          fi
          if [ "$DRY" = "true" ]; then
            ARGS="$ARGS --no-send"
          fi
          python -u tools/meta_jp_daily.py $ARGS

      - name: Upload HTML artifact (dry-run inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-jp-report-${{ github.run_id }}
          path: .tmp/meta_jp_daily/*.html
          retention-days: 7
