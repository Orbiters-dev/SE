name: WL Codes Sync — Google Sheet → Notion (Meta Ads JP)

on:
  schedule:
    # 매시간 정각 (UTC 기준, KST +9)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SERVICE_ACCOUNT_PATH: credentials/google_service_account.json
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install gspread google-auth requests python-dotenv apify-client

      - name: Write service account credentials
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > credentials/google_service_account.json

      - name: Run WL code sync
        run: python tools/sync_wl_codes_notion.py --sync

      - name: Notify Teams on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL secret 미설정 — 알림 스킵"
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ wl_codes_sync 실패 — ${{ github.run_id }} | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$TEAMS_WEBHOOK_URL"
