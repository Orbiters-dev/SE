name: Run DB Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/ec2_key
            ControlMaster auto
            ControlPath /tmp/ssh-%r@%h:%p
            ControlPersist 300
          EOF

      - name: Run migration SQL
        run: |
          # SCP-Execute pattern: transfer file first, then run on EC2 (no pipe)
          scp onzenna/migrations/add_creator_master_list_fields.sql ec2:/tmp/migration.sql
          ssh ec2 "PGPASSWORD=orbit1234 psql -h 172.31.13.240 -U es_db_user -d export_calculator_db -f /tmp/migration.sql && rm /tmp/migration.sql"

      - name: Deploy files
        run: |
          # SCP files directly instead of tar pipe (avoids SIGPIPE exit 141)
          scp -r onzenna/models.py onzenna/views.py onzenna/urls.py ec2:/home/ubuntu/export_calculator/onzenna/
          echo "Files deployed OK"

      - name: Create and run restart script
        run: |
          # Create restart script on remote
          ssh ec2 'cat > /tmp/restart_gunicorn.sh << "SCRIPT"
          #!/bin/bash
          cd /home/ubuntu/export_calculator

          # Find and kill gunicorn by PID file or pgrep (bracket trick avoids self-match)
          PIDS=$(pgrep -f "[g]unicorn.*wsgi" || true)
          if [ -n "$PIDS" ]; then
            echo "Stopping gunicorn PIDs: $PIDS"
            kill $PIDS 2>/dev/null || true
            sleep 3
          else
            echo "No running gunicorn found"
          fi

          # Start fresh
          python3 -m gunicorn --workers=1 --timeout=600 --bind 0.0.0.0:8000 --daemon export_calculator.wsgi:application
          sleep 3

          # Verify
          NEW=$(pgrep -f "[g]unicorn.*wsgi" || true)
          if [ -n "$NEW" ]; then
            echo "SUCCESS: gunicorn running with PIDs: $NEW"
          else
            echo "ERROR: gunicorn failed to start"
            exit 1
          fi
          SCRIPT
          chmod +x /tmp/restart_gunicorn.sh'

          # Execute restart script via nohup, then retrieve log via SCP (no pipe)
          ssh ec2 'nohup /tmp/restart_gunicorn.sh > /tmp/restart_gunicorn.log 2>&1; echo "EXIT=$?"'
          scp ec2:/tmp/restart_gunicorn.log /tmp/restart_gunicorn.log 2>/dev/null || true
          cat /tmp/restart_gunicorn.log 2>/dev/null || echo "(log not available)"

      - name: Verify API
        run: |
          sleep 3
          # Run curl + json.tool on EC2, write to file, then retrieve (no nested pipe over SSH)
          ssh ec2 'curl -sf -u admin:admin http://localhost:8000/api/onzenna/pipeline/creators/stats/ > /tmp/api_check.json 2>&1; echo "EXIT=$?"'
          scp ec2:/tmp/api_check.json /tmp/api_check.json 2>/dev/null || true
          python3 -m json.tool /tmp/api_check.json 2>/dev/null || cat /tmp/api_check.json 2>/dev/null || echo "(API check failed)"
