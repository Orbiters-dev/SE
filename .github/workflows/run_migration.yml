name: Run DB Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Get DB config and run migration
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ secrets.EC2_HOST }} '
            echo "=== DB Settings ==="
            grep -A 10 "DATABASES" /home/ubuntu/export_calculator/export_calculator/settings/production.py 2>/dev/null
            echo "=== PG processes ==="
            ps aux | grep postgres | head -5
            echo "=== PG HBA ==="
            sudo find / -name pg_hba.conf 2>/dev/null | head -3
          '
