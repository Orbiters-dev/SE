name: Run DB Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Investigate Django deployment
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ secrets.EC2_HOST }} '
            echo "=== Docker containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "no docker"

            echo ""
            echo "=== Systemd services with gunicorn/uwsgi/django ==="
            sudo systemctl list-units --all | grep -iE "gunicorn|uwsgi|django|export|calculator" || echo "none found"

            echo ""
            echo "=== Supervisor status ==="
            sudo supervisorctl status 2>/dev/null || echo "no supervisorctl"

            echo ""
            echo "=== Nginx config for export_calculator ==="
            grep -r "proxy_pass\|upstream\|export_calculator" /etc/nginx/ 2>/dev/null | head -20 || echo "no nginx config found"

            echo ""
            echo "=== Running Python/Django processes ==="
            ps aux | grep -E "python|gunicorn|uwsgi|manage.py" | grep -v grep || echo "none"

            echo ""
            echo "=== Port 8000-8999 listeners ==="
            sudo ss -tlnp | grep -E "8[0-9]{3}" || echo "none"
          '
