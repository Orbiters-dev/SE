name: Run DB Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run ALTER TABLE migration
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ secrets.EC2_HOST }} \
            "sudo -u postgres psql -d export_calculator -f -" \
            < onzenna/migrations/add_creator_master_list_fields.sql

      - name: Deploy updated Django code
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ secrets.EC2_HOST }} \
            "cd /home/ubuntu/export_calculator && git fetch origin main && git checkout origin/main -- onzenna/models.py onzenna/views.py onzenna/urls.py && sudo systemctl restart gunicorn && echo 'Deploy complete'"

      - name: Verify columns
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ secrets.EC2_HOST }} \
            "sudo -u postgres psql -d export_calculator -c \"SELECT column_name FROM information_schema.columns WHERE table_name='onz_pipeline_creators' ORDER BY ordinal_position;\""
