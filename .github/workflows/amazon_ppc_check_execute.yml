name: Amazon PPC Auto-Execute (Email Reply)

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes — check for 'execute' reply
  workflow_dispatch:          # Manual trigger

permissions:
  actions: read
  contents: read

jobs:
  check-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            gspread

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Download latest proposal from Propose workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: amazon_ppc_executor.yml
          name: ppc-proposal-latest
          path: .tmp/
          if_no_artifact_found: warn
          search_artifacts: true

      - name: Check for execute reply & run
        run: |
          if ls .tmp/ppc_proposal_*.json 1>/dev/null 2>&1; then
            echo "Proposal file found, checking for email reply..."
            python -u tools/amazon_ppc_executor.py \
              --check-execute \
              --to "${{ secrets.PPC_REPORT_RECIPIENT }}" \
              --cc "mj.lee@orbiters.co.kr"
          else
            echo "No proposal file found. Waiting for next propose run."
          fi

      - name: Re-upload updated proposal (marks executed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppc-proposal-latest
          path: .tmp/
          retention-days: 3
          overwrite: true
          include-hidden-files: true
