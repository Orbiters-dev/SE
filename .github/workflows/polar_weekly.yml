name: Polar Financial Model Weekly

on:
  schedule:
    - cron: '0 18 * * 1'   # 매주 월요일 오전 10시 PST (= 18:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  polar-model:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # 전체 파이프라인 최대 90분

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests python-dotenv openpyxl \
            google-auth google-auth-oauthlib google-api-python-client \
            google-ads

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          AMZ_SP_CLIENT_ID=${{ secrets.AMZ_SP_CLIENT_ID }}
          AMZ_SP_CLIENT_SECRET=${{ secrets.AMZ_SP_CLIENT_SECRET }}
          AMZ_SP_REFRESH_TOKEN=${{ secrets.AMZ_SP_REFRESH_TOKEN }}
          AMZ_SP_MARKETPLACE_ID=ATVPDKIKX0DER
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          SHOPIFY_SHOP=${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_ACCESS_TOKEN=${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_SERVICE_ACCOUNT_PATH=credentials/google_service_account.json
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          ZEZEBAEBAE_GMAIL_TOKEN_PATH=credentials/zezebaebae_gmail_token.json
          GMAIL_SENDER=hello@zezebaebae.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/zezebaebae_gmail_token.json
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'  > credentials/google_service_account.json

      - name: Run Polar Weekly
        run: python -u tools/run_polar_weekly.py
