name: KPI Data Validator (검증이)

on:
  schedule:
    - cron: '0 9 * * *'   # PST 1:00 AM (UTC 09:00, after DataKeeper PST 0:00 collection)
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            pandera \
            pandas

      - name: Write .env
        run: |
          cat > .env <<'ENVEOF'
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Write credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > credentials/gmail_token.json

      - name: Run KPI Validation (검증이)
        run: python -u tools/kpi_validator.py --report-only

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-validation-report
          path: .tmp/validation_report.json
          retention-days: 30
