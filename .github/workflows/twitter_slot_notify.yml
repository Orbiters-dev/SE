name: Twitter Slot Notify

on:
  schedule:
    # JST → UTC (UTC = JST - 9). 정각 5분 전 발동: GitHub Actions 정각 부하 지연 회피.
    - cron: '55 0 * * *'  # JST 09:55 → 10:00 슬롯
    - cron: '55 1 * * *'  # JST 10:55 → 11:00 슬롯
    - cron: '55 3 * * *'  # JST 12:55 → 13:00 슬롯
    - cron: '55 7 * * *'  # JST 16:55 → 17:00 슬롯
    - cron: '55 9 * * *'  # JST 18:55 → 19:00 슬롯
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to notify (10/11/13/17/19)'
        type: choice
        required: true
        options: ['10', '11', '13', '17', '19']

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL_SEEUN: ${{ secrets.TEAMS_WEBHOOK_URL_SEEUN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - name: Resolve slot from cron hour or input
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            echo "slot=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            # 정각 5분 전 발동이므로 UTC 시 = (슬롯 시 - 9 - 1) (JST 10:00 슬롯 = UTC 00:55)
            case "$HOUR" in
              00) echo "slot=10" >> "$GITHUB_OUTPUT" ;;
              01) echo "slot=11" >> "$GITHUB_OUTPUT" ;;
              03) echo "slot=13" >> "$GITHUB_OUTPUT" ;;
              07) echo "slot=17" >> "$GITHUB_OUTPUT" ;;
              09) echo "slot=19" >> "$GITHUB_OUTPUT" ;;
              *) echo "slot=" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Send slot notification
        if: steps.slot.outputs.slot != ''
        run: PYTHONIOENCODING=utf-8 python tools/twitter_slot_notify.py --slot ${{ steps.slot.outputs.slot }}
