name: PPC Dashboard Action

on:
  schedule:
    # Daily propose at KST 7:00 AM (UTC 22:00 previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action type (propose or execute)'
        required: true
        default: 'propose'
      config_json:
        description: 'Brand config JSON (for propose)'
        required: false
        default: ''
      selected_ids:
        description: 'Selected proposal IDs JSON (for execute)'
        required: false
        default: ''
      nonce:
        description: 'CSRF nonce (base64 timestamp+random, generated by dashboard)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: ppc-dashboard
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv google-auth google-auth-oauthlib google-api-python-client

      - name: Write credentials
        run: |
          cat > .env << ENVEOF
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          AMZ_SP_CLIENT_ID=${{ secrets.AMZ_SP_CLIENT_ID }}
          AMZ_SP_CLIENT_SECRET=${{ secrets.AMZ_SP_CLIENT_SECRET }}
          AMZ_SP_REFRESH_TOKEN_FLEETERS=${{ secrets.AMZ_SP_REFRESH_TOKEN_FLEETERS }}
          AMZ_SP_REFRESH_TOKEN_GROSMIMI=${{ secrets.AMZ_SP_REFRESH_TOKEN_GROSMIMI }}
          AMZ_SP_REFRESH_TOKEN_ORBITOOL=${{ secrets.AMZ_SP_REFRESH_TOKEN_ORBITOOL }}
          ORBITOOLS_USER=${{ secrets.ORBITOOLS_USER }}
          ORBITOOLS_PASS=${{ secrets.ORBITOOLS_PASS }}
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ENVEOF

          # Gmail OAuth
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Apply config override (if provided)
        if: inputs.config_json != ''
        run: |
          echo "Config override provided:"
          echo '${{ inputs.config_json }}' | python -m json.tool || echo "(not valid JSON)"
          # Save config for executor to pick up
          mkdir -p .tmp
          echo '${{ inputs.config_json }}' > .tmp/dashboard_config_override.json

      - name: Run Propose
        if: inputs.action == 'propose' || inputs.action == ''
        run: |
          echo "=== Running propose (all brands) ==="
          python -u tools/amazon_ppc_executor.py --propose --to "$PPC_REPORT_RECIPIENT" 2>&1 || echo "[WARN] Propose finished with errors"
        env:
          PPC_REPORT_RECIPIENT: ${{ secrets.PPC_REPORT_RECIPIENT }}

      - name: Pre-Execute Propose (generate fresh proposal for execute)
        if: inputs.action == 'execute' && inputs.selected_ids != ''
        run: |
          # Extract brand from selection JSON and run propose for that brand first
          BRAND=$(echo '${{ inputs.selected_ids }}' | python -c "import sys,json; print(json.load(sys.stdin).get('brand',''))")
          echo "=== Pre-generating proposal for $BRAND ==="
          python -u tools/amazon_ppc_executor.py --propose --brand "$BRAND" 2>&1 || echo "[WARN] Pre-propose had issues"
        env:
          PPC_REPORT_RECIPIENT: ${{ secrets.PPC_REPORT_RECIPIENT }}

      - name: Run Execute
        if: inputs.action == 'execute' && inputs.selected_ids != ''
        run: |
          echo "=== Running selective execute ==="
          echo "Selection: ${{ inputs.selected_ids }}"
          # Save selection for executor
          mkdir -p .tmp
          echo '${{ inputs.selected_ids }}' > .tmp/dashboard_execute_selection.json
          python -u tools/amazon_ppc_executor.py --execute-selection .tmp/dashboard_execute_selection.json 2>&1 || echo "[WARN] Execute finished with errors"

      - name: Run Autopilot Execute (after propose, if any items were auto-approved)
        if: inputs.action == 'propose' || inputs.action == ''
        run: |
          echo "=== Checking for autopilot-approved items ==="
          # If any proposals were auto-approved, execute them now
          python -u tools/amazon_ppc_executor.py --execute --brand all 2>&1 || echo "[WARN] Autopilot execute done (no approved items or errors)"
        env:
          PPC_REPORT_RECIPIENT: ${{ secrets.PPC_REPORT_RECIPIENT }}

      - name: Update dashboard data.js
        run: |
          # Only regenerate if proposal JSONs exist (avoid pushing empty data.js)
          if ls .tmp/ppc_proposal_*_*.json 1>/dev/null 2>&1; then
            echo "=== Regenerating dashboard data ==="
            python -u tools/generate_dashboard_data.py 2>&1 || echo "[WARN] data.js generation had issues"
          else
            echo "=== No proposal JSONs found, skipping data.js regeneration ==="
          fi

      - name: Update Financial KPIs data
        run: |
          echo "=== Regenerating Financial KPIs data ==="
          python -u tools/generate_fin_data.py 2>&1 || echo "[WARN] fin_data.js generation had issues"

      - name: Push updated data to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ppc-dashboard/data.js docs/ppc-dashboard/bt_data.js docs/ppc-dashboard/exec_log.json docs/financial-dashboard/fin_data.js
          git diff --cached --quiet || git commit -m "auto: update PPC dashboard data [skip ci]"
          git pull --rebase || true
          git push || echo "[WARN] Push failed (maybe no changes)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppc-dashboard-action-results
          path: |
            .tmp/ppc_proposal_*.html
            .tmp/ppc_proposal_*.json
            .tmp/ppc_executed_*.json
            .tmp/ppc_executed_*.html
          retention-days: 7
          if-no-files-found: warn
