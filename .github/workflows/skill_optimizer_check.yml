name: Skill Optimizer (Check Execute)

on:
  schedule:
    - cron: '0 */2 * * *'   # 2시간마다 (답장 감지용)
  workflow_dispatch:

jobs:
  check-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            anthropic \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          COMMUNICATOR_RECIPIENT=${{ secrets.COMMUNICATOR_RECIPIENT }}
          ENVEOF

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Download latest proposals artifact
        uses: actions/download-artifact@v4
        with:
          name: skill-proposals-latest
          path: .tmp/
        continue-on-error: true   # OK if no artifact yet

      - name: Check for execute reply
        run: |
          mkdir -p .tmp
          python -u tools/run_skill_optimizer.py --check-execute

      - name: Upload updated proposals (if executed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-proposals-latest
          path: .tmp/skill_proposals_latest.json
          retention-days: 3
          overwrite: true
        continue-on-error: true

      - name: Commit and push applied changes
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git diff --quiet && git diff --staged --quiet || \
            (git add -A && git commit -m "feat(skills): auto-apply optimizer proposals via email reply" && git push)
        continue-on-error: true
