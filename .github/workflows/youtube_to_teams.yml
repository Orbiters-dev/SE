name: YouTube to Teams Daily

on:
  schedule:
    # KST 08:00 (Mon-Fri) = UTC 23:00 (Sun-Thu 전날)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:  # 아이폰 GitHub 앱에서 수동 트리거 가능

jobs:
  send-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install yt-dlp requests holidays

      - name: Secret 확인
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          YOUTUBE_CHANNEL_URL: ${{ secrets.YOUTUBE_CHANNEL_URL }}
        run: |
          echo "TEAMS_WEBHOOK_URL 설정: $([ -n "$TEAMS_WEBHOOK_URL" ] && echo "YES (${#TEAMS_WEBHOOK_URL}자)" || echo "NO - Secret 미설정")"
          echo "YOUTUBE_CHANNEL_URL 설정: $([ -n "$YOUTUBE_CHANNEL_URL" ] && echo "YES" || echo "NO - Secret 미설정")"

      - name: 영상 발송
        id: send
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          YOUTUBE_CHANNEL_URL: ${{ secrets.YOUTUBE_CHANNEL_URL }}
          QUEUE_PATH: data/youtube_queue.json
        run: python tools/run_youtube_daily.py 2>&1 | tee data/last_run.log
        continue-on-error: true

      - name: 큐 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_queue.json data/last_run.log
          git diff --staged --quiet || git commit -m "chore: youtube queue update [skip ci]"
          git push
