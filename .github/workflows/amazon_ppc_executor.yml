name: Amazon PPC Executor (Propose)

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 KST 08:00 (= 23:00 UTC 전날)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  ppc-propose:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 3 brands × ~30min each

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            gspread

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          GMAIL_TOKEN_PATH=credentials/gmail_token.json
          GMAIL_SENDER=orbiters11@gmail.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/gmail_token.json

      - name: Run PPC Executor (Propose)
        run: |
          mkdir -p .tmp
          python -u tools/amazon_ppc_executor.py \
            --propose \
            --to "${{ secrets.PPC_REPORT_RECIPIENT }}" \
            --cc "mj.lee@orbiters.co.kr"

      - name: List proposal files
        if: always()
        run: ls -la .tmp/ppc_proposal_*.json 2>/dev/null || echo "No proposal files found"

      - name: Upload proposal for check-execute workflow
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppc-proposal-latest
          path: .tmp/
          retention-days: 3
          overwrite: true
          include-hidden-files: true
