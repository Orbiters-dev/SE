name: Amazon PPC Executor (Propose)

on:
  schedule:
    - cron: '0 1 * * *'    # 매일 KST 10:00 (= 01:00 UTC) — 일간 리포트 이후 제안 생성
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  ppc-propose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            requests \
            python-dotenv \
            google-auth \
            google-auth-oauthlib \
            google-api-python-client \
            gspread

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          AMZ_ADS_CLIENT_ID=${{ secrets.AMZ_ADS_CLIENT_ID }}
          AMZ_ADS_CLIENT_SECRET=${{ secrets.AMZ_ADS_CLIENT_SECRET }}
          AMZ_ADS_REFRESH_TOKEN=${{ secrets.AMZ_ADS_REFRESH_TOKEN }}
          GMAIL_OAUTH_CREDENTIALS_PATH=credentials/gmail_oauth_credentials.json
          ZEZEBAEBAE_GMAIL_TOKEN_PATH=credentials/zezebaebae_gmail_token.json
          GMAIL_SENDER=hello@zezebaebae.com
          PPC_REPORT_RECIPIENT=${{ secrets.PPC_REPORT_RECIPIENT }}
          ENVEOF

      - name: Write Gmail credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GMAIL_OAUTH_CREDENTIALS_JSON }}' > credentials/gmail_oauth_credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}'             > credentials/zezebaebae_gmail_token.json

      - name: Run PPC Executor (Propose)
        run: |
          python -u tools/amazon_ppc_executor.py \
            --propose \
            --to "${{ secrets.PPC_REPORT_RECIPIENT }}" \
            --cc "mj.lee@orbiters.co.kr"
