name: dual_test
description: Pipeliner Executor/Verifier + Codex cross-check (2-round)
max_iterations: 2

phases:
  - name: execute
    agent: pipeliner
    description: Run pipeline stages (seed, gifting, sample_sent, etc.)
    tool: tools/dual_test_runner.py --dual

  - name: codex_verify
    agent: codex
    description: Codex independent audit of pipeline results
    tool: tools/codex_auditor.py --domain pipeline --verify-round

  - name: fix
    agent: pipeliner
    description: Fix FAIL items from codex verification
    condition: "codex_verify.verdict == 'FAIL'"
    action: fix failures and re-verify
