name: crawl_audit
description: Apify content pipeline 3-layer audit + Codex cross-check
max_iterations: 2

phases:
  - name: claude_audit
    agent: crawl_auditor
    description: Claude 3-layer audit (infra, data, integrity)
    tool: tools/apify_crawl_auditor.py --harness --json

  - name: codex_verify
    agent: codex
    description: Codex independent re-verification of 6 axes
    tool: tools/codex_auditor.py --domain crawl --audit

  - name: reconcile
    agent: crawl_auditor
    description: Compare Claude vs Codex results, flag discrepancies
    condition: "claude_audit != codex_verify on any axis"
    action: re-check discrepant axes
