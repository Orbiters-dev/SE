name: cfo_review
description: CFO -> Golmani -> Auditor + Codex dual verification loop
max_iterations: 2

phases:
  - name: generate
    agent: golmani
    description: Generate financial model/report from DataKeeper data
    tool: tools/generate_fin_data.py

  - name: claude_audit
    agent: auditor
    description: Claude 감사관 6-point checklist (A-F)
    tool: tools/cfo_harness.py --audit-file

  - name: codex_verify
    agent: codex
    description: Codex independent verification
    tool: tools/codex_auditor.py --domain finance --audit

  - name: decide
    agent: cfo
    description: Compare dual verdicts, decide APPROVE/REVISE/ESCALATE
    condition: "claude_audit.status == 'FAIL' or codex_verify.verdict == 'FAIL'"
    action: restart_from generate with corrections
