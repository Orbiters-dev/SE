<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financial KPIs Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="fin_data.js"></script>
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--dim:#64748b;--muted:#94a3b8;--a:#10b981;--abg:#ecfdf5;--g:#10b981;--gbg:#ecfdf5;--am:#f59e0b;--ambg:#fffbeb;--r:#ef4444;--rbg:#fef2f2;--c:#0ea5e9;--cbg:#f0f9ff;--p:#6366f1;--mono:'SF Mono','Fira Code',Consolas,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:13px}
.ctr{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
.hero{text-align:center;margin-bottom:16px}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px}.hero h1 span{background:linear-gradient(135deg,#10b981,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--dim);font-size:13px;margin-top:3px}
.hero .meta{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2px 10px;font-size:10px;color:var(--dim);display:inline-flex;align-items:center;gap:4px}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 3px var(--g)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.card h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.card .desc{font-size:10px;color:var(--dim);margin-bottom:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px;margin:10px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.stat .sl{font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
.stat .sv{font-size:22px;font-weight:800;letter-spacing:-.5px;font-family:var(--mono)}
.stat .ss{font-size:9px;color:var(--dim);margin-top:2px}
.stat.green .sv{color:var(--g)}.stat.red .sv{color:var(--r)}.stat.amber .sv{color:var(--am)}.stat.accent .sv{color:var(--a)}.stat.cyan .sv{color:var(--c)}.stat.purple .sv{color:#6366f1}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8fafc;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.3px;font-size:9px;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0}
td{padding:6px 8px;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fffe}
.period-tabs{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:10px}
.period-tabs>div{padding:5px 14px;cursor:pointer;font-weight:700;color:var(--dim);transition:.12s}
.period-tabs>div.on{background:var(--a);color:#fff}
.period-tabs>div:hover:not(.on){background:var(--abg)}
.sec{margin-bottom:24px}
.sec-title{font-size:14px;font-weight:800;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-title .num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;background:var(--a);flex-shrink:0}
.src-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.src-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:10px}
.src-card .sn{font-weight:700;font-size:11px;font-family:var(--mono);color:var(--text);margin-bottom:2px}
.src-card .sd{color:var(--dim);line-height:1.4}
.src-card .sr{float:right;font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-weight:600}
.proj{color:#8b5cf6;font-size:9px;font-weight:600;font-family:var(--mono)}
/* Sub-tabs */
.sub-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;overflow-x:auto}
.sub-tab{padding:8px 16px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;border-radius:6px 6px 0 0}
.sub-tab:hover{color:var(--text);background:#f1f5f9}
.sub-tab.active{color:var(--a);border-bottom-color:var(--a);background:var(--abg)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* Position badge */
.pos-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono)}
.pos-top3{background:#ecfdf5;color:#10b981}.pos-top10{background:#fffbeb;color:#f59e0b}.pos-low{background:#fef2f2;color:#ef4444}
/* Sparkline */
.sparkline{display:inline-flex;align-items:end;gap:1px;height:20px;vertical-align:middle}
.sparkline .bar{width:4px;border-radius:1px;min-height:1px}
/* Volume bar */
.vol-bar{height:6px;border-radius:3px;background:#e2e8f0;position:relative;overflow:hidden;min-width:60px}
.vol-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#10b981,#0ea5e9)}
/* ── SVG Chart Tooltip ── */
.fin-tooltip{position:fixed;pointer-events:none;background:#1e293b;color:#fff;padding:6px 10px;border-radius:6px;font-size:10px;font-family:var(--mono);line-height:1.5;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:220px;white-space:nowrap}
.fin-tooltip .tt-date{color:#94a3b8;font-size:9px;margin-bottom:2px}
.fin-tooltip .tt-row{display:flex;align-items:center;gap:4px}
.fin-tooltip .tt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* ── Mobile Responsive ── */
@media(max-width:700px){
  .ctr{padding:12px 8px 60px}
  .hero h1{font-size:18px}
  .hero .sub{font-size:11px}
  /* Nav bar */
  .ctr>div:first-child>div{flex-direction:column;border-radius:8px}
  .ctr>div:first-child>div>*{padding:6px 14px!important;font-size:11px!important;text-align:center}
  /* Stats */
  .stats{grid-template-columns:repeat(2,1fr);gap:4px}
  .stat{padding:8px}.stat .sv{font-size:16px}
  /* Source grid */
  .src-grid{grid-template-columns:1fr}
  /* Sub tabs: horizontal scroll */
  .sub-tabs{font-size:10px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sub-tab{padding:6px 12px;font-size:10px;flex-shrink:0}
  /* Tables: horizontal scroll */
  .card{padding:10px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sec{margin-bottom:16px}
  table{min-width:500px}
  th{padding:5px 5px;font-size:8px}td{padding:4px 5px;font-size:10px}
  /* Section titles */
  .sec-title{font-size:12px;flex-wrap:wrap}
  .sec-title .num{width:20px;height:20px;font-size:10px}
  /* Period tabs */
  .period-tabs>div{padding:5px 10px;font-size:9px}
  /* Login gate */
  #login-gate>div{padding:28px 20px!important;width:92%!important}
}
</style>
</head>
<body>
<div class="fin-tooltip" id="fin-tt"></div>

<!-- LOGIN GATE -->
<div id="login-gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="background:var(--card);border-radius:16px;padding:48px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.06);border:1px solid var(--border);text-align:center">
    <div style="font-size:32px;margin-bottom:8px">&#x1F4CA;</div>
    <h2 style="font-size:18px;font-weight:800;margin-bottom:4px">Financial KPIs</h2>
    <p style="font-size:11px;color:var(--dim);margin-bottom:24px">Sign in to access the dashboard</p>
    <input type="text" id="login-uid" placeholder="User ID" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:8px;font-family:inherit" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <input type="password" id="login-pw" placeholder="Password" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:16px;font-family:inherit" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;background:var(--a);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Sign In</button>
    <div id="login-err" style="color:var(--r);font-size:11px;margin-top:10px;display:none"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="display:none">
<div class="ctr">

<!-- Region Toggle -->
<div style="display:flex;justify-content:center;margin-bottom:12px">
  <div style="display:inline-flex;border:2px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:13px;font-weight:700">
    <div id="rgn-us" onclick="switchRegion('us')" style="padding:8px 28px;background:#10b981;color:#fff;cursor:pointer;transition:.15s">🇺🇸 US</div>
    <div id="rgn-jp" onclick="switchRegion('jp')" style="padding:8px 28px;color:#64748b;cursor:pointer;transition:.15s">🇯🇵 JP</div>
  </div>
</div>

<!-- Section sub-tabs -->
<div style="display:flex;justify-content:center;margin-bottom:20px">
  <div id="section-tabs" style="display:inline-flex;border:2px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:12px;font-weight:700"></div>
</div>

<!-- ── US Sections ──────────────────────────────────────────────────────── -->
<div id="sec-amazon-ppc" style="display:none">
  <iframe id="ifr-amazon-ppc" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-content-intel" style="display:none">
  <iframe id="ifr-content-intel" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-pipeline-crm" style="display:none">
  <iframe id="ifr-pipeline-crm" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-fin-kpis" style="display:none">
  <div class="hero">
    <h1>Financial <span>KPIs</span></h1>
    <div class="sub">Revenue, Ad Performance, Margins & Traffic Analytics</div>
    <div class="meta" id="hero-meta"></div>
  </div>
  <div class="sub-tabs" id="fin-sub-tabs"></div>
  <div id="fin-panels"></div>
</div>

<!-- ── JP Sections ──────────────────────────────────────────────────────── -->
<div id="sec-jp-amazon" style="display:none"></div>
<div id="sec-jp-ppc" style="display:none">
  <iframe id="ifr-jp-ppc" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-jp-content" style="display:none">
  <iframe id="ifr-jp-content" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-jp-pipeline" style="display:none">
  <iframe id="ifr-jp-pipeline" src="" style="width:100%;height:90vh;border:none;border-radius:12px;background:var(--bg)"></iframe>
</div>
<div id="sec-jp-fin" style="display:none"></div>

</div>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
var AUTH_USERS = {
  'WJ':  'a619397d21c5fd5daa1d55bbdef5e99383dadb69f602a0110a9d56cb7b776fbd',
  'CAL': 'a1a137c402f2a79391d3ecd012536dc6a2dc6e4e3ee32c2880d01afa04f7402c',
  'MJ':  'c8fe37479a933b489c5d4a1ff509cbe60095246f1e42f383bc017cb77b3efcbb',
  'HJ':  '75c2e5a66c6bcc985f42b6d402dbb10050a09c9f0371ed735e1983c145da3ffe',
  'JS':  '89d0eb2d586787c34782b6fa71300419edb51538e74596a8c7948c0abca66e6d',
  'HC':  '357fca21bafbd5f23f141ff9433fe47422f58e9b0521c04e5735ae727313aef5',
  'SE':  '9346ed77d5684897c51838d0c98db23867810a7e4b120c1226a15b834f4af459'
};
async function sha256(s){var e=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
async function doLogin(){
  var uid=document.getElementById('login-uid').value.trim().toUpperCase();
  var pw=document.getElementById('login-pw').value;
  if(!uid||!pw){document.getElementById('login-err').textContent='Enter ID and password';document.getElementById('login-err').style.display='block';return;}
  var hash=await sha256(pw+uid.toLowerCase());
  if(AUTH_USERS[uid]&&AUTH_USERS[uid]===hash){
    localStorage.setItem('fin_auth',JSON.stringify({uid:uid,ts:Date.now()}));
    showDashboard();
  }else{document.getElementById('login-err').textContent='Invalid credentials';document.getElementById('login-err').style.display='block';}
}
function checkAuth(){
  var s=localStorage.getItem('fin_auth');
  if(!s)return false;
  try{var d=JSON.parse(s);return(Date.now()-d.ts)<30*86400000;}catch(e){return false;}
}
function showDashboard(){
  document.getElementById('login-gate').style.display='none';
  document.getElementById('main-content').style.display='block';
  initDashboard();
}

// ── Region / Section Navigation ──────────────────────────────────────────────
var US_TABS = [
  {id:'amazon-ppc',    label:'Amazon PPC',           sec:'sec-amazon-ppc',    ifr:'ifr-amazon-ppc',    src:'../ppc-dashboard/index.html?embed=1',        color:'#f59e0b'},
  {id:'content-intel', label:'Content Intelligence', sec:'sec-content-intel', ifr:'ifr-content-intel', src:'../content-dashboard/index.html?embed=1',    color:'#ec4899'},
  {id:'pipeline-crm',  label:'Pipeline CRM',         sec:'sec-pipeline-crm',  ifr:'ifr-pipeline-crm',  src:'../pipeline-dashboard/index.html?embed=1',   color:'#8b5cf6'},
  {id:'fin-kpis',      label:'Financial KPIs',       sec:'sec-fin-kpis',      ifr:null,                src:null,                                          color:'#10b981'}
];
var JP_TABS = [
  {id:'jp-amazon',   label:'Amazon JP + 라쿠텐',   sec:'sec-jp-amazon',   ifr:null,              src:null,                                            color:'#ef4444'},
  {id:'jp-ppc',      label:'Amazon PPC',           sec:'sec-jp-ppc',      ifr:'ifr-jp-ppc',      src:'../jp-ppc-dashboard/index.html?embed=1',        color:'#f97316'},
  {id:'jp-content',  label:'Content Intelligence', sec:'sec-jp-content',  ifr:'ifr-jp-content',  src:'../content-dashboard/index.html?embed=1&region=jp',       color:'#ec4899'},
  {id:'jp-pipeline', label:'Pipeline CRM',         sec:'sec-jp-pipeline', ifr:'ifr-jp-pipeline', src:'../pipeline-dashboard-jp/index.html?embed=1',   color:'#8b5cf6'},
  {id:'jp-fin',      label:'Financial KPIs',       sec:'sec-jp-fin',      ifr:null,              src:null,                                            color:'#10b981'}
];
var _allSecs = ['sec-amazon-ppc','sec-content-intel','sec-pipeline-crm','sec-fin-kpis',
                'sec-jp-amazon','sec-jp-ppc','sec-jp-content','sec-jp-pipeline','sec-jp-fin'];
var _curRegion = 'us';
var _curSection = {};

if(checkAuth()) showDashboard();

function initDashboard() {
  // Hash takes priority → localStorage fallback
  var hash = window.location.hash.replace('#','');
  var parts = hash ? hash.split('/') : [];
  var hashRgn = parts[0]; // 'us' or 'jp'
  var hashSec = parts[1]; // tab id

  _curSection['us'] = localStorage.getItem('fin_sec_us') || 'fin-kpis';
  _curSection['jp'] = localStorage.getItem('fin_sec_jp') || 'jp-amazon';

  var rgn = (hashRgn==='us'||hashRgn==='jp') ? hashRgn : (localStorage.getItem('fin_region') || 'us');
  if(hashSec) _curSection[rgn] = hashSec;
  switchRegion(rgn, true);
}
window.addEventListener('hashchange', function(){
  var hash = window.location.hash.replace('#','');
  var parts = hash.split('/');
  if(parts[0]==='us'||parts[0]==='jp'){
    if(parts[0]!==_curRegion) switchRegion(parts[0]);
    else if(parts[1]) switchSection(parts[1]);
  }
});

function switchRegion(rgn, init) {
  _curRegion = rgn;
  localStorage.setItem('fin_region', rgn);
  var usEl=document.getElementById('rgn-us'), jpEl=document.getElementById('rgn-jp');
  if(rgn==='us'){
    usEl.style.background='#10b981'; usEl.style.color='#fff';
    jpEl.style.background=''; jpEl.style.color='#64748b';
  } else {
    jpEl.style.background='#e11d48'; jpEl.style.color='#fff';
    usEl.style.background=''; usEl.style.color='#64748b';
  }
  renderSectionTabs(rgn==='us' ? US_TABS : JP_TABS);
  var secId = _curSection[rgn] || (rgn==='us' ? 'fin-kpis' : 'jp-amazon');
  switchSection(secId, init);
}

function renderSectionTabs(tabs) {
  var html='';
  var curSec = _curSection[_curRegion];
  tabs.forEach(function(t,i){
    var isActive = (t.id === curSec);
    var bg = isActive ? t.color : '';
    var fg = isActive ? '#fff' : '#64748b';
    html += '<div onclick="switchSection(\''+t.id+'\')" data-sec="'+t.id+'" '
      +'style="padding:8px 20px;background:'+bg+';color:'+fg+';cursor:pointer;transition:.15s;border-right:1px solid #e2e8f0"'
      +' onmouseover="if(this.dataset.sec!==document.getElementById(\'section-tabs\').dataset.active)this.style.background=\'#f1f5f9\'"'
      +' onmouseout="if(this.dataset.sec!==document.getElementById(\'section-tabs\').dataset.active)this.style.background=\'\'"'
      +'>'+t.label+'</div>';
  });
  var el=document.getElementById('section-tabs');
  el.innerHTML=html;
  el.dataset.active=curSec;
}

function switchSection(tabId, init) {
  var tabs = _curRegion==='us' ? US_TABS : JP_TABS;
  var tab = tabs.find(function(t){return t.id===tabId;}) || tabs[tabs.length-1];
  _curSection[_curRegion] = tab.id;
  localStorage.setItem('fin_sec_'+_curRegion, tab.id);
  // update URL hash
  history.replaceState(null, '', '#'+_curRegion+'/'+tab.id);

  // hide all sections
  _allSecs.forEach(function(s){ document.getElementById(s).style.display='none'; });
  // show target
  document.getElementById(tab.sec).style.display='block';

  // lazy-load iframe
  if(tab.ifr && tab.src){
    var ifr=document.getElementById(tab.ifr);
    if(!ifr.getAttribute('src')) ifr.src=tab.src;
  }

  // Financial KPIs inline render
  if(tab.id==='fin-kpis' && !window._finRendered){ renderFinancial(); window._finRendered=true; }
  // JP inline renders
  if(tab.id==='jp-amazon' && !window._jpAmazonRendered){ renderJpAmazon(); window._jpAmazonRendered=true; }
  if(tab.id==='jp-fin' && !window._jpFinRendered){ renderJpFin(); window._jpFinRendered=true; }

  // update tab bar highlight
  var el=document.getElementById('section-tabs');
  el.dataset.active=tab.id;
  el.querySelectorAll('div[data-sec]').forEach(function(d){
    var t2=tabs.find(function(x){return x.id===d.dataset.sec;});
    if(d.dataset.sec===tab.id){ d.style.background=t2?t2.color:'#10b981'; d.style.color='#fff'; }
    else { d.style.background=''; d.style.color='#64748b'; }
  });
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
function showTT(evt, html){
  var tt=document.getElementById('fin-tt');
  tt.innerHTML=html;
  tt.style.display='block';
  var r=tt.getBoundingClientRect();
  var x=evt.clientX+12, y=evt.clientY-r.height-8;
  if(x+r.width>window.innerWidth) x=evt.clientX-r.width-12;
  if(y<4) y=evt.clientY+16;
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}
// Pin tooltip to SVG element position (not mouse cursor)
function showTTAt(svgEl, html){
  var tt=document.getElementById('fin-tt');
  tt.innerHTML=html;
  tt.style.display='block';
  var r=tt.getBoundingClientRect();
  var er=svgEl.getBoundingClientRect();
  var x=er.left+er.width/2-r.width/2;
  var y=er.top-r.height-6;
  if(x+r.width>window.innerWidth-8) x=window.innerWidth-r.width-8;
  if(x<4) x=4;
  if(y<4) y=er.bottom+6;
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}
function hideTT(){ var tt=document.getElementById('fin-tt'); tt.style.display='none'; }

// ── Helpers ──────────────────────────────────────────────────────────────────
function $(v){ return typeof v==='number'?'$'+v.toLocaleString():v; }
function num(v){ return typeof v==='number'?v.toLocaleString():v; }
function pct(v){ return (typeof v==='number'?v.toFixed(1):'0')+'%'; }

function fmCell(actual, projected, isLast, opts){
  opts=opts||{};
  var sty='text-align:right;font-family:var(--mono);font-size:'+(opts.fs||'10px');
  if(opts.color) sty+=';color:'+opts.color;
  if(opts.bold) sty+=';font-weight:700';
  var prefix=opts.prefix||'';
  var suffix=opts.suffix||'';
  if(isLast && projected && projected !== actual){
    return '<td style="'+sty+'">'+prefix+$(actual)+suffix+' <span class="proj">('+prefix+$(projected)+suffix+')</span></td>';
  }
  return '<td style="'+sty+'">'+prefix+$(actual)+suffix+'</td>';
}

function posBadge(pos){
  if(pos<=0) return '<span class="pos-badge pos-low">--</span>';
  var cls=pos<=3?'pos-top3':pos<=10?'pos-top10':'pos-low';
  return '<span class="pos-badge '+cls+'">'+pos.toFixed(1)+'</span>';
}

function sparkline(values, color, invert){
  // invert=true means lower is better (position)
  var vals=values.filter(function(v){return v!==null&&v!==undefined});
  if(!vals.length) return '';
  var maxV=Math.max.apply(null,vals)||1;
  var h='<span class="sparkline">';
  values.forEach(function(v){
    if(v===null||v===undefined){h+='<span class="bar" style="width:4px;height:1px;background:#e2e8f0"></span>';return;}
    var pct=invert?(1-v/maxV):(v/maxV);
    pct=Math.max(pct,0.05);
    var c=color||'#10b981';
    if(invert){ c=v<=3?'#10b981':v<=10?'#f59e0b':'#ef4444'; }
    h+='<span class="bar" style="height:'+Math.round(pct*20)+'px;background:'+c+'"></span>';
  });
  h+='</span>';
  return h;
}

function volBar(vol, maxVol){
  var pct=maxVol>0?Math.min(vol/maxVol*100,100):0;
  return '<span class="vol-bar"><span class="fill" style="width:'+pct+'%"></span></span>';
}

function barChart(datasets, labels, opts){
  var w=opts.w||900, h=opts.h||170, pad=44, barW=opts.barW||12;
  var pfx=opts.prefix||'$';
  var n=labels.length, gapX=(w-pad*2)/n;
  var allVals=[]; datasets.forEach(function(ds){ ds.data.forEach(function(v){ allVals.push(Math.abs(v)); }); });
  var maxV=Math.max.apply(null, allVals)||1;
  if(opts.stacked){
    var stackMax=0;
    for(var i=0;i<n;i++){
      var s=0; datasets.forEach(function(ds){ s+=Math.abs(ds.data[i]||0); }); if(s>stackMax) stackMax=s;
    }
    maxV=stackMax;
  }
  var scaleY=(h-pad-24)/maxV;
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-height:'+h+'px">';
  for(var g=0;g<4;g++){
    var gy=h-pad-((h-pad-24)/3*g);
    var gv=Math.round(maxV/3*g);
    svg+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(w-10)+'" y2="'+gy+'" stroke="#e2e8f0" stroke-width="0.5"/>';
    svg+='<text x="'+(pad-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#94a3b8" font-size="8" font-family="var(--mono)">'+pfx+(gv>=1000?Math.round(gv/1000)+'K':gv)+'</text>';
  }
  if(opts.stacked){
    for(var i=0;i<n;i++){
      var x=pad+gapX*i+gapX/2;
      var yBase=h-pad;
      datasets.forEach(function(ds){
        var v=Math.abs(ds.data[i]||0), bh=v*scaleY;
        svg+='<rect x="'+(x-barW/2)+'" y="'+(yBase-bh)+'" width="'+barW+'" height="'+Math.max(bh,0.5)+'" fill="'+ds.color+'" rx="2" opacity="0.85"/>';
        yBase-=bh;
      });
      svg+='<text x="'+x+'" y="'+(h-pad+14)+'" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">'+labels[i]+'</text>';
    }
  } else {
    var numDs=datasets.length, totalBarW=barW*numDs+2*(numDs-1);
    for(var i=0;i<n;i++){
      var cx=pad+gapX*i+gapX/2;
      datasets.forEach(function(ds, di){
        var v=Math.abs(ds.data[i]||0), bh=v*scaleY;
        var bx=cx-totalBarW/2+di*(barW+2);
        svg+='<rect x="'+bx+'" y="'+(h-pad-bh)+'" width="'+barW+'" height="'+Math.max(bh,0.5)+'" fill="'+ds.color+'" rx="2" opacity="0.85"/>';
      });
      svg+='<text x="'+cx+'" y="'+(h-pad+14)+'" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">'+labels[i]+'</text>';
    }
  }
  // Tooltip hit areas per label group
  for(var i=0;i<n;i++){
    var hx=pad+gapX*i, hw=gapX;
    var ttHtml='<div class=tt-date>'+labels[i].replace(/'/g,'\\&#39;')+'</div>';
    datasets.forEach(function(ds){
      var v=Math.abs(ds.data[i]||0);
      ttHtml+='<div class=tt-row><span class=tt-dot style=background:'+ds.color+'></span>'+ds.label+': '+pfx+v.toLocaleString()+'</div>';
    });
    svg+='<rect x="'+hx+'" y="20" width="'+hw+'" height="'+(h-pad-20)+'" fill="transparent" style="cursor:crosshair"'
      +' onmousemove="showTT(event,\''+ttHtml.replace(/'/g,"\\'")+'\')" onmouseleave="hideTT()"/>';
  }
  var lx=pad;
  datasets.forEach(function(ds){
    svg+='<rect x="'+lx+'" y="4" width="10" height="10" fill="'+ds.color+'" rx="2"/>';
    svg+='<text x="'+(lx+14)+'" y="12" fill="#64748b" font-size="9" font-weight="600">'+ds.label+'</text>';
    lx+=ds.label.length*6+28;
  });
  svg+='</svg>';
  return svg;
}

    var latest=bdata.latest||{};
    var keywords=Object.keys(latest);

    var color=brandColors[brand]||'#64748b';

    html+='<div style="margin:12px 0 4px"><span style="color:'+color+';font-weight:700">'+brand+'</span></div>';

      var rating=d.rating?(d.rating.toFixed(1)+'★'):'—';

      html+='<td style="text-align:center;font-size:18px;font-weight:700;color:'+posColor+'">'+posStr+'</td>';
      html+='<td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title+'</td>';
      html+='<td style="text-align:center">'+price+'</td>';
      html+='<td style="text-align:center">'+rating+'</td></tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div>';

  // ── 8B: Daily Position Matrix (keywords × dates) ──
  html+='<div class="sec" style="margin-top:16px"><div class="sec-title"><div class="num" style="background:#6366f1">8B</div> Daily Position Matrix <span style="font-weight:400;color:var(--muted);font-size:11px">Lower = Better</span></div>';
  html+='<div class="desc">키워드별 일자별 검색 순위 추이. 초록=Top10, 노랑=Top20, 빨강=20+, —=Not Found.</div>';

  var showDates=dates.slice(-30);

  showBrands.forEach(function(brand){
    var bdata=brands[brand]||{};
    var history=bdata.history||{};
    var latest=bdata.latest||{};
    var keywords=Object.keys(history);
    if(!keywords.length) keywords=Object.keys(latest);
    if(!keywords.length) return;
    var color=brandColors[brand]||'#64748b';

    // Sort by best latest position
    keywords.sort(function(a,b){
      var la=latest[a]?latest[a].position:999;
      var lb=latest[b]?latest[b].position:999;
      if(la<=0) la=999; if(lb<=0) lb=999;
      return la-lb;
    });

    html+='<div style="margin:16px 0 6px"><span style="color:'+color+';font-weight:700;font-size:14px">'+brand+'</span> <span style="color:var(--muted);font-size:11px">('+keywords.length+' keywords)</span></div>';
    html+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="min-width:100%;border-collapse:collapse;font-size:12px"><thead><tr>';
    html+='<th style="position:sticky;left:0;z-index:2;background:var(--card);padding:6px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;min-width:140px">Keyword</th>';
    showDates.forEach(function(d){
      var short=d.substring(5); // MM-DD
      html+='<th style="text-align:center;padding:4px 6px;border-bottom:2px solid var(--border);font-size:10px;white-space:nowrap;min-width:48px">'+short+'</th>';
    });
    html+='</tr></thead><tbody>';

    keywords.forEach(function(kw,ki){
      var vals=history[kw]||{};
      var bgRow=ki%2===0?'transparent':'rgba(100,116,139,0.04)';
      html+='<tr style="background:'+bgRow+'">';
      html+='<td style="position:sticky;left:0;z-index:1;background:var(--card);padding:6px 10px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)">'+kw+'</td>';
      showDates.forEach(function(d){
        var v=vals[d];
        if(v&&v>0){
          var bg=v<=10?'#dcfce7':v<=20?'#fef9c3':v<=50?'#fee2e2':'#fecaca';
          var fg=v<=10?'#15803d':v<=20?'#a16207':v<=50?'#dc2626':'#991b1b';
          html+='<td style="text-align:center;padding:4px 6px;background:'+bg+';color:'+fg+';font-weight:700;border-bottom:1px solid var(--border)">#'+v+'</td>';
        } else {
          html+='<td style="text-align:center;padding:4px 6px;color:var(--muted);border-bottom:1px solid var(--border)">—</td>';
        }
      });
      html+='</tr>';
    });
    html+='</tbody></table></div>';
  });
  html+='</div>';

  // ── 8C: Position Trend Line Chart (SVG) ──
  html+='<div class="sec" style="margin-top:16px"><div class="sec-title"><div class="num" style="background:#6366f1">8C</div> Position Trend Chart</div>';
  html+='<div class="desc">선이 아래로 갈수록 검색결과 상위 노출. 점 위에 마우스를 올리면 정확한 순위 확인.</div>';

  showBrands.forEach(function(brand){
    var bdata=brands[brand]||{};
    var history=bdata.history||{};
    var keywords=Object.keys(history);
    if(!keywords.length) return;
    var latest=bdata.latest||{};
    var color=brandColors[brand]||'#64748b';

    // Filter to keywords that have at least one positive position
    var activeKws=keywords.filter(function(kw){
      var vals=history[kw]||{};
      for(var i=0;i<dates.length;i++){ if(vals[dates[i]]&&vals[dates[i]]>0) return true; }
      return false;
    });
    if(!activeKws.length) return;

    // Sort by best latest position
    activeKws.sort(function(a,b){
      var la=latest[a]?latest[a].position:999;
      var lb=latest[b]?latest[b].position:999;
      if(la<=0) la=999; if(lb<=0) lb=999;
      return la-lb;
    });

    // Chart dimensions
    var cW=Math.max(800, showDates.length*60);
    var cH=400;
    var padL=50,padR=20,padT=30,padB=60;
    var plotW=cW-padL-padR;
    var plotH=cH-padT-padB;

    // Y axis: position 1 at top, 96 at bottom (inverted — lower position = higher on chart)
    var yMin=1,yMax=96;

    // Color palette for lines
    var kwColors=['#f97316','#3b82f6','#22c55e','#ef4444','#a855f7','#06b6d4','#ec4899','#84cc16','#f59e0b','#6366f1','#14b8a6'];

    html+='<div style="margin:16px 0 6px"><span style="color:'+color+';font-weight:700;font-size:14px">'+brand+'</span></div>';
    html+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">';
    html+='<svg width="'+cW+'" height="'+cH+'" style="font-family:inherit;background:var(--card);border:1px solid var(--border);border-radius:8px">';

    // Grid lines
    var gridPositions=[1,10,20,30,50,96];
    gridPositions.forEach(function(gp){
      var gy=padT+((gp-yMin)/(yMax-yMin))*plotH;
      html+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(cW-padR)+'" y2="'+gy+'" stroke="var(--border)" stroke-dasharray="4,4" />';
      html+='<text x="'+(padL-6)+'" y="'+(gy+4)+'" text-anchor="end" fill="var(--muted)" font-size="10">#'+gp+'</text>';
    });

    // X axis labels
    showDates.forEach(function(d,di){
      var x=padL+(di/(showDates.length-1||1))*plotW;
      var label=d.substring(5);
      html+='<text x="'+x+'" y="'+(cH-padB+16)+'" text-anchor="middle" fill="var(--muted)" font-size="10" transform="rotate(-45,'+x+','+(cH-padB+16)+')">'+label+'</text>';
    });

    // Draw lines for each keyword
    activeKws.forEach(function(kw,kwi){
      var vals=history[kw]||{};
      var kColor=kwColors[kwi%kwColors.length];
      var points=[];
      showDates.forEach(function(d,di){
        var v=vals[d];
        if(v&&v>0){
          var x=padL+(di/(showDates.length-1||1))*plotW;
          var y=padT+((v-yMin)/(yMax-yMin))*plotH;
          points.push({x:x,y:y,v:v,d:d});
        }
      });

      // Draw line segments
      if(points.length>=2){
        var pathD='M'+points[0].x+','+points[0].y;
        for(var pi=1;pi<points.length;pi++){
          pathD+=' L'+points[pi].x+','+points[pi].y;
        }
        html+='<path d="'+pathD+'" fill="none" stroke="'+kColor+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85" />';
      }

      // Draw dots with tooltips
      points.forEach(function(pt){
        html+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="5" fill="'+kColor+'" stroke="white" stroke-width="1.5">';
        html+='<title>'+kw+' — '+pt.d+': #'+pt.v+'</title></circle>';
      });
    });

    // Y-axis label
    html+='<text x="14" y="'+(padT+plotH/2)+'" text-anchor="middle" fill="var(--muted)" font-size="11" transform="rotate(-90,14,'+(padT+plotH/2)+')">Position (lower=better)</text>';

    html+='</svg></div>';

    // Legend
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:8px;padding:8px 0">';
    activeKws.forEach(function(kw,kwi){
      var kColor=kwColors[kwi%kwColors.length];
      var latestPos=latest[kw]&&latest[kw].position>0?'#'+latest[kw].position:'N/F';
      html+='<div style="display:flex;align-items:center;gap:4px;font-size:11px">';
      html+='<span style="display:inline-block;width:12px;height:3px;background:'+kColor+';border-radius:2px"></span>';
      html+='<span style="font-weight:600">'+kw+'</span>';
      html+='<span style="color:var(--muted)">('+latestPos+')</span>';
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div>';

  el.innerHTML=html;
}
