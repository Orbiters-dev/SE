<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financial KPIs Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="fin_data.js"></script>
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--dim:#64748b;--muted:#94a3b8;--a:#10b981;--abg:#ecfdf5;--g:#10b981;--gbg:#ecfdf5;--am:#f59e0b;--ambg:#fffbeb;--r:#ef4444;--rbg:#fef2f2;--c:#0ea5e9;--cbg:#f0f9ff;--p:#6366f1;--mono:'SF Mono','Fira Code',Consolas,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:13px}
.ctr{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
.hero{text-align:center;margin-bottom:16px}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px}.hero h1 span{background:linear-gradient(135deg,#10b981,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--dim);font-size:13px;margin-top:3px}
.hero .meta{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2px 10px;font-size:10px;color:var(--dim);display:inline-flex;align-items:center;gap:4px}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 3px var(--g)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.card h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.card .desc{font-size:10px;color:var(--dim);margin-bottom:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px;margin:10px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.stat .sl{font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
.stat .sv{font-size:22px;font-weight:800;letter-spacing:-.5px;font-family:var(--mono)}
.stat .ss{font-size:9px;color:var(--dim);margin-top:2px}
.stat.green .sv{color:var(--g)}.stat.red .sv{color:var(--r)}.stat.amber .sv{color:var(--am)}.stat.accent .sv{color:var(--a)}.stat.cyan .sv{color:var(--c)}.stat.purple .sv{color:#6366f1}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8fafc;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.3px;font-size:9px;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0}
td{padding:6px 8px;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fffe}
.period-tabs{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:10px}
.period-tabs>div{padding:5px 14px;cursor:pointer;font-weight:700;color:var(--dim);transition:.12s}
.period-tabs>div.on{background:var(--a);color:#fff}
.period-tabs>div:hover:not(.on){background:var(--abg)}
.sec{margin-bottom:24px}
.sec-title{font-size:14px;font-weight:800;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-title .num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;background:var(--a);flex-shrink:0}
.src-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.src-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:10px}
.src-card .sn{font-weight:700;font-size:11px;font-family:var(--mono);color:var(--text);margin-bottom:2px}
.src-card .sd{color:var(--dim);line-height:1.4}
.src-card .sr{float:right;font-size:9px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-weight:600}
.proj{color:#8b5cf6;font-size:9px;font-weight:600;font-family:var(--mono)}
/* Sub-tabs */
.sub-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;overflow-x:auto}
.sub-tab{padding:8px 16px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;border-radius:6px 6px 0 0}
.sub-tab:hover{color:var(--text);background:#f1f5f9}
.sub-tab.active{color:var(--a);border-bottom-color:var(--a);background:var(--abg)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* Position badge */
.pos-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono)}
.pos-top3{background:#ecfdf5;color:#10b981}.pos-top10{background:#fffbeb;color:#f59e0b}.pos-low{background:#fef2f2;color:#ef4444}
/* Sparkline */
.sparkline{display:inline-flex;align-items:end;gap:1px;height:20px;vertical-align:middle}
.sparkline .bar{width:4px;border-radius:1px;min-height:1px}
/* Volume bar */
.vol-bar{height:6px;border-radius:3px;background:#e2e8f0;position:relative;overflow:hidden;min-width:60px}
.vol-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#10b981,#0ea5e9)}
/* ── SVG Chart Tooltip ── */
.fin-tooltip{position:fixed;pointer-events:none;background:#1e293b;color:#fff;padding:6px 10px;border-radius:6px;font-size:10px;font-family:var(--mono);line-height:1.5;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:220px;white-space:nowrap}
.fin-tooltip .tt-date{color:#94a3b8;font-size:9px;margin-bottom:2px}
.fin-tooltip .tt-row{display:flex;align-items:center;gap:4px}
.fin-tooltip .tt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* ── Mobile Responsive ── */
@media(max-width:700px){
  .ctr{padding:12px 8px 60px}
  .hero h1{font-size:18px}
  .hero .sub{font-size:11px}
  /* Nav bar */
  .ctr>div:first-child>div{flex-direction:column;border-radius:8px}
  .ctr>div:first-child>div>*{padding:6px 14px!important;font-size:11px!important;text-align:center}
  /* Stats */
  .stats{grid-template-columns:repeat(2,1fr);gap:4px}
  .stat{padding:8px}.stat .sv{font-size:16px}
  /* Source grid */
  .src-grid{grid-template-columns:1fr}
  /* Sub tabs: horizontal scroll */
  .sub-tabs{font-size:10px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sub-tab{padding:6px 12px;font-size:10px;flex-shrink:0}
  /* Tables: horizontal scroll */
  .card{padding:10px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sec{margin-bottom:16px}
  table{min-width:500px}
  th{padding:5px 5px;font-size:8px}td{padding:4px 5px;font-size:10px}
  /* Section titles */
  .sec-title{font-size:12px;flex-wrap:wrap}
  .sec-title .num{width:20px;height:20px;font-size:10px}
  /* Period tabs */
  .period-tabs>div{padding:5px 10px;font-size:9px}
  /* Login gate */
  #login-gate>div{padding:28px 20px!important;width:92%!important}
}
</style>
</head>
<body>
<div class="fin-tooltip" id="fin-tt"></div>

<!-- LOGIN GATE -->
<div id="login-gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="background:var(--card);border-radius:16px;padding:48px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.06);border:1px solid var(--border);text-align:center">
    <div style="font-size:32px;margin-bottom:8px">&#x1F4CA;</div>
    <h2 style="font-size:18px;font-weight:800;margin-bottom:4px">Financial KPIs</h2>
    <p style="font-size:11px;color:var(--dim);margin-bottom:24px">Sign in to access the dashboard</p>
    <input type="text" id="login-uid" placeholder="User ID" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:8px;font-family:inherit" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()">
    <input type="password" id="login-pw" placeholder="Password" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:16px;font-family:inherit" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;background:var(--a);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Sign In</button>
    <div id="login-err" style="color:var(--r);font-size:11px;margin-top:10px;display:none"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="display:none">
<div class="ctr">

<!-- Top nav -->
<div style="display:flex;justify-content:center;gap:4px;margin-bottom:20px">
  <div style="display:inline-flex;border:2px solid #e2e8f0;border-radius:10px;overflow:hidden;font-size:12px;font-weight:700">
    <a href="../ppc-dashboard/index.html" style="padding:8px 20px;color:#64748b;text-decoration:none;cursor:pointer;transition:.15s;display:flex;align-items:center" onmouseover="this.style.background='#eef2ff';this.style.color='#6366f1'" onmouseout="this.style.background='';this.style.color='#64748b'">Amazon PPC</a>
    <a href="../content-dashboard/index.html" style="padding:8px 20px;color:#64748b;text-decoration:none;cursor:pointer;transition:.15s;display:flex;align-items:center" onmouseover="this.style.background='#fce7f3';this.style.color='#ec4899'" onmouseout="this.style.background='';this.style.color='#64748b'">Content Intelligence</a>
    <a href="../pipeline-dashboard/index.html" style="padding:8px 20px;color:#64748b;text-decoration:none;cursor:pointer;transition:.15s;display:flex;align-items:center" onmouseover="this.style.background='#fef3c7';this.style.color='#f59e0b'" onmouseout="this.style.background='';this.style.color='#64748b'">Pipeline CRM</a>
    <div style="padding:8px 20px;background:#10b981;color:#fff;cursor:default">Financial KPIs</div>
  </div>
</div>

<div class="hero">
  <h1>Financial <span>KPIs</span></h1>
  <div class="sub">Revenue, Ad Performance, Margins & Traffic Analytics</div>
  <div class="meta" id="hero-meta"></div>
</div>

<!-- Sub-tabs -->
<div class="sub-tabs" id="fin-sub-tabs"></div>

<!-- Tab panels container -->
<div id="fin-panels"></div>

</div>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
var AUTH_USERS = {
  'WJ':  'a619397d21c5fd5daa1d55bbdef5e99383dadb69f602a0110a9d56cb7b776fbd',
  'CAL': 'a1a137c402f2a79391d3ecd012536dc6a2dc6e4e3ee32c2880d01afa04f7402c',
  'MJ':  'c8fe37479a933b489c5d4a1ff509cbe60095246f1e42f383bc017cb77b3efcbb',
  'HJ':  '75c2e5a66c6bcc985f42b6d402dbb10050a09c9f0371ed735e1983c145da3ffe',
  'JS':  '89d0eb2d586787c34782b6fa71300419edb51538e74596a8c7948c0abca66e6d',
  'HC':  '357fca21bafbd5f23f141ff9433fe47422f58e9b0521c04e5735ae727313aef5'
};
async function sha256(s){var e=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')}
async function doLogin(){
  var uid=document.getElementById('login-uid').value.trim().toUpperCase();
  var pw=document.getElementById('login-pw').value;
  if(!uid||!pw){document.getElementById('login-err').textContent='Enter ID and password';document.getElementById('login-err').style.display='block';return;}
  var hash=await sha256(pw+uid.toLowerCase());
  if(AUTH_USERS[uid]&&AUTH_USERS[uid]===hash){
    localStorage.setItem('fin_auth',JSON.stringify({uid:uid,ts:Date.now()}));
    showDashboard();
  }else{document.getElementById('login-err').textContent='Invalid credentials';document.getElementById('login-err').style.display='block';}
}
function checkAuth(){
  var s=localStorage.getItem('fin_auth');
  if(!s)return false;
  try{var d=JSON.parse(s);return(Date.now()-d.ts)<30*86400000;}catch(e){return false;}
}
function showDashboard(){
  document.getElementById('login-gate').style.display='none';
  document.getElementById('main-content').style.display='block';
  renderFinancial();
}
if(checkAuth()) showDashboard();

// ── Tooltip ──────────────────────────────────────────────────────────────────
function showTT(evt, html){
  var tt=document.getElementById('fin-tt');
  tt.innerHTML=html;
  tt.style.display='block';
  var r=tt.getBoundingClientRect();
  var x=evt.clientX+12, y=evt.clientY-r.height-8;
  if(x+r.width>window.innerWidth) x=evt.clientX-r.width-12;
  if(y<4) y=evt.clientY+16;
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}
function hideTT(){ var tt=document.getElementById('fin-tt'); tt.style.display='none'; }

// ── Helpers ──────────────────────────────────────────────────────────────────
function $(v){ return typeof v==='number'?'$'+v.toLocaleString():v; }
function num(v){ return typeof v==='number'?v.toLocaleString():v; }
function pct(v){ return (typeof v==='number'?v.toFixed(1):'0')+'%'; }

function fmCell(actual, projected, isLast, opts){
  opts=opts||{};
  var sty='text-align:right;font-family:var(--mono);font-size:'+(opts.fs||'10px');
  if(opts.color) sty+=';color:'+opts.color;
  if(opts.bold) sty+=';font-weight:700';
  var prefix=opts.prefix||'';
  var suffix=opts.suffix||'';
  if(isLast && projected && projected !== actual){
    return '<td style="'+sty+'">'+prefix+$(actual)+suffix+' <span class="proj">('+prefix+$(projected)+suffix+')</span></td>';
  }
  return '<td style="'+sty+'">'+prefix+$(actual)+suffix+'</td>';
}

function posBadge(pos){
  if(pos<=0) return '<span class="pos-badge pos-low">--</span>';
  var cls=pos<=3?'pos-top3':pos<=10?'pos-top10':'pos-low';
  return '<span class="pos-badge '+cls+'">'+pos.toFixed(1)+'</span>';
}

function sparkline(values, color, invert){
  // invert=true means lower is better (position)
  var vals=values.filter(function(v){return v!==null&&v!==undefined});
  if(!vals.length) return '';
  var maxV=Math.max.apply(null,vals)||1;
  var h='<span class="sparkline">';
  values.forEach(function(v){
    if(v===null||v===undefined){h+='<span class="bar" style="width:4px;height:1px;background:#e2e8f0"></span>';return;}
    var pct=invert?(1-v/maxV):(v/maxV);
    pct=Math.max(pct,0.05);
    var c=color||'#10b981';
    if(invert){ c=v<=3?'#10b981':v<=10?'#f59e0b':'#ef4444'; }
    h+='<span class="bar" style="height:'+Math.round(pct*20)+'px;background:'+c+'"></span>';
  });
  h+='</span>';
  return h;
}

function volBar(vol, maxVol){
  var pct=maxVol>0?Math.min(vol/maxVol*100,100):0;
  return '<span class="vol-bar"><span class="fill" style="width:'+pct+'%"></span></span>';
}

function barChart(datasets, labels, opts){
  var w=opts.w||900, h=opts.h||170, pad=44, barW=opts.barW||12;
  var pfx=opts.prefix||'$';
  var n=labels.length, gapX=(w-pad*2)/n;
  var allVals=[]; datasets.forEach(function(ds){ ds.data.forEach(function(v){ allVals.push(Math.abs(v)); }); });
  var maxV=Math.max.apply(null, allVals)||1;
  if(opts.stacked){
    var stackMax=0;
    for(var i=0;i<n;i++){
      var s=0; datasets.forEach(function(ds){ s+=Math.abs(ds.data[i]||0); }); if(s>stackMax) stackMax=s;
    }
    maxV=stackMax;
  }
  var scaleY=(h-pad-24)/maxV;
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;max-height:'+h+'px">';
  for(var g=0;g<4;g++){
    var gy=h-pad-((h-pad-24)/3*g);
    var gv=Math.round(maxV/3*g);
    svg+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(w-10)+'" y2="'+gy+'" stroke="#e2e8f0" stroke-width="0.5"/>';
    svg+='<text x="'+(pad-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#94a3b8" font-size="8" font-family="var(--mono)">'+pfx+(gv>=1000?Math.round(gv/1000)+'K':gv)+'</text>';
  }
  if(opts.stacked){
    for(var i=0;i<n;i++){
      var x=pad+gapX*i+gapX/2;
      var yBase=h-pad;
      datasets.forEach(function(ds){
        var v=Math.abs(ds.data[i]||0), bh=v*scaleY;
        svg+='<rect x="'+(x-barW/2)+'" y="'+(yBase-bh)+'" width="'+barW+'" height="'+Math.max(bh,0.5)+'" fill="'+ds.color+'" rx="2" opacity="0.85"/>';
        yBase-=bh;
      });
      svg+='<text x="'+x+'" y="'+(h-pad+14)+'" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">'+labels[i]+'</text>';
    }
  } else {
    var numDs=datasets.length, totalBarW=barW*numDs+2*(numDs-1);
    for(var i=0;i<n;i++){
      var cx=pad+gapX*i+gapX/2;
      datasets.forEach(function(ds, di){
        var v=Math.abs(ds.data[i]||0), bh=v*scaleY;
        var bx=cx-totalBarW/2+di*(barW+2);
        svg+='<rect x="'+bx+'" y="'+(h-pad-bh)+'" width="'+barW+'" height="'+Math.max(bh,0.5)+'" fill="'+ds.color+'" rx="2" opacity="0.85"/>';
      });
      svg+='<text x="'+cx+'" y="'+(h-pad+14)+'" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">'+labels[i]+'</text>';
    }
  }
  // Tooltip hit areas per label group
  for(var i=0;i<n;i++){
    var hx=pad+gapX*i, hw=gapX;
    var ttHtml='<div class=tt-date>'+labels[i].replace(/'/g,'\\&#39;')+'</div>';
    datasets.forEach(function(ds){
      var v=Math.abs(ds.data[i]||0);
      ttHtml+='<div class=tt-row><span class=tt-dot style=background:'+ds.color+'></span>'+ds.label+': '+pfx+v.toLocaleString()+'</div>';
    });
    svg+='<rect x="'+hx+'" y="20" width="'+hw+'" height="'+(h-pad-20)+'" fill="transparent" style="cursor:crosshair"'
      +' onmousemove="showTT(event,\''+ttHtml.replace(/'/g,"\\'")+'\')" onmouseleave="hideTT()"/>';
  }
  var lx=pad;
  datasets.forEach(function(ds){
    svg+='<rect x="'+lx+'" y="4" width="10" height="10" fill="'+ds.color+'" rx="2"/>';
    svg+='<text x="'+(lx+14)+'" y="12" fill="#64748b" font-size="9" font-weight="600">'+ds.label+'</text>';
    lx+=ds.label.length*6+28;
  });
  svg+='</svg>';
  return svg;
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchFinTab(tabId){
  document.querySelectorAll('[data-tab].sub-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');p.style.display='none';});
  var tab=document.querySelector('[data-tab="'+tabId+'"]');
  var panel=document.getElementById('panel-'+tabId);
  if(tab) tab.classList.add('active');
  if(panel){panel.classList.add('active');panel.style.display='block';}
  if(history.replaceState) history.replaceState(null,null,'#'+tabId);
}

function switchSeoBrand(brand){
  // Toggle brand sub-tab styling
  document.querySelectorAll('[data-seo-brand]').forEach(function(t){
    var b=t.getAttribute('data-seo-brand');
    var col=b==='All'?'#64748b':({'Grosmimi':'#8b5cf6','Naeiae':'#eab308','CHA&MOM':'#0ea5e9','Onzenna':'#ec4899','Alpremio':'#f97316'})[b]||'#94a3b8';
    if(b===brand){t.style.background=col;t.style.color='#fff';}
    else{t.style.background='transparent';t.style.color=col;}
  });
  // Toggle panels
  document.querySelectorAll('.seo-brand-panel').forEach(function(p){
    p.style.display=p.getAttribute('data-seo-panel')===brand?'':'none';
  });
}

// ── Main Render ──────────────────────────────────────────────────────────────
function renderFinancial(){
  var F = (typeof FIN_DATA !== 'undefined') ? FIN_DATA : null;
  if(!F){
    document.getElementById('fin-panels').innerHTML='<div class="card"><h3>No Data Available</h3><div class="desc">Run: python tools/generate_fin_data.py</div></div>';
    return;
  }

  var months=F.months||[];
  var pm=F.partial_month||{};
  var lastIdx=months.length-1;
  var isPartialLast=pm.is_partial && months[lastIdx]===pm.month;

  var mLabels=months.map(function(m,i){
    var parts=m.split('-');
    var label=parts[1]+'/'+parts[0].substring(2);
    if(i===lastIdx && isPartialLast) label+=' ('+pm.days_elapsed+'d)';
    return label;
  });

  // Hero meta
  var metaHtml='<span class="pill"><span class="dot"></span>Through '+F.through_date+'</span>';
  metaHtml+='<span class="pill">Generated '+F.generated_pst+'</span>';
  if(isPartialLast) metaHtml+='<span class="pill" style="border-color:#8b5cf6;color:#8b5cf6">'+pm.month+' = '+pm.days_elapsed+'/'+pm.days_in_month+'d &middot; FM &times;'+pm.multiplier.toFixed(2)+'</span>';
  document.getElementById('hero-meta').innerHTML=metaHtml;

  // ── Build sub-tabs ─────────────────────────────────────────────────────────
  var tabs=[
    {id:'summary',label:'Summary'},

    html+='<td style="text-align:right;font-weight:700;font-family:var(--mono);font-size:10px;background:#f0fdf4">'+$(total)+'</td></tr>';
  });
  var grandTotals=months.map(function(_,mi){ var t=0; Object.keys(F.brand_revenue).forEach(function(b){ t+=F.brand_revenue[b].monthly[mi]||0; }); return t; });
  var grandProj=months.map(function(_,mi){ var t=0; Object.keys(F.brand_revenue).forEach(function(b){ t+=(F.brand_revenue[b].monthly_proj||F.brand_revenue[b].monthly)[mi]||0; }); return t; });

  // % share
  Object.keys(F.brand_revenue).forEach(function(b){
    html+='<tr style="color:var(--muted);font-size:9px"><td style="padding-left:14px">'+b+'</td>';
    F.brand_revenue[b].monthly.forEach(function(v,i){
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(grandTotals[i]>0?(v/grandTotals[i]*100).toFixed(1):'0')+'%</td>';
    });
    var gt=grandTotals.reduce(function(a,c){return a+c;},0);
    var bt=F.brand_revenue[b].monthly.reduce(function(a,c){return a+c;},0);
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(gt>0?(bt/gt*100).toFixed(1):'0')+'%</td></tr>';
  });

}

  html+='<tr style="border-top:2px solid var(--border);font-weight:800"><td>TOTAL</td>';

      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(chTotals[i]>0?(v/chTotals[i]*100).toFixed(1):'0')+'%</td>';

function buildAdTable(F, months, mLabels, lastIdx, isPartialLast, compact){
  var si=F.ad_start_idx||0;

  var aLen=aLabels.length;
  var aLastIdx=aLen-1;
  var isPartialA=isPartialLast&&(si+aLastIdx===lastIdx);
  var html='<div class="sec"><div class="sec-title"><div class="num">4</div> Ad Platform Performance (Jan 2026+)</div>';
  html+='<div class="card">';
  var adDs=[];
  var adOrder=["Amazon Ads","Meta CVR","Meta Traffic","Google Ads"];
  var adKeys=adOrder.filter(function(p){return F.ad_performance[p];});
  adKeys.forEach(function(p){
    adDs.push({label:p, data:F.ad_performance[p].spend.slice(si), color:F.ad_performance[p].color});
  });
  html+=barChart(adDs, aLabels, {w:940,h:compact?150:190,barW:compact?12:16,stacked:true});
  html+='<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th>Platform</th>';
  aLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===aLastIdx&&isPartialA?';background:#f5f3ff':'')+'" colspan="3">'+m+'</th>'; });
  html+='</tr><tr><th></th>';
  aLabels.forEach(function(m,i){
    var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
    html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Sales</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">ROAS</th>';
  });
  html+='</tr></thead><tbody>';
  adKeys.forEach(function(p){
    var ap=F.ad_performance[p];
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+ap.color+';margin-right:6px"></span><b>'+p+'</b></td>';
    for(var i=0;i<aLen;i++){
      var gi=si+i;
      var sp=ap.spend[gi]||0, sl=ap.sales[gi]||0;

      var slP=(ap.sales_proj||[])[gi]||sl;
      var roas=sp>0?(sl/sp):0;
      var rc=roas>=3?'var(--g)':roas>=1.5?'var(--am)':'var(--r)';
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(sp, spP, isL, {fs:'9px'});
      html+=fmCell(sl, slP, isL, {fs:'9px'});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+roas.toFixed(1)+'x</td>';
    }
    html+='</tr>';
  });
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td>';
  for(var i=0;i<aLen;i++){
    var gi=si+i;
    var ts=0,tl=0,tsP=0,tlP=0;
    adKeys.forEach(function(p){
      ts+=F.ad_performance[p].spend[gi]||0; tl+=F.ad_performance[p].sales[gi]||0;
      tsP+=(F.ad_performance[p].spend_proj||F.ad_performance[p].spend)[gi]||0;
      tlP+=(F.ad_performance[p].sales_proj||F.ad_performance[p].sales)[gi]||0;
    });
    var isL=i===aLastIdx&&isPartialA;
    html+=fmCell(ts, tsP, isL, {fs:'9px',bold:true});
    html+=fmCell(tl, tlP, isL, {fs:'9px',bold:true});
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(ts>0?(tl/ts).toFixed(1):'0')+'x</td>';
  }
  html+='</tr></tbody></table></div></div>';

  // ── Ads Landing Channel TROAS ──
  if(F.ads_landing){
    html+='<div class="card" style="margin-top:12px">';
    html+='<div style="font-size:13px;font-weight:700;margin-bottom:4px">Ads Landing &mdash; Channel Revenue &amp; TROAS</div>';
    html+='<div class="desc">TROAS = Total channel revenue / Ad spend attributed to that channel. Onzenna = Google Ads + Meta CVR. Amazon = Amazon Ads + Meta Traffic.</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th>Channel</th><th style="font-size:8px;color:var(--muted)">Platforms</th>';
    aLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===aLastIdx&&isPartialA?';background:#f5f3ff':'')+'" colspan="3">'+m+'</th>'; });
    html+='</tr><tr><th></th><th></th>';
    aLabels.forEach(function(m,i){
      var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
      html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Revenue</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">TROAS</th>';
    });
    html+='</tr></thead><tbody>';
    var landOrder=["Onzenna","Amazon"];
    var landColors={"Onzenna":"#6366f1","Amazon":"#f59e0b"};
    var totSp=[],totRv=[];
    for(var i=0;i<aLen;i++){totSp.push(0);totRv.push(0);}
    landOrder.forEach(function(ch){
      var ld=F.ads_landing[ch]; if(!ld) return;
      html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+(landColors[ch]||'#999')+';margin-right:6px"></span><b>'+ch+'</b></td>';
      html+='<td style="font-size:8px;color:var(--muted)">'+ld.platforms+'</td>';
      for(var i=0;i<aLen;i++){
        var gi=si+i;
        var sp=ld.spend[gi]||0, rv=ld.revenue[gi]||0;
        var spP=(ld.spend_proj||[])[gi]||sp;
        var rvP=(ld.revenue_proj||[])[gi]||rv;
        var troas=sp>0?(rv/sp):0;
        var tc=troas>=5?'var(--g)':troas>=2?'var(--am)':'var(--r)';
        var isL=i===aLastIdx&&isPartialA;
        totSp[i]+=sp; totRv[i]+=rv;
        html+=fmCell(sp, spP, isL, {fs:'9px'});
        html+=fmCell(rv, rvP, isL, {fs:'9px'});
        html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+tc+'">'+troas.toFixed(1)+'x</td>';
      }
      html+='</tr>';
    });
    html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td><td></td>';
    for(var i=0;i<aLen;i++){
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(totSp[i], totSp[i], isL, {fs:'9px',bold:true});
      html+=fmCell(totRv[i], totRv[i], isL, {fs:'9px',bold:true});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(totSp[i]>0?(totRv[i]/totSp[i]).toFixed(1):'0')+'x</td>';
    }
    html+='</tr></tbody></table></div></div>';
  }

  html+='</div>';
  return html;
}

  }

  (wf.mkt_total||wf.ad_spend).forEach(function(v,i){ html+=fmCell(v, (wf.mkt_total_proj||wf.ad_spend_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',bold:true}); });
  // CM
  html+='</tr><tr style="border-top:2px solid var(--border);font-weight:800"><td style="color:'+(wf.contribution_margin[wf.contribution_margin.length-1]>=0?'#6366f1':'var(--r)')+'">Contribution Margin</td>';
  wf.contribution_margin.forEach(function(v,i){
    html+=fmCell(v, (wf.contribution_margin_proj||[])[i], i===lastIdx&&isPartialLast, {color:v>=0?'#6366f1':'var(--r)',bold:true});
  });
  html+='</tr><tr><td style="padding-left:16px;color:var(--dim)"><b>CM %</b></td>';
  wf.contribution_margin.forEach(function(v,i){ var r=wf.revenue[i]; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700">'+(r>0?(v/r*100).toFixed(1):'0')+'%</td>'; });
  html+='</tr></tbody></table></div>';
  // % of Revenue table

  pctRow('<span style="padding-left:8px;color:var(--r)">(-) Discounts</span>', wf.discounts||[]);

function buildPolarPnL(P){
  var ms=P.months;
  var fyIdx=P.fy2025_idx;
  var pm=P.partial_month||{};
  var lastMIdx=ms.length-1;
  var isPartial=pm.is_partial;
  var fmMult=pm.multiplier||1;
  var html='';

  // ── Section 1: Monthly Brand Sales ──
  html+='<div class="sec"><div class="sec-title"><div class="num">3A</div> Monthly Sales by Brand</div>';
  html+='<div class="card"><div class="desc">All brands, LFU+FLT combined (DTC + Amazon). FY2025 = Jan-Dec annual total.</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th>Brand</th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  // Brand rows sorted by FY2025 total desc
  var brands=Object.keys(P.brand_sales);
  brands.sort(function(a,b){ return (P.brand_sales[b].values[fyIdx]||0)-(P.brand_sales[a].values[fyIdx]||0); });

  brands.forEach(function(b){
    var bd=P.brand_sales[b];
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+bd.color+';margin-right:6px"></span><b style="font-size:10px">'+b+'</b></td>';
    bd.values.forEach(function(v,i){
      var sty='text-align:right;font-family:var(--mono);font-size:9px';
      if(i===fyIdx) sty+=';background:#eef2ff;font-weight:800';
      html+='<td style="'+sty+'">'+(v>0?'$'+Math.round(v).toLocaleString():'<span style="color:var(--muted)">-</span>')+'</td>';
    });
    html+='</tr>';
  });

  // TOTAL row
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td><b>TOTAL</b></td>';
  P.total_revenue.forEach(function(v,i){
    var sty='text-align:right;font-family:var(--mono);font-size:10px;font-weight:800';
    if(i===fyIdx) sty+=';background:#e0e7ff';
    html+='<td style="'+sty+'">$'+Math.round(v).toLocaleString()+'</td>';
  });
  html+='</tr></tbody></table></div></div></div>';

  // ── Section 2: P&L Waterfall ──
  html+='<div class="sec"><div class="sec-title"><div class="num">3B</div> P&amp;L Waterfall: Revenue &rarr; GM &rarr; CM</div>';
  html+='<div class="card"><div class="desc">GM = Revenue - COGS. CM = GM - Ads - Influencer. Source: DataKeeper.</div>';

  // Bar chart
  html+=barChart([
    {label:'Gross Margin', data:P.gross_margin.slice(0,fyIdx), color:'#10b981'},
    {label:'Ad Spend', data:P.ad_spend.total.slice(0,fyIdx), color:'#ef4444'},
    {label:'CM (after all)', data:P.cm_final.slice(0,fyIdx).map(function(v){return Math.max(v,0);}), color:'#6366f1'}
  ], ms.slice(0,fyIdx), {w:940,h:190,barW:7});

  // Table
  html+='<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px;white-space:pre-line';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    if(i===lastMIdx&&isPartial) sty+=';background:#f5f3ff;color:#8b5cf6';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  function pnlRow(label, arr, opts){
    opts=opts||{};
    var sty=opts.bold?'font-weight:700;':'';
    sty+=opts.topBorder?'border-top:2px solid var(--border);':'';
    html+='<tr style="'+sty+'"><td style="'+(opts.indent?'padding-left:'+(opts.indent*8)+'px;':'')+'color:'+(opts.color||'var(--text)')+'">'+label+'</td>';
    arr.forEach(function(v,i){
      var cs='text-align:right;font-family:var(--mono);font-size:'+(opts.fs||'10')+'px;color:'+(opts.color||'var(--text)');
      if(i===fyIdx) cs+=';background:#eef2ff;font-weight:700';
      if(opts.bold) cs+=';font-weight:700';
      if(i===lastMIdx&&isPartial) cs+=';background:#f5f3ff';
      var prefix=opts.neg&&v>0?'-':'';
      var val=prefix+'$'+Math.abs(Math.round(v)).toLocaleString();
      // Partial month: show FM projection in smaller text
      if(i===lastMIdx&&isPartial&&fmMult>1&&!opts.noproj){
        var proj=Math.round(Math.abs(v)*fmMult);
        val+='<div style="font-size:7px;color:#8b5cf6">('+prefix+'$'+proj.toLocaleString()+')</div>';
      }
      html+='<td style="'+cs+'">'+val+'</td>';
    });
    html+='</tr>';
  }

  function pctRow(label, numer, denom, opts){
    opts=opts||{};
    var sty=opts.topBorder?'border-top:2px solid var(--border);':'';
    html+='<tr style="'+sty+'"><td style="padding-left:16px;color:var(--dim)">'+label+'</td>';
    numer.forEach(function(v,i){
      var d=denom[i]||1;
      var p=d>0?(v/d*100).toFixed(1):'0';
      var cs='text-align:right;font-family:var(--mono);font-size:9px;color:var(--dim)';
      if(i===fyIdx) cs+=';background:#eef2ff';
      html+='<td style="'+cs+'">'+p+'%</td>';
    });
    html+='</tr>';
  }

  pnlRow('Revenue', P.total_revenue, {bold:true});
  pnlRow('(-) COGS', P.cogs, {color:'var(--r)',neg:true,fs:'9'});
  pnlRow('Gross Margin', P.gross_margin, {bold:true,topBorder:true,color:'var(--g)'});
  pctRow('GM %', P.gross_margin, P.total_revenue);

  // Separator
  html+='<tr><td colspan="'+(ms.length+1)+'" style="padding:3px 0;border:none"><div style="border-top:1px dashed var(--border)"></div></td></tr>';

  // Ad Spend breakdown
  pnlRow('(-) Ad Spend Total', P.ad_spend.total, {bold:true,color:'var(--r)',neg:true});
  pnlRow('ONZENNA (Meta+Google+TT+T+)', P.ad_spend.onzenna, {indent:2,color:'var(--r)',fs:'9',neg:true});
  pnlRow('Amazon Ads', P.ad_spend.amazon, {indent:2,color:'var(--r)',fs:'9',neg:true});

  // Discounts
  pnlRow('(-) Discounts', P.discounts, {color:'var(--r)',neg:true});
  if(P.discounts_detail){
    pnlRow('Shopify Promo Disc', P.discounts_detail.shopify_disc, {indent:2,color:'var(--muted)',fs:'8',neg:true,noproj:true});
    pnlRow('Amazon Ref Fee (15%)', P.discounts_detail.amz_ref_fee, {indent:2,color:'var(--muted)',fs:'8',neg:true,noproj:true});
  }

  // Influencer
  pnlRow('(-) Influencer / Collab', P.influencer_spend, {color:'var(--r)',fs:'9',neg:true});
  if(P.influencer_detail){
    pnlRow('Paid (PayPal)', P.influencer_detail.paid, {indent:2,color:'var(--muted)',fs:'8',neg:true});
    pnlRow('Non-Paid (COGS+Ship)', P.influencer_detail.nonpaid, {indent:2,color:'var(--muted)',fs:'8',neg:true});
  }

  // MKT Total
  var mkt_total=P.ad_spend.total.map(function(v,i){ return v+(P.discounts[i]||0)+(P.influencer_spend[i]||0); });
  pnlRow('(-) MKT Total', mkt_total, {bold:true,topBorder:true,color:'var(--r)',neg:true});
  pctRow('MKT %', mkt_total, P.total_revenue);

  // CM after ads
  pnlRow('CM after Ads', P.cm_after_ads, {bold:true,topBorder:true,color:'#6366f1'});
  pctRow('CM %', P.cm_after_ads, P.total_revenue);

  // Final CM
  pnlRow('CM after Ads + Influencer', P.cm_final, {bold:true,topBorder:true,color:P.cm_final[P.cm_final.length-1]>=0?'#6366f1':'var(--r)'});
  pctRow('CM %', P.cm_final, P.total_revenue);

  html+='</tbody></table></div>';

  // ── Section 3: ROAS summary ──
  html+='<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">ROAS by Channel</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  function roasRow(label,sales,spend){
    html+='<tr><td style="font-size:10px">'+label+'</td>';
    sales.forEach(function(s,i){
      var sp=spend[i]||0;
      var r=sp>0?s/sp:0;
      var c=r>=3?'var(--g)':r>=1.5?'var(--am)':sp>0?'var(--r)':'var(--muted)';
      var cs='text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+c;
      if(i===fyIdx) cs+=';background:#eef2ff';
      html+='<td style="'+cs+'">'+(sp>0?r.toFixed(1)+'x':'-')+'</td>';
    });
    html+='</tr>';
  }

  roasRow('ONZENNA ROAS', P.sales_from_ads.onzenna, P.ad_spend.onzenna);
  roasRow('Amazon ROAS', P.sales_from_ads.amazon, P.ad_spend.amazon);
  roasRow('Total ROAS', P.sales_from_ads.total, P.ad_spend.total);
  // TROAS = total sales / ad spend
  roasRow('<b>TROAS (Total Rev / Ad$)</b>', P.total_revenue, P.ad_spend.total);

  html+='</tbody></table></div></div>';

  // ── Section 4: Paid vs Organic ──
  html+='<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">Paid vs Organic Sales</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';
  pnlRow('Paid (Ad-attributed)', P.sales_from_ads.total, {color:'#6366f1',fs:'9'});
  pnlRow('Organic', P.organic.total, {color:'var(--g)',fs:'9'});
  pctRow('Organic %', P.organic.total, P.total_revenue);
  html+='</tbody></table></div></div>';

  html+='</div></div>';
  return html;
}

// ── Keyword Performance (2.1) ─────────────────────────────────────────────
function buildKeywordPerformance(F){
  var kp=F.keyword_performance;
  if(!kp||!kp.periods) return '';
  var brands=kp.brands||[];
  var periods=kp.periods;
  var periodKeys=Object.keys(periods);
  var html='<div class="sec"><div class="sec-title"><div class="num" style="background:#f59e0b;color:#fff">2.1</div> Keyword Performance (Amazon Search Terms)</div>';
  html+='<div class="card"><div class="desc">Amazon Ads search term performance by brand. Data: '+kp.date_range+'</div>';

  // Brand toggle
  html+='<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">';
  brands.forEach(function(b,i){
    var active=i===0?'background:var(--a);color:#fff':'background:var(--bg2);color:var(--dim)';
    html+='<div class="kp-brand-btn" data-brand="'+b+'" style="padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;'+active+'" onclick="switchKwBrand(\''+b+'\')">'+b+'</div>';
  });
  html+='</div>';

  // Period toggle
  html+='<div style="display:flex;gap:4px;margin-bottom:12px">';
  periodKeys.forEach(function(pk,i){
    var p=periods[pk];
    var active=i===0?'background:var(--a);color:#fff':'background:var(--bg2);color:var(--dim)';
    html+='<div class="kp-period-btn" data-period="'+pk+'" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;'+active+'" onclick="switchKwPeriod(\''+pk+'\')">'+p.label+'</div>';
  });
  html+='</div>';

  // View toggle (Top ROAS / Worst ROAS)
  html+='<div style="display:flex;gap:4px;margin-bottom:12px">';
  html+='<div class="kp-view-btn" data-view="top" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:var(--a);color:#fff" onclick="switchKwView(\'top\')">Top 100 (Best ROAS)</div>';
  html+='<div class="kp-view-btn" data-view="worst" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--dim)" onclick="switchKwView(\'worst\')">Worst 100 (Lowest ROAS)</div>';
  html+='</div>';

  // Table container
  html+='<div id="kp-table"></div>';
  html+='</div></div>';

  // Store data globally (rendered via window.renderKwTable after DOM insertion)
  window.KP_DATA=periods;
  window.KP_BRAND=brands[0]||'';
  window.KP_PERIOD=periodKeys[0]||'7d';
  window.switchKwBrand=function(b){window.KP_BRAND=b;window.renderKwTable();document.querySelectorAll(".kp-brand-btn").forEach(function(el){el.style.background=el.dataset.brand===b?"var(--a)":"var(--bg2)";el.style.color=el.dataset.brand===b?"#fff":"var(--dim)";});};
  window.switchKwPeriod=function(p){window.KP_PERIOD=p;window.renderKwTable();document.querySelectorAll(".kp-period-btn").forEach(function(el){el.style.background=el.dataset.period===p?"var(--a)":"var(--bg2)";el.style.color=el.dataset.period===p?"#fff":"var(--dim)";});};
  window.KP_VIEW="top";
  window.switchKwView=function(v){window.KP_VIEW=v;window.renderKwTable();document.querySelectorAll(".kp-view-btn").forEach(function(el){el.style.background=el.dataset.view===v?"var(--a)":"var(--bg2)";el.style.color=el.dataset.view===v?"#fff":"var(--dim)";});};
  window.renderKwTable=function(){
    var brandData=(window.KP_DATA[window.KP_PERIOD]||{}).data||{};
    var bd=brandData[window.KP_BRAND]||{};
    var kws=bd[window.KP_VIEW]||bd.top||[];
    var h='<div style="overflow-x:auto"><table><thead><tr>';
    h+='<th>#</th><th>Keyword</th><th style="text-align:right">Spend</th><th style="text-align:right">Sales</th>';
    h+='<th style="text-align:right">ROAS</th><th style="text-align:right">CPC</th><th style="text-align:right">CTR</th>';
    h+='<th style="text-align:right">Clicks</th><th style="text-align:right">Impr</th><th style="text-align:right">Orders</th>';
    h+='</tr></thead><tbody>';
    kws.forEach(function(k,i){
      var rc=k.roas>=3?'var(--g)':k.roas>=1.5?'var(--am)':'var(--r)';
      var cc=k.cpc<=0.5?'var(--g)':k.cpc<=1.5?'var(--am)':'var(--r)';
      h+='<tr><td style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
      h+='<td style="font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+k.keyword+'">'+k.keyword+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">$'+k.spend.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">$'+k.sales.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc+'">'+k.roas.toFixed(1)+'x</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:'+cc+'">$'+k.cpc.toFixed(2)+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.ctr.toFixed(1)+'%</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.clicks.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:var(--muted)">'+k.impressions.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.purchases+'</td></tr>';
    });
    if(!kws.length) h+='<tr><td colspan=10 style="text-align:center;color:var(--muted);padding:20px">No keyword data for this brand/period</td></tr>';
    h+='</tbody></table></div>';
    var el=document.getElementById("kp-table");
    if(el) el.innerHTML=h;
  };
  return html;
}

// ── Channel P&L (Monthly) ─────────────────────────────────────────────────
function buildChannelPnL(P){
  var cp=P.channel_pnl;
  if(!cp) return '';
  var ms=P.months;
  var fyIdx=P.fy2025_idx;
  var channels=Object.keys(cp);
  var html='<div class="sec"><div class="sec-title"><div class="num">3C</div> P&amp;L by Channel</div>';
  html+='<div class="card"><div class="desc">Revenue, COGS, Selling Fees (15% for Amazon &amp; Target+), Fulfillment, Ad Spend per channel. GM = Rev - COGS - Fees - Fulfillment. CM = GM - Ads.</div>';
  // Stacked bar chart - revenue by channel
  var stackDs=[];
  channels.forEach(function(ch){
    var total=(cp[ch].revenue||[]).reduce(function(a,c){return a+c;},0);
    stackDs.push({label:ch, data:(cp[ch].revenue||[]).slice(0,fyIdx), color:cp[ch].color||'#94a3b8', total:total});
  });
  stackDs.sort(function(a,b){return b.total-a.total;});
  html+=barChart(stackDs, ms.slice(0,fyIdx), {w:940,h:170,barW:12,stacked:true});
  // Per-channel mini P&L tables
  channels.forEach(function(ch){
    var d=cp[ch];
    html+='<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px">'
      +'<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+(d.color||'#94a3b8')+'"></span>'+ch+'</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
    ms.forEach(function(m,i){
      var sty='text-align:right;font-size:8px';
      if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
      html+='<th style="'+sty+'">'+m+'</th>';
    });
    html+='</tr></thead><tbody>';
    function chRow(label,arr,opts){
      opts=opts||{};
      html+='<tr style="'+(opts.topBorder?'border-top:2px solid var(--border);':'')+(opts.bold?'font-weight:700;':'')+'"><td style="font-size:10px;color:'+(opts.color||'var(--text)')+'">'+label+'</td>';
      (arr||[]).forEach(function(v,i){
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:'+(opts.color||'var(--text)');
        if(i===fyIdx) cs+=';background:#eef2ff';
        if(opts.bold) cs+=';font-weight:700';
        var prefix=opts.neg&&v>0?'-':'';
        html+='<td style="'+cs+'">'+prefix+'$'+Math.abs(Math.round(v)).toLocaleString()+'</td>';
      });
      html+='</tr>';
    }
    function chPctRow(label,numer,denom){
      html+='<tr><td style="padding-left:12px;font-size:9px;color:var(--dim)">'+label+'</td>';
      (numer||[]).forEach(function(v,i){
        var den=(denom||[])[i]||1;
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:var(--dim)';
        if(i===fyIdx) cs+=';background:#eef2ff';
        html+='<td style="'+cs+'">'+(den>0?(v/den*100).toFixed(1):'0')+'%</td>';
      });
      html+='</tr>';
    }
    chRow('Revenue', d.revenue, {bold:true});
    chRow('(-) COGS', d.cogs, {color:'var(--r)',neg:true});
    // Gross Margin = Revenue - COGS only
    var gm_pure=d.revenue.map(function(r,i){ return r-(d.cogs[i]||0); });
    chRow('Gross Margin', gm_pure, {bold:true,topBorder:true,color:'var(--g)'});
    chPctRow('GM %', gm_pure, d.revenue);
    // Selling fees & fulfillment below GM
    var sf=d.selling_fees||d.fees||[];
    if(sf.some(function(v){return v>0;})){
      chRow('(-) Selling Fees (15%)', sf, {color:'var(--r)',neg:true});
    } else if(ch!=='B2B'){
      chRow('(-) Selling Fees', sf, {color:'var(--dim)',neg:true});
    }
    if(d.fulfillment_nm){
      html+='<tr><td style="font-size:10px;color:var(--dim)">(-) Fulfillment</td>';
      (d.revenue||[]).forEach(function(_,i){
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:#9ca3af';
        if(i===fyIdx) cs+=';background:#eef2ff';
        html+='<td style="'+cs+'">n.m.</td>';
      });
      html+='</tr>';
    } else {
      var fl=d.fulfillment||[];
      if(fl.some(function(v){return v>0;})) chRow('(-) Fulfillment', fl, {color:'var(--r)',neg:true});
    }
    chRow('(-) Ad Spend', d.ad_spend, {color:'var(--r)',neg:true});
    // Contribution Margin = GM - Fees - Fulfillment - Ads (same as d.contribution_margin)
    chRow('Contribution Margin', d.contribution_margin, {bold:true,topBorder:true,color:'#6366f1'});
    chPctRow('CM %', d.contribution_margin, d.revenue);
    html+='</tbody></table></div></div>';
  });
  html+='</div></div>';
  return html;
}

function buildBrandPerfTable(F, months, mLabels, lastIdx, isPartialLast, compact){

  var si=F.ad_start_idx||0;
  var aLabels=mLabels.slice(si);
  var aLen=aLabels.length;
  var aLastIdx=aLen-1;
  var isPartialA=isPartialLast&&(si+aLastIdx===lastIdx);
  var html='<div class="sec"><div class="sec-title">Brand Performance &mdash; Total Sales / Paid / Organic + Ad Spend (Jan 2026+)</div>';
  html+='<div class="card">';
  html+='<div class="desc">Total = Shopify + Amazon. Paid = Ad-attributed. Organic = Total - Paid. ROAS = Ad Sales / Ad$. TROAS = Total Sales / Ad$ (incl organic).</div>';
  if(!compact){
    var stackDs=[];
    Object.keys(bp).forEach(function(b){
      var total=(bp[b].organic||[]).reduce(function(a,c){return a+c;},0)+(bp[b].ad_sales||[]).reduce(function(a,c){return a+c;},0);
      stackDs.push({label:b+' Paid', data:bp[b].ad_sales||[], color:bp[b].color, total:total});
    });
    stackDs.sort(function(a,b){return b.total-a.total;});

  aLabels.forEach(function(m,i){

    html+='<th style="text-align:right;font-size:7px;color:#6366f1'+bg+'">Paid</th>';
    html+='<th style="text-align:right;font-size:7px;color:#10b981'+bg+'">Organic</th>';

    html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">ROAS</th>';
    html+='<th style="text-align:right;font-size:7px;color:#7c3aed'+bg+'">TROAS</th>';

      var paid=bd.ad_sales[i]||0, paidP=(bd.ad_sales_proj||[])[i]||paid;
      var org=(bd.organic||[])[i]||0, orgP=(bd.organic_proj||[])[i]||org;
      var spend=bd.ad_spend[i]||0, spendP=(bd.ad_spend_proj||[])[i]||spend;
      var roas=spend>0?paid/spend:0;
      var troas=spend>0?sales/spend:0;
      var rc=roas>=3?'var(--g)':roas>=1.5?'var(--am)':spend>0?'var(--r)':'var(--muted)';
      var tc=troas>=5?'var(--g)':troas>=2?'#7c3aed':spend>0?'var(--am)':'var(--muted)';
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(sales, salesP, isL, {fs:'9px'});
      html+=fmCell(paid, paidP, isL, {fs:'9px',color:'#6366f1'});
      html+=fmCell(org, orgP, isL, {fs:'9px',color:'var(--g)'});
      html+=fmCell(spend, spendP, isL, {fs:'9px',color:'var(--r)'});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+(spend>0?roas.toFixed(1)+'x':'-')+'</td>';

    }
    html+='</tr>';
  });
  // TOTAL row
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td>';
  for(var i=0;i<aLen;i++){
    var ts=0,tsP=0,tp=0,tpP=0,to=0,toP=0,tsp=0,tspP=0,tasales=0;
    Object.keys(bp).forEach(function(b){
      ts+=bp[b].total_sales[i]||0; tsP+=(bp[b].total_sales_proj||bp[b].total_sales)[i]||0;
      tp+=bp[b].ad_sales[i]||0; tpP+=(bp[b].ad_sales_proj||bp[b].ad_sales)[i]||0;
      to+=(bp[b].organic||[])[i]||0; toP+=(bp[b].organic_proj||bp[b].organic||[])[i]||0;
      tsp+=bp[b].ad_spend[i]||0; tspP+=(bp[b].ad_spend_proj||bp[b].ad_spend)[i]||0;
      tasales+=bp[b].ad_sales[i]||0;
    });
    var isL=i===aLastIdx&&isPartialA;
    html+=fmCell(ts, tsP, isL, {fs:'9px',bold:true});
    html+=fmCell(tp, tpP, isL, {fs:'9px',color:'#6366f1',bold:true});
    html+=fmCell(to, toP, isL, {fs:'9px',color:'var(--g)',bold:true});
    html+=fmCell(tsp, tspP, isL, {fs:'9px',color:'var(--r)',bold:true});
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700">'+(tsp>0?(tasales/tsp).toFixed(1)+'x':'-')+'</td>';

  }
  // Organic % row
  html+='</tr><tr style="color:var(--dim);font-size:9px"><td><b>Organic %</b></td>';
  for(var i=0;i<aLen;i++){
    var ts=0,to=0;
    Object.keys(bp).forEach(function(b){ ts+=bp[b].total_sales[i]||0; to+=(bp[b].organic||[])[i]||0; });
    html+='<td colspan="6" style="text-align:center;font-family:var(--mono);font-size:9px;font-weight:700">'+(ts>0?(to/ts*100).toFixed(1):'0')+'%</td>';
  }
  html+='</tr></tbody></table></div></div></div>';
  return html;
}

// ── Time Grain Toggle (Weekly / Monthly) ────────────────────────────────────
function switchTimeGrain(grain, tabId, el){
  var F=(typeof FIN_DATA!=='undefined')?FIN_DATA:null;
  if(!F)return;
  document.querySelectorAll('#'+tabId+'-grain>div').forEach(function(t){ t.classList.remove('on'); });
  if(el) el.classList.add('on');
  var container=document.getElementById(tabId+'-content');
  if(!container) return;

  var W=F.weekly||{};
  var months=F.months||[];
  var pm=F.partial_month||{};
  var lastIdx=months.length-1;
  var isPartialLast=pm.is_partial && months[lastIdx]===pm.month;
  var mLabels=months.map(function(m,i){
    var parts=m.split('-');
    var label=parts[1]+'/'+parts[0].substring(2);
    if(i===lastIdx && isPartialLast) label+=' ('+pm.days_elapsed+'d)';
    return label;
  });

  if(grain==='weekly'){
    var wLabels=W.week_labels||[];
    var html='';
    if(tabId==='rev'){
      html+=buildWeeklyTable(W.brand_revenue||{}, wLabels, 'Revenue by Brand', '2');
      html+=buildWeeklyTable(W.channel_revenue||{}, wLabels, 'Revenue by Channel', '3');
    } else if(tabId==='ads'){
      html+=buildWeeklyAdTable(F, wLabels);
      html+=buildPlatformAdSections(F, 'weekly');
      html+=buildWeeklyBrandPerfTable(F, wLabels);
      html+=buildCampaignDetail(F, 'weekly');
    } else if(tabId==='mrg'){
      html+=buildWeeklyWaterfall(F, wLabels);
      if(W.channel_pnl) html+=buildWeeklyChannelPnL(W, wLabels);
    }
    container.innerHTML=html;
  } else {
    // Monthly — rebuild original
    var html='';
    if(tabId==='rev'){
      html+=buildBrandTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildChannelTable(F, months, mLabels, lastIdx, isPartialLast, false);
    } else if(tabId==='ads'){
      html+=buildAdTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildPlatformAdSections(F, 'monthly');
      html+=buildBrandPerfTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildCampaignDetail(F, 'monthly');
    } else if(tabId==='mrg'){
      if(F.pnl_polar) html+=buildPolarPnL(F.pnl_polar);
      else html+=buildWaterfall(F, months, mLabels, lastIdx, isPartialLast);
      if(F.pnl_polar && F.pnl_polar.channel_pnl) html+=buildChannelPnL(F.pnl_polar);
    }
    container.innerHTML=html;
  }
}

// ── Weekly generic table (brand/channel revenue) ────────────────────────────

  return html;

function getLandingChannel(campaignName, platform) {
  var n = (campaignName || '').toUpperCase();
  if (platform === 'Amazon Ads') return 'Amazon';
  if (platform === 'Google Ads') return 'Shopify';
  if (platform === 'Meta Traffic') return 'Amazon';
  if (platform === 'Meta CVR') {
    if (n.indexOf('AMZ') >= 0 || n.indexOf('AMAZON') >= 0) return 'Amazon';
    if (n.indexOf('TARGET') >= 0 || n.indexOf('TGT') >= 0) return 'Target+';
    return 'Shopify';
  }
  return 'Shopify';
}

function filterPlatformBrand(platformId, brand, btn) {
  document.querySelectorAll('#'+platformId+'-pills .pill-btn').forEach(function(b){
    var c = b.dataset.color || '#94a3b8';
    b.style.background = 'transparent';
    b.style.color = c;
  });
  var ac = btn.dataset.color || '#94a3b8';
  btn.style.background = ac;
  btn.style.color = '#fff';
  document.querySelectorAll('#'+platformId+'-rows tr[data-brand]').forEach(function(row){
    row.style.display = (brand === 'All' || row.dataset.brand === brand) ? '' : 'none';
  });
}

function buildPlatformAdSections(F, grain) {
  var isWeekly = grain === 'weekly';
  var W = F.weekly || {};
  var bp = isWeekly ? (W.brand_ad_by_platform || {}) : (F.brand_ad_by_platform || {});
  var adMonths = isWeekly ? (W.weeks || []) : (F.months || []).slice(F.ad_start_idx || 0);
  var labels = isWeekly
    ? (W.week_labels || [])
    : adMonths.map(function(m){ var p=m.split('-'); return p[1]+'/'+p[0].substring(2); });

  var PLATFORMS = [
    {key:'Amazon Ads',   color:'#f59e0b', toggle:true,  landing:'Amazon'},
    {key:'Meta CVR',     color:'#3b82f6', toggle:true,  landing:'Shopify'},
    {key:'Meta Traffic', color:'#93c5fd', toggle:true,  landing:'Amazon'},
    {key:'Google Ads',   color:'#22c55e', toggle:false, landing:'Shopify'},
  ];

  var html = '<div class="sec"><div class="sec-title"><div class="num">2B</div> Ad Performance by Platform &amp; Brand</div></div>';

  PLATFORMS.forEach(function(p) {
    var platData = bp[p.key] || {};
    var brands = Object.keys(platData);
    if (!brands.length) return;

    var pid = p.key.replace(/\s+/g,'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
    html += '<div class="sec">';
    html += '<div class="sec-title" style="color:'+p.color+'">'+p.key+'</div>';
    html += '<div class="card">';

    // Brand toggle pills
    if (p.toggle && brands.length > 1) {
      html += '<div id="'+pid+'-pills" style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
      html += '<span class="pill-btn" data-color="'+p.color+'" onclick="filterPlatformBrand(\''+pid+'\',\'All\',this)" style="cursor:pointer;padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid '+p.color+';background:'+p.color+';color:#fff">All</span>';
      brands.forEach(function(b){
        var bc = (platData[b]||{}).color || '#94a3b8';
        html += '<span class="pill-btn" data-color="'+bc+'" onclick="filterPlatformBrand(\''+pid+'\',\''+b+'\',this)" style="cursor:pointer;padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid '+bc+';color:'+bc+';background:transparent">'+b+'</span>';
      });
      html += '</div>';
    }

    // Table
    html += '<div style="overflow-x:auto"><table><thead><tr>';
    html += '<th>Brand</th>';
    labels.forEach(function(l, i){
      html += '<th style="text-align:right;font-size:8px" colspan="2">'+l+'</th>';
    });
    html += '<th style="text-align:right;background:#f0fdf4">Total Spend</th>';
    html += '<th style="text-align:right">ROAS</th></tr>';
    html += '<tr><th></th>';
    labels.forEach(function(){ html += '<th style="text-align:right;font-size:7px;color:var(--muted)">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)">Sales</th>'; });
    html += '<th></th><th></th></tr></thead>';
    html += '<tbody id="'+pid+'-rows">';

    // Sort brands by total spend descending
    var sortedBrands = brands.slice().sort(function(a, b){
      var sa = (platData[a]||{}).spend || [];
      var sb = (platData[b]||{}).spend || [];
      return sa.reduce(function(s,v){return s+v;},0) < sb.reduce(function(s,v){return s+v;},0) ? 1 : -1;
    });

    sortedBrands.forEach(function(brand) {
      var bd = platData[brand] || {};
      var spend = bd.spend || [];
      var sales = bd.sales || [];
      var totalSpend = spend.reduce(function(s,v){return s+v;},0);
      var totalSales = sales.reduce(function(s,v){return s+v;},0);
      var roas = totalSpend > 0 ? totalSales / totalSpend : 0;
      var rc = roas >= 3 ? 'var(--g)' : roas >= 1.5 ? 'var(--am)' : roas > 0 ? 'var(--r)' : 'var(--muted)';
      var bc = bd.color || '#94a3b8';
      html += '<tr data-brand="'+brand+'">';
      html += '<td style="font-weight:600;font-size:10px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+bc+';margin-right:4px"></span>'+brand+'</td>';
      for (var j = 0; j < labels.length; j++) {
        var sp = spend[j] || 0;
        var sa = sales[j] || 0;
        var pr = sp > 0 ? (sa/sp).toFixed(1)+'x' : '—';
        html += '<td style="text-align:right;font-family:var(--mono);font-size:8px">'+$(sp)+'</td>';
        html += '<td style="text-align:right;font-family:var(--mono);font-size:8px">'+$(sa)+'<br><small style="color:var(--muted);font-size:7px">'+pr+'</small></td>';
      }
      html += '<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;background:#f0fdf4">'+$(Math.round(totalSpend))+'</td>';
      html += '<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+roas.toFixed(1)+'x</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div></div></div>';
  });

  // Target+ placeholder
  html += '<div class="sec"><div class="sec-title" style="color:#ef4444">Target+ (Roundel)</div>';
  html += '<div class="card"><div class="desc" style="color:var(--muted)">Roundel Media Studio — data collection pending. n.a.</div></div></div>';

  return html;
}

// ── Campaign sort ────────────────────────────────────────────────────────────
function sortCampaignTable(col) {
  var tbody = document.getElementById('camp-all-tbody');
  if (!tbody) return;
  var state = window._campSortState || {col:'total_spend', dir:'desc'};
  if (state.col === col) { state.dir = state.dir === 'desc' ? 'asc' : 'desc'; }
  else { state.col = col; state.dir = 'desc'; }
  window._campSortState = state;

  // Update header icons
  document.querySelectorAll('#camp-all-table th[data-sort]').forEach(function(th){
    var icon = th.querySelector('.sort-icon');
    if (icon) {
      if (th.dataset.sort === col) icon.textContent = state.dir === 'desc' ? ' ▼' : ' ▲';
      else icon.textContent = ' ⇅';
    }
  });

  var rows = Array.from(tbody.querySelectorAll('tr[data-spend]'));
  rows.sort(function(a, b){
    var av = parseFloat(a.dataset[col] || 0);
    var bv = parseFloat(b.dataset[col] || 0);
    return state.dir === 'desc' ? bv - av : av - bv;
  });
  rows.forEach(function(r){ tbody.appendChild(r); });

  // Re-number rows
  rows.forEach(function(r, i){ var nc = r.querySelector('.row-num'); if(nc) nc.textContent = i+1; });
}

function buildCampaignDetail(F, grain){
  var cd=F.campaign_detail||{};
  var isWeekly=grain==='weekly';
  var entries=isWeekly?(cd.weekly_all||[]):(cd.monthly_all||[]);
  var top=isWeekly?(cd.weekly_top||[]):(cd.monthly_top||[]);
  var bottom=isWeekly?(cd.weekly_bottom||[]):(cd.monthly_bottom||[]);
  var newCamps=cd.new_campaigns||[];
  var labels=isWeekly?(cd.week_labels||[]):[];
  if(!isWeekly && cd.month_keys){
    labels=cd.month_keys.map(function(m){var p=m.split('-');return p[1]+'/'+p[0].substring(2);});
  }

  var html='';

  // Helper: campaign edit link
  function campLink(c){
    var cid=c.campaign_id||c.id||'';
    if(!cid) return '';
    var p=c.platform||'';
    var url='';
    if(p==='Amazon Ads') url='https://advertising.amazon.com/cm/campaigns/'+cid;
    else if(p.indexOf('Meta')>=0) url='https://business.facebook.com/adsmanager/manage/campaigns?act=697498009390362&selected_campaign_ids='+cid;
    else if(p==='Google Ads') url='https://ads.google.com/aw/campaigns?campaignId='+cid;
    if(!url) return '';
    return ' <a href="'+url+'" target="_blank" style="font-size:8px;color:var(--a);text-decoration:none" title="Edit in '+p+'">&#9998;</a>';
  }

  // Helper: campaign row with CPC/CTR
  function campRow(c,i,showRoas){
    var rc=c.roas>=3?'var(--g)':c.roas>=1.5?'var(--am)':'var(--r)';
    var cpcC=c.cpc<=0.5?'var(--g)':c.cpc<=1.5?'var(--am)':'var(--r)';
    var ctrC=c.ctr>=2?'var(--g)':c.ctr>=0.5?'var(--am)':'var(--r)';
    var h='<tr><td style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
    h+='<td style="font-size:10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+campLink(c)+'</td>';
    h+='<td style="font-size:9px;color:var(--dim)">'+c.platform+'</td>';
    h+='<td style="font-size:9px;color:var(--dim)">'+c.brand+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(c.total_spend)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(c.total_sales)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:'+cpcC+'">$'+c.cpc.toFixed(2)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:'+ctrC+'">'+c.ctr.toFixed(1)+'%</td>';
    if(showRoas) h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc+'">'+c.roas.toFixed(1)+'x</td>';
    h+='</tr>';
    return h;
  }

  var campHdr='<th>#</th><th>Campaign</th><th style="font-size:8px;color:var(--muted)">Platform</th><th style="font-size:8px;color:var(--muted)">Brand</th><th style="text-align:right">Spend</th><th style="text-align:right">Sales</th><th style="text-align:right">CPC</th><th style="text-align:right">CTR</th>';

  // ── Top CVR Performers (by ROAS)
  if(top.length){
    html+='<div class="sec"><div class="sec-title" style="color:var(--g)">Top CVR Campaigns (by ROAS)</div>';
    html+='<div class="card"><div style="overflow-x:auto"><table><thead><tr>'+campHdr+'<th style="text-align:right">ROAS</th></tr></thead><tbody>';
    top.forEach(function(c,i){ html+=campRow(c,i,true); });
    html+='</tbody></table></div></div></div>';
  }

  // ── Bottom CVR Performers (by ROAS)
  if(bottom.length){
    html+='<div class="sec"><div class="sec-title" style="color:var(--r)">Underperforming CVR Campaigns (by ROAS)</div>';
    html+='<div class="card"><div style="overflow-x:auto"><table><thead><tr>'+campHdr+'<th style="text-align:right">ROAS</th></tr></thead><tbody>';
    bottom.forEach(function(c,i){ html+=campRow(c,i,true); });
    html+='</tbody></table></div></div></div>';
  }

  // ── Top Traffic Campaigns (by CPC — lower is better)
  var topTraffic=isWeekly?(cd.weekly_top_traffic||[]):(cd.monthly_top_traffic||[]);
  var bottomTraffic=isWeekly?(cd.weekly_bottom_traffic||[]):(cd.monthly_bottom_traffic||[]);
  // Traffic campaigns with Attribution data
  var trafficHdr='<th>#</th><th>Campaign</th><th style="font-size:8px;color:var(--muted)">Platform</th><th style="font-size:8px;color:var(--muted)">Brand</th><th style="text-align:right">Spend</th><th style="text-align:right">CPC</th><th style="text-align:right">CTR</th><th style="text-align:right;color:#f59e0b">Attr. Sales</th><th style="text-align:right;color:#f59e0b">Attr. ROAS</th><th style="text-align:right;color:#8b5cf6">ROAS+BRB</th><th style="text-align:right">Orders</th>';

  function trafficRow(c,i){
    var cc=c.cpc<=0.5?'var(--g)':c.cpc<=1.5?'var(--am)':'var(--r)';
    var ar=c.attr_roas||0;
    var arb=c.attr_roas_adj||0;
    var rc=ar>=2?'var(--g)':ar>=0.5?'var(--am)':'var(--r)';
    var rc2=arb>=2?'var(--g)':arb>=0.5?'var(--am)':'var(--r)';
    var h='<tr><td style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
    h+='<td style="font-size:10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+campLink(c)+'</td>';
    h+='<td style="font-size:9px;color:var(--dim)">'+c.platform+'</td>';
    h+='<td style="font-size:9px;color:var(--dim)">'+c.brand+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(c.total_spend)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:'+cc+'">$'+c.cpc.toFixed(2)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+c.ctr.toFixed(1)+'%</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:#f59e0b">'+(c.attr_sales>0?'$'+c.attr_sales.toLocaleString():'<span style="color:var(--muted)">—</span>')+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc+'">'+(ar>0?ar.toFixed(1)+'x':'<span style="color:var(--muted)">—</span>')+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc2+'">'+(arb>0?arb.toFixed(1)+'x':'<span style="color:var(--muted)">—</span>')+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(c.attr_purchases||0)+'</td></tr>';
    return h;
  }

  if(topTraffic.length){
    html+='<div class="sec"><div class="sec-title" style="color:#f59e0b">Traffic Campaigns (Amazon Attribution ROAS)</div>';
    html+='<div class="card"><div class="desc">Meta Traffic -> Amazon landing. ROAS from Amazon Attribution API. ROAS+BRB includes Brand Referral Bonus (~10%).</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr>'+trafficHdr+'</tr></thead><tbody>';
    topTraffic.forEach(function(c,i){ html+=trafficRow(c,i); });
    html+='</tbody></table></div></div></div>';
  }
  if(bottomTraffic.length&&bottomTraffic[0]!==topTraffic[0]){
    html+='<div class="sec"><div class="sec-title" style="color:var(--r)">Low-Performing Traffic Campaigns</div>';
    html+='<div class="card"><div style="overflow-x:auto"><table><thead><tr>'+trafficHdr+'</tr></thead><tbody>';
    bottomTraffic.forEach(function(c,i){ html+=trafficRow(c,i); });
    html+='</tbody></table></div></div></div>';
  }

  // ── New Campaigns This Month
  if(newCamps.length && !isWeekly){
    html+='<div class="sec"><div class="sec-title" style="color:#6366f1">New Campaigns This Month ('+(cd.current_month||'')+')</div>';
    html+='<div class="card"><div class="desc">Campaigns with spend this month that had no spend in previous months.</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Campaign</th><th style="font-size:8px;color:var(--muted)">Platform</th><th style="font-size:8px;color:var(--muted)">Brand</th><th style="text-align:right">Spend</th><th style="text-align:right">Sales</th><th style="text-align:right">ROAS</th></tr></thead><tbody>';
    newCamps.forEach(function(c,i){
      var roas=c.total_spend>0?(c.total_sales/c.total_spend):0;
      var rc=roas>=3?'var(--g)':roas>=1.5?'var(--am)':'var(--r)';
      html+='<tr><td style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
      html+='<td style="font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+'</td>';
      html+='<td style="font-size:9px;color:var(--dim)">'+c.platform+'</td>';
      html+='<td style="font-size:9px;color:var(--dim)">'+c.brand+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(c.total_spend)+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(c.total_sales)+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc+'">'+roas.toFixed(1)+'x</td></tr>';
    });
    html+='</tbody></table></div></div></div>';
  }

  // ── All Campaigns (collapsible, sortable)
  if(entries.length){
    window._campSortState = {col:'spend', dir:'desc'};
    html+='<div class="sec"><div class="sec-title" style="cursor:pointer" onclick="var el=document.getElementById(\'camp-all-table\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">All Campaigns ('+entries.length+') &mdash; click to expand</div>';
    html+='<div id="camp-all-table" style="display:none"><div class="card"><div style="overflow-x:auto"><table id="camp-all-tbl"><thead><tr>';
    html+='<th>#</th><th>Campaign</th>';
    html+='<th style="font-size:8px;color:var(--muted)">Platform</th>';
    html+='<th style="font-size:8px;color:var(--muted)">Brand</th>';
    html+='<th style="font-size:8px;color:var(--muted)">Landing</th>';
    labels.forEach(function(l){ html+='<th style="text-align:right;font-size:8px" colspan="2">'+l+'</th>'; });
    html+='<th data-sort="spend" style="text-align:right;background:#f0fdf4;cursor:pointer" onclick="sortCampaignTable(\'spend\')">Total Spend<span class="sort-icon"> ▼</span></th>';
    html+='<th data-sort="sales" style="text-align:right;cursor:pointer" onclick="sortCampaignTable(\'sales\')">Total Sales<span class="sort-icon"> ⇅</span></th>';
    html+='<th data-sort="roas" style="text-align:right;cursor:pointer" onclick="sortCampaignTable(\'roas\')">ROAS<span class="sort-icon"> ⇅</span></th>';
    html+='<th data-sort="clicks" style="text-align:right;cursor:pointer" onclick="sortCampaignTable(\'clicks\')">Clicks<span class="sort-icon"> ⇅</span></th>';
    html+='</tr>';
    html+='<tr><th colspan="5"></th>';
    labels.forEach(function(){ html+='<th style="text-align:right;font-size:7px;color:var(--muted)">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)">Sales/ROAS</th>'; });
    html+='<th></th><th></th><th></th><th></th></tr></thead>';
    html+='<tbody id="camp-all-tbody">';
    entries.forEach(function(c,i){
      var rc=c.roas>=3?'var(--g)':c.roas>=1.5?'var(--am)':c.roas>0?'var(--r)':'var(--muted)';
      var lch=getLandingChannel(c.name,c.platform);
      var lbadge=lch==='Amazon'?'<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:#fef3c7;color:#b45309;border:1px solid #f59e0b">AMZ</span>'
        :lch==='Target+'?'<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:#fee2e2;color:#b91c1c;border:1px solid #ef4444">TGT+</span>'
        :'<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:#dcfce7;color:#15803d;border:1px solid #22c55e">SHP</span>';
      var totalClicks=(c.clicks||[]).reduce(function(s,v){return s+(v||0);},0);
      var totalImpr=(c.impressions||[]).reduce(function(s,v){return s+(v||0);},0);
      html+='<tr data-spend="'+c.total_spend+'" data-sales="'+c.total_sales+'" data-roas="'+c.roas+'" data-clicks="'+totalClicks+'" data-impressions="'+totalImpr+'">';
      html+='<td class="row-num" style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
      html+='<td style="font-size:9px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+'</td>';
      html+='<td style="font-size:8px;color:var(--dim)">'+c.platform+'</td>';
      html+='<td style="font-size:8px;color:var(--dim)">'+c.brand+'</td>';
      html+='<td style="font-size:8px">'+lbadge+'</td>';
      for(var j=0;j<labels.length;j++){
        var sp=c.spend[j]||0; var sa=c.sales[j]||0;
        var pr=sp>0?(sa/sp).toFixed(1)+'x':'—';
        html+='<td style="text-align:right;font-family:var(--mono);font-size:8px">'+$(sp)+'</td>';
        html+='<td style="text-align:right;font-family:var(--mono);font-size:8px">'+$(sa)+'<br><small style="color:var(--muted);font-size:7px">'+pr+'</small></td>';
      }
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;background:#f0fdf4">'+$(c.total_spend)+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+$(c.total_sales)+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+c.roas.toFixed(1)+'x</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted)">'+totalClicks.toLocaleString()+'</td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div></div></div>';
  }

  return html;
}
</script>
</body>
</html>
