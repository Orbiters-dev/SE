    html+='<rect x="'+x+'" y="'+(y0-hA)+'" width="14" height="'+hA+'" fill="#f59e0b" rx="1"/>';
    html+='<rect x="'+x+'" y="'+(y0-hA-hM)+'" width="14" height="'+hM+'" fill="#0ea5e9" rx="1"/>';
    html+='<rect x="'+x+'" y="'+(y0-hA-hM-hG)+'" width="14" height="'+hG+'" fill="#6366f1" rx="1"/>';
    // Tooltip hit area
    var spTt='<div class=tt-date>'+d+'</div>'
      +'<div class=tt-row><span class=tt-dot style=background:#f59e0b></span>AMZ: $'+(sd.amazon[i]||0).toLocaleString()+(sd.amz_clicks?' | '+(sd.amz_clicks[i]||0)+' clicks':'')+'</div>'
      +'<div class=tt-row><span class=tt-dot style=background:#0ea5e9></span>Meta: $'+(sd.meta[i]||0).toLocaleString()+(sd.meta_clicks?' | '+(sd.meta_clicks[i]||0)+' clicks':'')+'</div>'
      +'<div class=tt-row><span class=tt-dot style=background:#6366f1></span>Google: $'+(sd.google[i]||0).toLocaleString()+'</div>'
      +'<div class=tt-row style=border-top:1px_solid_#475569;padding-top:2px;margin-top:2px>Total: $'+((sd.amazon[i]||0)+(sd.meta[i]||0)+(sd.google[i]||0)).toLocaleString()+'</div>';
    html+='<rect x="'+x+'" y="2" width="16" height="68" fill="transparent" style="cursor:crosshair" onmousemove="showTT(event,\''+spTt.replace(/'/g,"\\'")+'\')" onmouseleave="hideTT()"/>';
    });
    html+='<rect x="2" y="72" width="8" height="5" fill="#f59e0b" rx="1"/><text x="13" y="77" fill="var(--dim)" font-size="8">AMZ</text>';
    html+='<rect x="45" y="72" width="8" height="5" fill="#0ea5e9" rx="1"/><text x="56" y="77" fill="var(--dim)" font-size="8">Meta</text>';
    html+='<rect x="85" y="72" width="8" height="5" fill="#6366f1" rx="1"/><text x="96" y="77" fill="var(--dim)" font-size="8">Google</text>';
    html+='</svg></div></div>';
  }

  // ── Section 4B: Daily Performance Review (7D / 30D / 90D) ──
  if(H.spend_daily&&H.spend_daily.amz_total_sales){
    var _dpSD=H.spend_daily;
    var _dpKR=H.keyword_review||{};
    html+='<div class="sec"><div class="sec-title"><div class="num" style="background:#8b5cf6">4B</div> Daily Performance Review</div>';
    html+='<div id="dp-review-wrap"></div></div>';
    window._dpPeriod=30;
    window.renderDPReview=function(days){
      window._dpPeriod=days;
      var sd=_dpSD,kr=_dpKR;
      var full=sd.dates.length;
      var n=Math.min(days,full);
      var off=full-n;
      function sl(arr){return(arr||[]).slice(off);}
      var dates=sl(sd.dates),amzS=sl(sd.amz_total_sales),metaSp=sl(sd.meta),metaCl=sl(sd.meta_clicks);
      var metaSl=sl(sd.meta_sales),ppcSp=sl(sd.amazon),ppcCl=sl(sd.amz_clicks),sess=sl(sd.ga4_sessions);
      var li=n-1;
      function sum(a){return a.reduce(function(x,y){return x+y},0);}
      function spark(arr,color,w,h,maxV){
        if(!maxV)maxV=Math.max.apply(null,arr)||1;
        var bw=Math.max(1,Math.floor((w-arr.length*0.5)/arr.length));
        var s='<svg width="'+w+'" height="'+h+'" style="display:block">';
        arr.forEach(function(v,i){
          var bh=Math.max(v>0?1:0,v/maxV*(h-2));
          s+='<rect x="'+(i*(bw+1))+'" y="'+(h-2-bh)+'" width="'+bw+'" height="'+bh+'" fill="'+color+'" rx="0.5" opacity="0.7"/>';
        });
        return s+'</svg>';
      }
      function row(label,color,arr,latest,total,prefix){
        prefix=prefix||'';
        var h='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">';
        h+='<div style="width:130px;flex-shrink:0;display:flex;align-items:center;gap:6px">';
        h+='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+color+'"></span>';
        h+='<span style="font-size:10px;font-weight:700;color:var(--dim)">'+label+'</span></div>';
        h+='<div style="flex:1;min-width:120px">'+spark(arr,color,220,24)+'</div>';
        h+='<div style="text-align:right;min-width:90px;font-family:var(--mono);font-weight:700;font-size:13px">'+prefix+latest.toLocaleString()+'</div>';
        h+='<div style="text-align:right;min-width:80px;font-family:var(--mono);font-size:10px;color:var(--muted)">'+days+'D: '+prefix+total.toLocaleString()+'</div>';
        return h+'</div>';
      }
      var o='<div class="card">';
      // Period tabs
      o+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">';
      [7,30,90].forEach(function(p){
        var on=p===days;
        o+='<div onclick="renderDPReview('+p+')" style="padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;'
          +(on?'background:#8b5cf6;color:#fff':'background:#f1f5f9;color:var(--dim)')+'">'+p+'D</div>';
      });
      o+='<div style="flex:1"></div>';
      o+='<span style="font-size:11px;color:var(--muted);font-family:var(--mono)">'+dates[0]+' &rarr; '+dates[li]+'</span>';
      o+='</div>';
      // Rows
      o+=row('Amazon Sales','#f59e0b',amzS,amzS[li]||0,sum(amzS),'$');
      o+=row('Meta Spend','#0ea5e9',metaSp,metaSp[li]||0,sum(metaSp),'$');
      o+=row('Meta Clicks','#38bdf8',metaCl,metaCl[li]||0,sum(metaCl));
      o+=row('Meta Sales','#0284c7',metaSl,metaSl[li]||0,sum(metaSl),'$');
      o+=row('PPC Spend','#f97316',ppcSp,ppcSp[li]||0,sum(ppcSp),'$');
      o+=row('PPC Clicks','#fb923c',ppcCl,ppcCl[li]||0,sum(ppcCl));
      // Brand vs Generic Keywords (weekly — always full range)
      if(kr.weeks&&kr.weeks.length){
        var kwN=kr.weeks.length;
        var bVol=kr.brand_volume||[];
        var gTerms=kr.generic_terms_count||[];
        var bVolMax=Math.max.apply(null,bVol)||1;
        var gMax=Math.max.apply(null,gTerms)||1;
        var kwBW=Math.max(6,Math.floor(180/kwN)-2);
        o+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">';
        o+='<div style="width:130px;flex-shrink:0;display:flex;align-items:center;gap:6px">';
        o+='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#8b5cf6"></span>';
        o+='<span style="font-size:10px;font-weight:700;color:var(--dim)">Brand vs Generic</span></div>';
        o+='<div style="flex:1;min-width:120px"><svg width="220" height="32" style="display:block">';
        kr.weeks.forEach(function(w,i){
          var x=i*(kwBW+2);
          var hB=(bVol[i]||0)/bVolMax*26;
          var hG=(gTerms[i]||0)/gMax*26;
          o+='<rect x="'+x+'" y="'+(28-hB)+'" width="'+Math.floor(kwBW/2)+'" height="'+Math.max(hB,hB>0?1:0)+'" fill="#8b5cf6" rx="1" opacity="0.8"/>';
          o+='<rect x="'+(x+Math.floor(kwBW/2)+1)+'" y="'+(28-hG)+'" width="'+Math.floor(kwBW/2)+'" height="'+Math.max(hG,hG>0?1:0)+'" fill="#94a3b8" rx="1" opacity="0.6"/>';
        });
        o+='</svg></div>';
        var lastBV=bVol[kwN-1]||0;
        var lastBR=(kr.brand_best_rank||[])[kwN-1]||0;
        var lastGR=(kr.generic_best_rank||[])[kwN-1]||0;
        o+='<div style="text-align:right;min-width:110px;font-family:var(--mono);font-size:10px;line-height:1.5">';
        o+='<div><span style="color:#8b5cf6;font-weight:700">'+lastBV.toLocaleString()+'</span> <span style="color:var(--muted)">vol</span></div>';
        o+='<div><span style="color:#8b5cf6">#'+(lastBR||'\u2014')+'</span> <span style="color:var(--muted)">vs</span> <span style="color:#64748b">#'+(lastGR||'\u2014')+'</span></div></div>';
        o+='<div style="text-align:right;min-width:70px;font-size:9px;color:var(--muted)"><span style="color:#8b5cf6">\u25a0</span> Brand<br><span style="color:#94a3b8">\u25a0</span> Generic</div></div>';
      }
      o+=row('Sessions','#10b981',sess,sess[li]||0,sum(sess));
      // Summary stats
      var ppcR=sum(ppcSp)>0?Math.round(sum(amzS)/sum(ppcSp)*100)/100:0;
      var metaR=sum(metaSp)>0?Math.round(sum(metaSl)/sum(metaSp)*100)/100:0;
      o+='<div class="stats" style="margin-top:10px">';
      o+='<div class="stat amber"><div class="sl">AMZ ROAS</div><div class="sv">'+ppcR.toFixed(1)+'x</div></div>';
      o+='<div class="stat cyan"><div class="sl">META ROAS</div><div class="sv">'+metaR.toFixed(1)+'x</div></div>';
      o+='<div class="stat" style="background:#f0fdf4"><div class="sl" style="color:var(--g)">'+days+'D SESSIONS</div><div class="sv" style="color:var(--g)">'+sum(sess).toLocaleString()+'</div></div>';
      o+='</div>';
      o+='</div>';
      document.getElementById('dp-review-wrap').innerHTML=o;
    };
    // Initial render after DOM insert (deferred)
    setTimeout(function(){renderDPReview(30);},0);
  }

  // ── Section E: ASIN Reference ──
  if(H.categories&&H.categories.length){
    html+='<div class="sec"><div class="sec-title"><div class="num">5</div> ASIN &rarr; Category Reference</div>';
    html+='<div class="card"><div class="desc">All ASINs and their assigned product category. Verify classification is correct.</div>';
    html+='<table><thead><tr><th>Category</th><th>Brand</th><th>ASIN</th><th>Product Name</th></tr></thead><tbody>';
    H.categories.forEach(function(c){
      var bc=CATCOLORS[c.category]||'#94a3b8';
      if(c.asins&&c.asins.length){
        c.asins.forEach(function(a,ai){
          html+='<tr>';
          if(ai===0){
            html+='<td rowspan="'+c.asins.length+'" style="vertical-align:top"><span style="font-size:9px;padding:2px 6px;border-radius:8px;background:'+bc+'22;color:'+bc+';font-weight:600">'+c.category+'</span></td>';
            html+='<td rowspan="'+c.asins.length+'" style="vertical-align:top;font-size:9px;color:var(--dim)">'+c.brand+'</td>';
          }
          html+='<td style="font-family:var(--mono);font-size:9px">'+a.asin+'</td>';
          html+='<td style="font-size:9px;color:var(--dim)">'+a.name+'</td></tr>';
        });
      }
    });
    html+='</tbody></table></div></div>';
  }

  document.getElementById('panel-hero').innerHTML=html;
}

// ── Reusable section builders ────────────────────────────────────────────────

function buildBrandTable(F, months, mLabels, lastIdx, isPartialLast, compact){
  var html='<div class="sec"><div class="sec-title"><div class="num">2</div> Revenue by Brand</div>';
  html+='<div class="card">';
  var brandDs=[];
  Object.keys(F.brand_revenue).forEach(function(b){
    var total=F.brand_revenue[b].monthly.reduce(function(a,c){return a+c;},0);
    brandDs.push({label:b, data:F.brand_revenue[b].monthly, color:F.brand_revenue[b].color, total:total});
  });
  // Sort by total desc so largest brand is at bottom of stacked bar
  brandDs.sort(function(a,b){return b.total-a.total;});
  html+=barChart(brandDs, mLabels, {w:940,h:compact?160:210,barW:compact?18:24,stacked:true});
  html+='<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th>Brand</th>';
  mLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===lastIdx&&isPartialLast?';background:#f5f3ff':'')+'">'+m+'</th>'; });
  html+='<th style="text-align:right;background:#f0fdf4">Total</th></tr></thead><tbody>';
  Object.keys(F.brand_revenue).forEach(function(b){
    var br=F.brand_revenue[b], total=br.monthly.reduce(function(a,c){return a+c;},0);
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+br.color+';margin-right:6px"></span><b>'+b+'</b></td>';
    br.monthly.forEach(function(v,i){ html+=fmCell(v, (br.monthly_proj||[])[i], i===lastIdx&&isPartialLast); });
    html+='<td style="text-align:right;font-weight:700;font-family:var(--mono);font-size:10px;background:#f0fdf4">'+$(total)+'</td></tr>';
  });
  var grandTotals=months.map(function(_,mi){ var t=0; Object.keys(F.brand_revenue).forEach(function(b){ t+=F.brand_revenue[b].monthly[mi]||0; }); return t; });
  var grandProj=months.map(function(_,mi){ var t=0; Object.keys(F.brand_revenue).forEach(function(b){ t+=(F.brand_revenue[b].monthly_proj||F.brand_revenue[b].monthly)[mi]||0; }); return t; });
  html+='<tr style="border-top:2px solid var(--border);font-weight:800"><td>TOTAL</td>';
  grandTotals.forEach(function(v,i){ html+=fmCell(v, grandProj[i], i===lastIdx&&isPartialLast, {bold:true}); });
  html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;background:#f0fdf4;font-weight:800">'+$(grandTotals.reduce(function(a,c){return a+c;},0))+'</td></tr>';
  // % share
  Object.keys(F.brand_revenue).forEach(function(b){
    html+='<tr style="color:var(--muted);font-size:9px"><td style="padding-left:14px">'+b+'</td>';
    F.brand_revenue[b].monthly.forEach(function(v,i){
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(grandTotals[i]>0?(v/grandTotals[i]*100).toFixed(1):'0')+'%</td>';
    });
    var gt=grandTotals.reduce(function(a,c){return a+c;},0);
    var bt=F.brand_revenue[b].monthly.reduce(function(a,c){return a+c;},0);
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(gt>0?(bt/gt*100).toFixed(1):'0')+'%</td></tr>';
  });
  html+='</tbody></table></div></div></div>';
  return html;
}

function buildChannelTable(F, months, mLabels, lastIdx, isPartialLast, compact){
  var html='<div class="sec"><div class="sec-title"><div class="num">3</div> Revenue by Channel</div>';
  html+='<div class="card">';
  var chDs=[];
  Object.keys(F.channel_revenue).forEach(function(ch){
    chDs.push({label:ch, data:F.channel_revenue[ch].monthly, color:F.channel_revenue[ch].color});
  });
  html+=barChart(chDs, mLabels, {w:940,h:compact?160:210,barW:compact?12:16,stacked:true});
  html+='<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th>Channel</th>';
  mLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===lastIdx&&isPartialLast?';background:#f5f3ff':'')+'">'+m+'</th>'; });
  html+='<th style="text-align:right;background:#f0fdf4">Total</th></tr></thead><tbody>';
  Object.keys(F.channel_revenue).forEach(function(ch){
    var cr=F.channel_revenue[ch], total=cr.monthly.reduce(function(a,c){return a+c;},0);
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+cr.color+';margin-right:6px"></span>'+ch+'</td>';
    cr.monthly.forEach(function(v,i){ html+=fmCell(v, (cr.monthly_proj||[])[i], i===lastIdx&&isPartialLast); });
    html+='<td style="text-align:right;font-weight:700;font-family:var(--mono);font-size:10px;background:#f0fdf4">'+$(total)+'</td></tr>';
  });
  // TOTAL row
  var chTotals=months.map(function(_,mi){ var t=0; Object.keys(F.channel_revenue).forEach(function(ch){ t+=F.channel_revenue[ch].monthly[mi]||0; }); return t; });
  html+='<tr style="border-top:2px solid var(--border);font-weight:800"><td>TOTAL</td>';
  chTotals.forEach(function(v,i){ html+=fmCell(v, v, false, {bold:true}); });
  html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;background:#f0fdf4;font-weight:800">'+$(chTotals.reduce(function(a,c){return a+c;},0))+'</td></tr>';
  // % share
  Object.keys(F.channel_revenue).forEach(function(ch){
    html+='<tr style="color:var(--muted);font-size:9px"><td style="padding-left:14px">'+ch+'</td>';
    F.channel_revenue[ch].monthly.forEach(function(v,i){
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(chTotals[i]>0?(v/chTotals[i]*100).toFixed(1):'0')+'%</td>';
    });
    var gt=chTotals.reduce(function(a,c){return a+c;},0);
    var ct=F.channel_revenue[ch].monthly.reduce(function(a,c){return a+c;},0);
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(gt>0?(ct/gt*100).toFixed(1):'0')+'%</td></tr>';
  });
  html+='</tbody></table></div></div></div>';
  return html;
}

function buildAdTable(F, months, mLabels, lastIdx, isPartialLast, compact){
  var si=F.ad_start_idx||0;
  var aLabels=mLabels.slice(si);
  var aLen=aLabels.length;
  var aLastIdx=aLen-1;
  var isPartialA=isPartialLast&&(si+aLastIdx===lastIdx);
  var html='<div class="sec"><div class="sec-title"><div class="num">4</div> Ad Platform Performance (Jan 2026+)</div>';
  html+='<div class="card">';
  var adDs=[];
  var adOrder=["Amazon Ads","Meta CVR","Meta Traffic","Google Ads"];
  var adKeys=adOrder.filter(function(p){return F.ad_performance[p];});
  adKeys.forEach(function(p){
    adDs.push({label:p, data:F.ad_performance[p].spend.slice(si), color:F.ad_performance[p].color});
  });
  html+=barChart(adDs, aLabels, {w:940,h:compact?150:190,barW:compact?12:16,stacked:true});
  html+='<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th>Platform</th>';
  aLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===aLastIdx&&isPartialA?';background:#f5f3ff':'')+'" colspan="3">'+m+'</th>'; });
  html+='</tr><tr><th></th>';
  aLabels.forEach(function(m,i){
    var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
    html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Sales</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">ROAS</th>';
  });
  html+='</tr></thead><tbody>';
  adKeys.forEach(function(p){
    var ap=F.ad_performance[p];
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+ap.color+';margin-right:6px"></span><b>'+p+'</b></td>';
    for(var i=0;i<aLen;i++){
      var gi=si+i;
      var sp=ap.spend[gi]||0, sl=ap.sales[gi]||0;
      var spP=(ap.spend_proj||[])[gi]||sp;
      var slP=(ap.sales_proj||[])[gi]||sl;
      var roas=sp>0?(sl/sp):0;
      var rc=roas>=3?'var(--g)':roas>=1.5?'var(--am)':'var(--r)';
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(sp, spP, isL, {fs:'9px'});
      html+=fmCell(sl, slP, isL, {fs:'9px'});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+roas.toFixed(1)+'x</td>';
    }
    html+='</tr>';
  });
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td>';
  for(var i=0;i<aLen;i++){
    var gi=si+i;
    var ts=0,tl=0,tsP=0,tlP=0;
    adKeys.forEach(function(p){
      ts+=F.ad_performance[p].spend[gi]||0; tl+=F.ad_performance[p].sales[gi]||0;
      tsP+=(F.ad_performance[p].spend_proj||F.ad_performance[p].spend)[gi]||0;
      tlP+=(F.ad_performance[p].sales_proj||F.ad_performance[p].sales)[gi]||0;
    });
    var isL=i===aLastIdx&&isPartialA;
    html+=fmCell(ts, tsP, isL, {fs:'9px',bold:true});
    html+=fmCell(tl, tlP, isL, {fs:'9px',bold:true});
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(ts>0?(tl/ts).toFixed(1):'0')+'x</td>';
  }
  html+='</tr></tbody></table></div></div>';

  // ── Ads Landing Channel TROAS ──
  if(F.ads_landing){
    html+='<div class="card" style="margin-top:12px">';
    html+='<div style="font-size:13px;font-weight:700;margin-bottom:4px">Ads Landing &mdash; Channel Revenue &amp; TROAS</div>';
    html+='<div class="desc">TROAS = Total channel revenue / Ad spend attributed to that channel. Onzenna = Google Ads + Meta CVR. Amazon = Amazon Ads + Meta Traffic.</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th>Channel</th><th style="font-size:8px;color:var(--muted)">Platforms</th>';
    aLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===aLastIdx&&isPartialA?';background:#f5f3ff':'')+'" colspan="3">'+m+'</th>'; });
    html+='</tr><tr><th></th><th></th>';
    aLabels.forEach(function(m,i){
      var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
      html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Spend</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Revenue</th><th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">TROAS</th>';
    });
    html+='</tr></thead><tbody>';
    var landOrder=["Onzenna","Amazon"];
    var landColors={"Onzenna":"#6366f1","Amazon":"#f59e0b"};
    var totSp=[],totRv=[];
    for(var i=0;i<aLen;i++){totSp.push(0);totRv.push(0);}
    landOrder.forEach(function(ch){
      var ld=F.ads_landing[ch]; if(!ld) return;
      html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+(landColors[ch]||'#999')+';margin-right:6px"></span><b>'+ch+'</b></td>';
      html+='<td style="font-size:8px;color:var(--muted)">'+ld.platforms+'</td>';
      for(var i=0;i<aLen;i++){
        var gi=si+i;
        var sp=ld.spend[gi]||0, rv=ld.revenue[gi]||0;
        var spP=(ld.spend_proj||[])[gi]||sp;
        var rvP=(ld.revenue_proj||[])[gi]||rv;
        var troas=sp>0?(rv/sp):0;
        var tc=troas>=5?'var(--g)':troas>=2?'var(--am)':'var(--r)';
        var isL=i===aLastIdx&&isPartialA;
        totSp[i]+=sp; totRv[i]+=rv;
        html+=fmCell(sp, spP, isL, {fs:'9px'});
        html+=fmCell(rv, rvP, isL, {fs:'9px'});
        html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+tc+'">'+troas.toFixed(1)+'x</td>';
      }
      html+='</tr>';
    });
    html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td><td></td>';
    for(var i=0;i<aLen;i++){
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(totSp[i], totSp[i], isL, {fs:'9px',bold:true});
      html+=fmCell(totRv[i], totRv[i], isL, {fs:'9px',bold:true});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+(totSp[i]>0?(totRv[i]/totSp[i]).toFixed(1):'0')+'x</td>';
    }
    html+='</tr></tbody></table></div></div>';
  }

  html+='</div>';
  return html;
}

function buildWaterfall(F, months, mLabels, lastIdx, isPartialLast){
  var wf=F.waterfall;
  var html='<div class="sec"><div class="sec-title"><div class="num">6</div> P&amp;L Waterfall: Revenue &rarr; GM &rarr; CM</div>';
  html+='<div class="card">';
  html+='<div class="desc">GM = Revenue - COGS. CM = GM - Shipping (25% hardcoded) - MKT (Ads + Discounts + Seeding). COGS from SKU-level NAS data.</div>';
  html+=barChart([
    {label:'Gross Margin', data:wf.gross_margin, color:'#10b981'},
    {label:'MKT Total', data:(wf.mkt_total||wf.ad_spend), color:'#ef4444'},
    {label:'Contribution', data:wf.contribution_margin.map(function(v){return Math.max(v,0);}), color:'#6366f1'}
  ], mLabels, {w:940,h:190,barW:9});
  html+='<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th></th>';
  mLabels.forEach(function(m,i){ html+='<th style="text-align:right'+(i===lastIdx&&isPartialLast?';background:#f5f3ff':'')+'">'+m+'</th>'; });
  html+='</tr></thead><tbody>';
  // Revenue
  html+='<tr><td>Revenue</td>';
  wf.revenue.forEach(function(v,i){ html+=fmCell(v, (wf.revenue_proj||[])[i], i===lastIdx&&isPartialLast); });
  // COGS
  html+='</tr><tr><td style="color:var(--r)">(-) COGS</td>';
  (wf.cogs||[]).forEach(function(v,i){ html+=fmCell(v, (wf.cogs_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',prefix:'-'}); });
  // GM
  html+='</tr><tr style="border-top:2px solid var(--border);font-weight:700"><td style="color:var(--g)">Gross Margin</td>';
  wf.gross_margin.forEach(function(v,i){ html+=fmCell(v, (wf.gross_margin_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--g)',bold:true}); });
  html+='</tr><tr><td style="padding-left:16px;color:var(--dim)">GM %</td>';
  wf.gross_margin.forEach(function(v,i){ var r=wf.revenue[i]; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--dim)">'+(r>0?(v/r*100).toFixed(1):'0')+'%</td>'; });
  // Shipping Cost (HARDCODED 25%)
  if(wf.shipping_cost){
    html+='</tr><tr><td style="color:var(--r)">(-) Shipping Cost <span style="background:#ff6b6b;color:#fff;font-size:7px;font-weight:900;padding:1px 5px;border-radius:3px;margin-left:4px;letter-spacing:0.5px">⚠ HARDCODED 25%</span></td>';
    wf.shipping_cost.forEach(function(v,i){ html+=fmCell(v, (wf.shipping_cost_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',fs:'9px',prefix:'-'}); });
    html+='</tr><tr><td style="padding-left:16px;color:var(--dim)">Ship %</td>';
    wf.shipping_cost.forEach(function(v,i){ var r=wf.revenue[i]; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--dim)">'+(r>0?(v/r*100).toFixed(1):'0')+'%</td>'; });
  }
  // Variable Costs (Ref Fee + FBA)
  html+='</tr><tr><td colspan="'+(mLabels.length+1)+'" style="padding:4px 0;border:none"><div style="border-top:1px dashed var(--border)"></div></td></tr>';
  html+='<tr><td style="color:var(--r)">(-) Variable Costs</td>';
  (wf.variable_costs||[]).forEach(function(v,i){ html+=fmCell(v, null, false, {color:'var(--r)',fs:'9px'}); });
  if(wf.variable_detail){
    html+='</tr><tr><td style="padding-left:16px;color:var(--muted);font-size:9px">Amazon Ref Fee (15%)</td>';
    (wf.variable_detail.amz_ref_fee||[]).forEach(function(v,i){ html+='<td style="text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted)">'+$(v)+'</td>'; });
    html+='</tr><tr><td style="padding-left:16px;color:var(--muted);font-size:9px">FBA Fulfillment</td>';
    (wf.variable_detail.fba_fulfillment||[]).forEach(function(v,i){
      var val=v>0?$(v):(i<9?'<span style="color:#9ca3af">n.m.</span>':'$0');
      html+='<td style="text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted)">'+val+'</td>';
    });
  }
  // CM before MKT
  html+='</tr><tr style="border-top:2px solid var(--border);font-weight:700"><td style="color:#6366f1">CM before MKT</td>';
  (wf.cm_before_mkt||[]).forEach(function(v,i){ html+=fmCell(v, (wf.cm_before_mkt_proj||[])[i], i===lastIdx&&isPartialLast, {color:'#6366f1',bold:true}); });
  html+='</tr><tr><td style="padding-left:16px;color:var(--dim)">CM% (before MKT)</td>';
  (wf.cm_before_mkt||[]).forEach(function(v,i){ var r=wf.revenue[i]; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--dim)">'+(r>0?(v/r*100).toFixed(1):'0')+'%</td>'; });
  // MKT Costs
  html+='</tr><tr><td colspan="'+(mLabels.length+1)+'" style="padding:4px 0;border:none"><div style="border-top:1px dashed var(--border)"></div></td></tr>';
  // Ad Spend
  html+='<tr><td style="padding-left:8px;color:var(--r)">(-) Ad Spend</td>';
  wf.ad_spend.forEach(function(v,i){ html+=fmCell(v, (wf.ad_spend_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',fs:'9px'}); });
  // Discounts (Shopify promo only — ref fee moved to variable costs)
  html+='</tr><tr><td style="padding-left:8px;color:var(--r)">(-) Shopify Discounts</td>';
  (wf.discounts||[]).forEach(function(v,i){ html+=fmCell(v, (wf.discounts_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',fs:'9px'}); });
  // Seeding
  html+='</tr><tr><td style="padding-left:8px;color:var(--r)">(-) Influencer / Collab</td>';
  (wf.seeding||[]).forEach(function(v,i){
    if(v===0) html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:var(--muted)">n/a</td>';
    else html+=fmCell(v, (wf.seeding_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',fs:'9px'});
  });
  // Influencer sub-breakdown
  if(wf.influencer_detail){
    html+='</tr><tr><td style="padding-left:24px;color:var(--muted);font-size:9px">Paid (PayPal)</td>';
    (wf.influencer_detail.paid||[]).forEach(function(v,i){ html+='<td style="text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted)">'+$(v)+'</td>'; });
    html+='</tr><tr><td style="padding-left:24px;color:var(--muted);font-size:9px">Non-Paid (COGS+Ship)</td>';
    (wf.influencer_detail.nonpaid||[]).forEach(function(v,i){ html+='<td style="text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted)">'+$(v)+'</td>'; });
  }
  // MKT Total
  html+='</tr><tr style="border-top:1px solid var(--border)"><td style="color:var(--r);font-weight:700">(-) MKT Total</td>';
  (wf.mkt_total||wf.ad_spend).forEach(function(v,i){ html+=fmCell(v, (wf.mkt_total_proj||wf.ad_spend_proj||[])[i], i===lastIdx&&isPartialLast, {color:'var(--r)',bold:true}); });
  // CM
  html+='</tr><tr style="border-top:2px solid var(--border);font-weight:800"><td style="color:'+(wf.contribution_margin[wf.contribution_margin.length-1]>=0?'#6366f1':'var(--r)')+'">Contribution Margin</td>';
  wf.contribution_margin.forEach(function(v,i){
    html+=fmCell(v, (wf.contribution_margin_proj||[])[i], i===lastIdx&&isPartialLast, {color:v>=0?'#6366f1':'var(--r)',bold:true});
  });
  html+='</tr><tr><td style="padding-left:16px;color:var(--dim)"><b>CM %</b></td>';
  wf.contribution_margin.forEach(function(v,i){ var r=wf.revenue[i]; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700">'+(r>0?(v/r*100).toFixed(1):'0')+'%</td>'; });
  html+='</tr></tbody></table></div>';
  // % of Revenue table
  html+='<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">% of Revenue</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  mLabels.forEach(function(m){ html+='<th style="text-align:right">'+m+'</th>'; });
  html+='</tr></thead><tbody>';
  function pctRow(label,arr,style){
    html+='<tr'+(style?' style="'+style+'"':'')+'><td>'+label+'</td>';
    (arr||[]).forEach(function(v,i){ var r=wf.revenue[i]; var p=r>0?(v/r*100).toFixed(1):'—'; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+p+'%</td>'; });
    html+='</tr>';
  }
  pctRow('Revenue', wf.revenue, 'font-weight:700');
  pctRow('<span style="color:var(--r)">(-) COGS</span>', wf.cogs||[]);
  pctRow('<span style="color:var(--g);font-weight:700">Gross Margin</span>', wf.gross_margin, 'border-top:2px solid var(--border);font-weight:700');
  if(wf.shipping_cost) pctRow('<span style="color:var(--r)">(-) Shipping <span style="background:#ff6b6b;color:#fff;font-size:7px;font-weight:900;padding:0 4px;border-radius:2px">25%</span></span>', wf.shipping_cost);
  html+='<tr><td colspan="'+(mLabels.length+1)+'" style="padding:2px 0;border:none"><div style="border-top:1px dashed var(--border)"></div></td></tr>';
  pctRow('<span style="padding-left:8px;color:var(--r)">(-) Ad Spend</span>', wf.ad_spend);
  pctRow('<span style="padding-left:8px;color:var(--r)">(-) Discounts</span>', wf.discounts||[]);
  // Influencer / Collab row: show n/a if value is 0
  html+='<tr><td><span style="padding-left:8px;color:var(--r)">(-) Influencer / Collab</span></td>';
  (wf.seeding||[]).forEach(function(v,i){ var r=wf.revenue[i]; if(v===0) html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--muted)">n/a</td>'; else { var p=r>0?(v/r*100).toFixed(1):'—'; html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+p+'%</td>'; } });
  html+='</tr>';
  pctRow('<span style="color:var(--r);font-weight:700">(-) MKT Total</span>', wf.mkt_total||wf.ad_spend, 'border-top:1px solid var(--border);font-weight:700');
  pctRow('<span style="font-weight:800">Contribution Margin</span>', wf.contribution_margin, 'border-top:2px solid var(--border);font-weight:800');
  html+='</tbody></table></div></div></div></div>';
  return html;
}

function buildPolarPnL(P){
  var ms=P.months;
  var fyIdx=P.fy2025_idx;
  var pm=P.partial_month||{};
  var lastMIdx=ms.length-1;
  var isPartial=pm.is_partial;
  var fmMult=pm.multiplier||1;
  var html='';

  // ── Section 1: Monthly Brand Sales ──
  html+='<div class="sec"><div class="sec-title"><div class="num">3A</div> Monthly Sales by Brand</div>';
  html+='<div class="card"><div class="desc">All brands, LFU+FLT combined (DTC + Amazon). FY2025 = Jan-Dec annual total.</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th>Brand</th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  // Brand rows sorted by FY2025 total desc
  var brands=Object.keys(P.brand_sales);
  brands.sort(function(a,b){ return (P.brand_sales[b].values[fyIdx]||0)-(P.brand_sales[a].values[fyIdx]||0); });

  brands.forEach(function(b){
    var bd=P.brand_sales[b];
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+bd.color+';margin-right:6px"></span><b style="font-size:10px">'+b+'</b></td>';
    bd.values.forEach(function(v,i){
      var sty='text-align:right;font-family:var(--mono);font-size:9px';
      if(i===fyIdx) sty+=';background:#eef2ff;font-weight:800';
      html+='<td style="'+sty+'">'+(v>0?'$'+Math.round(v).toLocaleString():'<span style="color:var(--muted)">-</span>')+'</td>';
    });
    html+='</tr>';
  });

  // TOTAL row
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td><b>TOTAL</b></td>';
  P.total_revenue.forEach(function(v,i){
    var sty='text-align:right;font-family:var(--mono);font-size:10px;font-weight:800';
    if(i===fyIdx) sty+=';background:#e0e7ff';
    html+='<td style="'+sty+'">$'+Math.round(v).toLocaleString()+'</td>';
  });
  html+='</tr></tbody></table></div></div></div>';

  // ── Section 2: P&L Waterfall ──
  html+='<div class="sec"><div class="sec-title"><div class="num">3B</div> P&amp;L Waterfall: Revenue &rarr; GM &rarr; CM</div>';
  html+='<div class="card"><div class="desc">GM = Revenue - COGS. CM = GM - Ads - Influencer. Source: DataKeeper.</div>';

  // Bar chart
  html+=barChart([
    {label:'Gross Margin', data:P.gross_margin.slice(0,fyIdx), color:'#10b981'},
    {label:'Ad Spend', data:P.ad_spend.total.slice(0,fyIdx), color:'#ef4444'},
    {label:'CM (after all)', data:P.cm_final.slice(0,fyIdx).map(function(v){return Math.max(v,0);}), color:'#6366f1'}
  ], ms.slice(0,fyIdx), {w:940,h:190,barW:7});

  // Table
  html+='<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px;white-space:pre-line';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    if(i===lastMIdx&&isPartial) sty+=';background:#f5f3ff;color:#8b5cf6';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  function pnlRow(label, arr, opts){
    opts=opts||{};
    var sty=opts.bold?'font-weight:700;':'';
    sty+=opts.topBorder?'border-top:2px solid var(--border);':'';
    html+='<tr style="'+sty+'"><td style="'+(opts.indent?'padding-left:'+(opts.indent*8)+'px;':'')+'color:'+(opts.color||'var(--text)')+'">'+label+'</td>';
    arr.forEach(function(v,i){
      var cs='text-align:right;font-family:var(--mono);font-size:'+(opts.fs||'10')+'px;color:'+(opts.color||'var(--text)');
      if(i===fyIdx) cs+=';background:#eef2ff;font-weight:700';
      if(opts.bold) cs+=';font-weight:700';
      if(i===lastMIdx&&isPartial) cs+=';background:#f5f3ff';
      var prefix=opts.neg&&v>0?'-':'';
      var val=prefix+'$'+Math.abs(Math.round(v)).toLocaleString();
      // Partial month: show FM projection in smaller text
      if(i===lastMIdx&&isPartial&&fmMult>1&&!opts.noproj){
        var proj=Math.round(Math.abs(v)*fmMult);
        val+='<div style="font-size:7px;color:#8b5cf6">('+prefix+'$'+proj.toLocaleString()+')</div>';
      }
      html+='<td style="'+cs+'">'+val+'</td>';
    });
    html+='</tr>';
  }

  function pctRow(label, numer, denom, opts){
    opts=opts||{};
    var sty=opts.topBorder?'border-top:2px solid var(--border);':'';
    html+='<tr style="'+sty+'"><td style="padding-left:16px;color:var(--dim)">'+label+'</td>';
    numer.forEach(function(v,i){
      var d=denom[i]||1;
      var p=d>0?(v/d*100).toFixed(1):'0';
      var cs='text-align:right;font-family:var(--mono);font-size:9px;color:var(--dim)';
      if(i===fyIdx) cs+=';background:#eef2ff';
      html+='<td style="'+cs+'">'+p+'%</td>';
    });
    html+='</tr>';
  }

  pnlRow('Revenue', P.total_revenue, {bold:true});
  pnlRow('(-) COGS', P.cogs, {color:'var(--r)',neg:true,fs:'9'});
  pnlRow('Gross Margin', P.gross_margin, {bold:true,topBorder:true,color:'var(--g)'});
  pctRow('GM %', P.gross_margin, P.total_revenue);

  // Shipping Cost (HARDCODED 25%)
  if(P.shipping_cost){
    html+='<tr><td style="padding:4px 6px;font-size:9px;color:var(--r)">(-) Shipping Cost <span style="background:#ff6b6b;color:#fff;font-size:7px;font-weight:900;padding:1px 5px;border-radius:3px;margin-left:4px;letter-spacing:0.5px">⚠ HARDCODED 25%</span></td>';
    P.shipping_cost.forEach(function(v,i){
      var cs='text-align:right;font-family:var(--mono);font-size:9px;color:var(--r)';
      if(i===fyIdx) cs+=';background:#eef2ff';
      html+='<td style="'+cs+'">-$'+(Math.abs(v)).toLocaleString()+'</td>';
    });
    html+='</tr>';
    pctRow('Ship %', P.shipping_cost, P.total_revenue);
  }

  // Separator
  html+='<tr><td colspan="'+(ms.length+1)+'" style="padding:3px 0;border:none"><div style="border-top:1px dashed var(--border)"></div></td></tr>';

  // Ad Spend breakdown
  pnlRow('(-) Ad Spend Total', P.ad_spend.total, {bold:true,color:'var(--r)',neg:true});
  pnlRow('ONZENNA (Meta+Google+TT+T+)', P.ad_spend.onzenna, {indent:2,color:'var(--r)',fs:'9',neg:true});
  pnlRow('Amazon Ads', P.ad_spend.amazon, {indent:2,color:'var(--r)',fs:'9',neg:true});

  // Discounts
  pnlRow('(-) Discounts', P.discounts, {color:'var(--r)',neg:true});
  if(P.discounts_detail){
    pnlRow('Shopify Promo Disc', P.discounts_detail.shopify_disc, {indent:2,color:'var(--muted)',fs:'8',neg:true,noproj:true});
    pnlRow('Amazon Ref Fee (15%)', P.discounts_detail.amz_ref_fee, {indent:2,color:'var(--muted)',fs:'8',neg:true,noproj:true});
  }

  // Influencer
  pnlRow('(-) Influencer / Collab', P.influencer_spend, {color:'var(--r)',fs:'9',neg:true});
  if(P.influencer_detail){
    pnlRow('Paid (PayPal)', P.influencer_detail.paid, {indent:2,color:'var(--muted)',fs:'8',neg:true});
    pnlRow('Non-Paid (COGS+Ship)', P.influencer_detail.nonpaid, {indent:2,color:'var(--muted)',fs:'8',neg:true});
  }

  // MKT Total (includes shipping)
  var mkt_total=P.ad_spend.total.map(function(v,i){ return (P.shipping_cost?P.shipping_cost[i]:0)+v+(P.discounts[i]||0)+(P.influencer_spend[i]||0); });
  pnlRow('(-) MKT Total', mkt_total, {bold:true,topBorder:true,color:'var(--r)',neg:true});
  pctRow('MKT %', mkt_total, P.total_revenue);

  // CM after ads
  pnlRow('CM after Ads', P.cm_after_ads, {bold:true,topBorder:true,color:'#6366f1'});
  pctRow('CM %', P.cm_after_ads, P.total_revenue);

  // Final CM
  pnlRow('CM after Ads + Influencer', P.cm_final, {bold:true,topBorder:true,color:P.cm_final[P.cm_final.length-1]>=0?'#6366f1':'var(--r)'});
  pctRow('CM %', P.cm_final, P.total_revenue);

  html+='</tbody></table></div>';

  // ── Section 3: ROAS summary ──
  html+='<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">ROAS by Channel</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';

  function roasRow(label,sales,spend){
    html+='<tr><td style="font-size:10px">'+label+'</td>';
    sales.forEach(function(s,i){
      var sp=spend[i]||0;
      var r=sp>0?s/sp:0;
      var c=r>=3?'var(--g)':r>=1.5?'var(--am)':sp>0?'var(--r)':'var(--muted)';
      var cs='text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+c;
      if(i===fyIdx) cs+=';background:#eef2ff';
      html+='<td style="'+cs+'">'+(sp>0?r.toFixed(1)+'x':'-')+'</td>';
    });
    html+='</tr>';
  }

  roasRow('ONZENNA ROAS', P.sales_from_ads.onzenna, P.ad_spend.onzenna);
  roasRow('Amazon ROAS', P.sales_from_ads.amazon, P.ad_spend.amazon);
  roasRow('Total ROAS', P.sales_from_ads.total, P.ad_spend.total);
  // TROAS = total sales / ad spend
  roasRow('<b>TROAS (Total Rev / Ad$)</b>', P.total_revenue, P.ad_spend.total);

  html+='</tbody></table></div></div>';

  // ── Section 4: Paid vs Organic ──
  html+='<div style="margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px">Paid vs Organic Sales</div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  ms.forEach(function(m,i){
    var sty='text-align:right;font-size:8px';
    if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
    html+='<th style="'+sty+'">'+m+'</th>';
  });
  html+='</tr></thead><tbody>';
  pnlRow('Paid (Ad-attributed)', P.sales_from_ads.total, {color:'#6366f1',fs:'9'});
  pnlRow('Organic', P.organic.total, {color:'var(--g)',fs:'9'});
  pctRow('Organic %', P.organic.total, P.total_revenue);
  html+='</tbody></table></div></div>';

  html+='</div></div>';
  return html;
}

// ── Keyword Performance (2.1) ─────────────────────────────────────────────
function buildKeywordPerformance(F){
  var kp=F.keyword_performance;
  if(!kp||!kp.periods) return '';
  var brands=kp.brands||[];
  var periods=kp.periods;
  var periodKeys=Object.keys(periods);
  var html='<div class="sec"><div class="sec-title"><div class="num" style="background:#f59e0b;color:#fff">2.1</div> Keyword Performance (Amazon Search Terms)</div>';
  html+='<div class="card"><div class="desc">Amazon Ads search term performance by brand. Data: '+kp.date_range+'</div>';

  // Brand toggle
  html+='<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">';
  brands.forEach(function(b,i){
    var active=i===0?'background:var(--a);color:#fff':'background:var(--bg2);color:var(--dim)';
    html+='<div class="kp-brand-btn" data-brand="'+b+'" style="padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;'+active+'" onclick="switchKwBrand(\''+b+'\')">'+b+'</div>';
  });
  html+='</div>';

  // Period toggle
  html+='<div style="display:flex;gap:4px;margin-bottom:12px">';
  periodKeys.forEach(function(pk,i){
    var p=periods[pk];
    var active=i===0?'background:var(--a);color:#fff':'background:var(--bg2);color:var(--dim)';
    html+='<div class="kp-period-btn" data-period="'+pk+'" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;'+active+'" onclick="switchKwPeriod(\''+pk+'\')">'+p.label+'</div>';
  });
  html+='</div>';

  // View toggle (Top ROAS / Worst ROAS)
  html+='<div style="display:flex;gap:4px;margin-bottom:12px">';
  html+='<div class="kp-view-btn" data-view="top" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:var(--a);color:#fff" onclick="switchKwView(\'top\')">Top 100 (Best ROAS)</div>';
  html+='<div class="kp-view-btn" data-view="worst" style="padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--dim)" onclick="switchKwView(\'worst\')">Worst 100 (Lowest ROAS)</div>';
  html+='</div>';

  // Table container
  html+='<div id="kp-table"></div>';
  html+='</div></div>';

  // Store data globally (rendered via window.renderKwTable after DOM insertion)
  window.KP_DATA=periods;
  window.KP_BRAND=brands[0]||'';
  window.KP_PERIOD=periodKeys[0]||'7d';
  window.switchKwBrand=function(b){window.KP_BRAND=b;window.renderKwTable();document.querySelectorAll(".kp-brand-btn").forEach(function(el){el.style.background=el.dataset.brand===b?"var(--a)":"var(--bg2)";el.style.color=el.dataset.brand===b?"#fff":"var(--dim)";});};
  window.switchKwPeriod=function(p){window.KP_PERIOD=p;window.renderKwTable();document.querySelectorAll(".kp-period-btn").forEach(function(el){el.style.background=el.dataset.period===p?"var(--a)":"var(--bg2)";el.style.color=el.dataset.period===p?"#fff":"var(--dim)";});};
  window.KP_VIEW="top";
  window.switchKwView=function(v){window.KP_VIEW=v;window.renderKwTable();document.querySelectorAll(".kp-view-btn").forEach(function(el){el.style.background=el.dataset.view===v?"var(--a)":"var(--bg2)";el.style.color=el.dataset.view===v?"#fff":"var(--dim)";});};
  window.renderKwTable=function(){
    var brandData=(window.KP_DATA[window.KP_PERIOD]||{}).data||{};
    var bd=brandData[window.KP_BRAND]||{};
    var kws=bd[window.KP_VIEW]||bd.top||[];
    var h='<div style="overflow-x:auto"><table><thead><tr>';
    h+='<th>#</th><th>Keyword</th><th style="text-align:right">Spend</th><th style="text-align:right">Sales</th>';
    h+='<th style="text-align:right">ROAS</th><th style="text-align:right">Avg Bid</th><th style="text-align:right">CTR</th>';
    h+='<th style="text-align:right">Clicks</th><th style="text-align:right">Impr</th><th style="text-align:right">Orders</th>';
    h+='</tr></thead><tbody>';
    kws.forEach(function(k,i){
      var rc=k.roas>=3?'var(--g)':k.roas>=1.5?'var(--am)':'var(--r)';
      var cc=k.cpc<=0.5?'var(--g)':k.cpc<=1.5?'var(--am)':'var(--r)';
      h+='<tr><td style="font-family:var(--mono);font-size:9px;color:var(--muted)">'+(i+1)+'</td>';
      h+='<td style="font-size:10px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+k.keyword+'">'+k.keyword+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">$'+k.spend.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px">$'+k.sales.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:10px;font-weight:700;color:'+rc+'">'+k.roas.toFixed(1)+'x</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:'+cc+'">$'+k.cpc.toFixed(2)+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.ctr.toFixed(1)+'%</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.clicks.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px;color:var(--muted)">'+k.impressions.toLocaleString()+'</td>';
      h+='<td style="text-align:right;font-family:var(--mono);font-size:9px">'+k.purchases+'</td></tr>';
    });
    if(!kws.length) h+='<tr><td colspan=10 style="text-align:center;color:var(--muted);padding:20px">No keyword data for this brand/period</td></tr>';
    h+='</tbody></table></div>';
    var el=document.getElementById("kp-table");
    if(el) el.innerHTML=h;
  };
  return html;
}

// ── Channel P&L (Monthly) ─────────────────────────────────────────────────
function buildChannelPnL(P){
  var cp=P.channel_pnl;
  if(!cp) return '';
  var ms=P.months;
  var fyIdx=P.fy2025_idx;
  var channels=Object.keys(cp);
  var html='<div class="sec"><div class="sec-title"><div class="num">3C</div> P&amp;L by Channel</div>';
  html+='<div class="card"><div class="desc">Revenue, COGS, Selling Fees (15% for Amazon &amp; Target+), Fulfillment, Ad Spend per channel. GM = Rev - COGS - Fees - Fulfillment. CM = GM - Ads.</div>';
  // Stacked bar chart - revenue by channel
  var stackDs=[];
  channels.forEach(function(ch){
    var total=(cp[ch].revenue||[]).reduce(function(a,c){return a+c;},0);
    stackDs.push({label:ch, data:(cp[ch].revenue||[]).slice(0,fyIdx), color:cp[ch].color||'#94a3b8', total:total});
  });
  stackDs.sort(function(a,b){return b.total-a.total;});
  html+=barChart(stackDs, ms.slice(0,fyIdx), {w:940,h:170,barW:12,stacked:true});
  // Per-channel mini P&L tables
  channels.forEach(function(ch){
    var d=cp[ch];
    html+='<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px">'
      +'<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+(d.color||'#94a3b8')+'"></span>'+ch+'</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
    ms.forEach(function(m,i){
      var sty='text-align:right;font-size:8px';
      if(i===fyIdx) sty+=';background:#e0e7ff;font-weight:800';
      html+='<th style="'+sty+'">'+m+'</th>';
    });
    html+='</tr></thead><tbody>';
    function chRow(label,arr,opts){
      opts=opts||{};
      html+='<tr style="'+(opts.topBorder?'border-top:2px solid var(--border);':'')+(opts.bold?'font-weight:700;':'')+'"><td style="font-size:10px;color:'+(opts.color||'var(--text)')+'">'+label+'</td>';
      (arr||[]).forEach(function(v,i){
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:'+(opts.color||'var(--text)');
        if(i===fyIdx) cs+=';background:#eef2ff';
        if(opts.bold) cs+=';font-weight:700';
        var prefix=opts.neg&&v>0?'-':'';
        html+='<td style="'+cs+'">'+prefix+'$'+Math.abs(Math.round(v)).toLocaleString()+'</td>';
      });
      html+='</tr>';
    }
    function chPctRow(label,numer,denom){
      html+='<tr><td style="padding-left:12px;font-size:9px;color:var(--dim)">'+label+'</td>';
      (numer||[]).forEach(function(v,i){
        var den=(denom||[])[i]||1;
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:var(--dim)';
        if(i===fyIdx) cs+=';background:#eef2ff';
        html+='<td style="'+cs+'">'+(den>0?(v/den*100).toFixed(1):'0')+'%</td>';
      });
      html+='</tr>';
    }
    chRow('Revenue', d.revenue, {bold:true});
    chRow('(-) COGS', d.cogs, {color:'var(--r)',neg:true});
    // Gross Margin = Revenue - COGS only
    var gm_pure=d.revenue.map(function(r,i){ return r-(d.cogs[i]||0); });
    chRow('Gross Margin', gm_pure, {bold:true,topBorder:true,color:'var(--g)'});
    chPctRow('GM %', gm_pure, d.revenue);
    // Selling fees & fulfillment below GM
    var sf=d.selling_fees||d.fees||[];
    if(sf.some(function(v){return v>0;})){
      chRow('(-) Selling Fees (15%)', sf, {color:'var(--r)',neg:true});
    } else if(ch!=='B2B'){
      chRow('(-) Selling Fees', sf, {color:'var(--dim)',neg:true});
    }
    if(d.fulfillment_nm){
      html+='<tr><td style="font-size:10px;color:var(--dim)">(-) Fulfillment</td>';
      (d.revenue||[]).forEach(function(_,i){
        var cs='text-align:right;font-family:var(--mono);font-size:9px;color:#9ca3af';
        if(i===fyIdx) cs+=';background:#eef2ff';
        html+='<td style="'+cs+'">n.m.</td>';
      });
      html+='</tr>';
    } else {
      var fl=d.fulfillment||[];
      if(fl.some(function(v){return v>0;})) chRow('(-) Fulfillment', fl, {color:'var(--r)',neg:true});
    }
    chRow('(-) Ad Spend', d.ad_spend, {color:'var(--r)',neg:true});
    // Contribution Margin = GM - Fees - Fulfillment - Ads (same as d.contribution_margin)
    chRow('Contribution Margin', d.contribution_margin, {bold:true,topBorder:true,color:'#6366f1'});
    chPctRow('CM %', d.contribution_margin, d.revenue);
    html+='</tbody></table></div></div>';
  });
  html+='</div></div>';
  return html;
}

function buildBrandPerfTable(F, months, mLabels, lastIdx, isPartialLast, compact){
  var bp=F.brand_performance;
  if(!bp) return '';
  var si=F.ad_start_idx||0;
  var aLabels=mLabels.slice(si);
  var aLen=aLabels.length;
  var aLastIdx=aLen-1;
  var isPartialA=isPartialLast&&(si+aLastIdx===lastIdx);
  var html='<div class="sec"><div class="sec-title">Brand Performance &mdash; Total Sales / Paid / Organic + Ad Spend (Jan 2026+)</div>';
  html+='<div class="card">';
  html+='<div class="desc">Total = Shopify + Amazon. Paid = Ad-attributed. Organic = Total - Paid. ROAS = Ad Sales / Ad$. TROAS = Total Sales / Ad$ (incl organic).</div>';
  if(!compact){
    var stackDs=[];
    Object.keys(bp).forEach(function(b){
      var total=(bp[b].organic||[]).reduce(function(a,c){return a+c;},0)+(bp[b].ad_sales||[]).reduce(function(a,c){return a+c;},0);
      stackDs.push({label:b+' Paid', data:bp[b].ad_sales||[], color:bp[b].color, total:total});
    });
    stackDs.sort(function(a,b){return b.total-a.total;});
    html+=barChart(stackDs, aLabels, {w:940,h:170,barW:20,stacked:true});
  }
  // 6-column per month: Total | Paid | Organic | Ad$ | ROAS | TROAS
  html+='<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th>Brand</th>';
  aLabels.forEach(function(m,i){
    var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
    html+='<th style="text-align:right'+bg+'" colspan="6">'+m+'</th>';
  });
  html+='</tr><tr><th></th>';
  aLabels.forEach(function(m,i){
    var bg=i===aLastIdx&&isPartialA?';background:#f5f3ff':'';
    html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">Total</th>';
    html+='<th style="text-align:right;font-size:7px;color:#6366f1'+bg+'">Paid</th>';
    html+='<th style="text-align:right;font-size:7px;color:#10b981'+bg+'">Organic</th>';
    html+='<th style="text-align:right;font-size:7px;color:var(--r)'+bg+'">Ad $</th>';
    html+='<th style="text-align:right;font-size:7px;color:var(--muted)'+bg+'">ROAS</th>';
    html+='<th style="text-align:right;font-size:7px;color:#7c3aed'+bg+'">TROAS</th>';
  });
  html+='</tr></thead><tbody>';
  Object.keys(bp).forEach(function(b){
    var bd=bp[b];
    html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+bd.color+';margin-right:6px"></span><b>'+b+'</b></td>';
    for(var i=0;i<aLen;i++){
      var sales=bd.total_sales[i]||0, salesP=(bd.total_sales_proj||[])[i]||sales;
      var paid=bd.ad_sales[i]||0, paidP=(bd.ad_sales_proj||[])[i]||paid;
      var org=(bd.organic||[])[i]||0, orgP=(bd.organic_proj||[])[i]||org;
      var spend=bd.ad_spend[i]||0, spendP=(bd.ad_spend_proj||[])[i]||spend;
      var roas=spend>0?paid/spend:0;
      var troas=spend>0?sales/spend:0;
      var rc=roas>=3?'var(--g)':roas>=1.5?'var(--am)':spend>0?'var(--r)':'var(--muted)';
      var tc=troas>=5?'var(--g)':troas>=2?'#7c3aed':spend>0?'var(--am)':'var(--muted)';
      var isL=i===aLastIdx&&isPartialA;
      html+=fmCell(sales, salesP, isL, {fs:'9px'});
      html+=fmCell(paid, paidP, isL, {fs:'9px',color:'#6366f1'});
      html+=fmCell(org, orgP, isL, {fs:'9px',color:'var(--g)'});
      html+=fmCell(spend, spendP, isL, {fs:'9px',color:'var(--r)'});
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+rc+'">'+(spend>0?roas.toFixed(1)+'x':'-')+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:'+tc+'">'+(spend>0?troas.toFixed(1)+'x':'-')+'</td>';
    }
    html+='</tr>';
  });
  // TOTAL row
  html+='<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td>';
  for(var i=0;i<aLen;i++){
    var ts=0,tsP=0,tp=0,tpP=0,to=0,toP=0,tsp=0,tspP=0,tasales=0;
    Object.keys(bp).forEach(function(b){
      ts+=bp[b].total_sales[i]||0; tsP+=(bp[b].total_sales_proj||bp[b].total_sales)[i]||0;
      tp+=bp[b].ad_sales[i]||0; tpP+=(bp[b].ad_sales_proj||bp[b].ad_sales)[i]||0;
      to+=(bp[b].organic||[])[i]||0; toP+=(bp[b].organic_proj||bp[b].organic||[])[i]||0;
      tsp+=bp[b].ad_spend[i]||0; tspP+=(bp[b].ad_spend_proj||bp[b].ad_spend)[i]||0;
      tasales+=bp[b].ad_sales[i]||0;
    });
    var isL=i===aLastIdx&&isPartialA;
    html+=fmCell(ts, tsP, isL, {fs:'9px',bold:true});
    html+=fmCell(tp, tpP, isL, {fs:'9px',color:'#6366f1',bold:true});
    html+=fmCell(to, toP, isL, {fs:'9px',color:'var(--g)',bold:true});
    html+=fmCell(tsp, tspP, isL, {fs:'9px',color:'var(--r)',bold:true});
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700">'+(tsp>0?(tasales/tsp).toFixed(1)+'x':'-')+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:9px;font-weight:700;color:#7c3aed">'+(tsp>0?(ts/tsp).toFixed(1)+'x':'-')+'</td>';
  }
  // Organic % row
  html+='</tr><tr style="color:var(--dim);font-size:9px"><td><b>Organic %</b></td>';
  for(var i=0;i<aLen;i++){
    var ts=0,to=0;
    Object.keys(bp).forEach(function(b){ ts+=bp[b].total_sales[i]||0; to+=(bp[b].organic||[])[i]||0; });
    html+='<td colspan="6" style="text-align:center;font-family:var(--mono);font-size:9px;font-weight:700">'+(ts>0?(to/ts*100).toFixed(1):'0')+'%</td>';
  }
  html+='</tr></tbody></table></div></div></div>';
  return html;
}

    h+='<div style="width:'+cp+'%;background:#8b5cf6"></div>';

  return h;
}

// ── Time Grain Toggle (Weekly / Monthly) ────────────────────────────────────
function switchTimeGrain(grain, tabId, el){
  var F=(typeof FIN_DATA!=='undefined')?FIN_DATA:null;
  if(!F)return;
  document.querySelectorAll('#'+tabId+'-grain>div').forEach(function(t){ t.classList.remove('on'); });
  if(el) el.classList.add('on');
  var container=document.getElementById(tabId+'-content');
  if(!container) return;

  var W=F.weekly||{};
  var months=F.months||[];
  var pm=F.partial_month||{};
  var lastIdx=months.length-1;
  var isPartialLast=pm.is_partial && months[lastIdx]===pm.month;
  var mLabels=months.map(function(m,i){
    var parts=m.split('-');
    var label=parts[1]+'/'+parts[0].substring(2);
    if(i===lastIdx && isPartialLast) label+=' ('+pm.days_elapsed+'d)';
    return label;
  });

  if(grain==='daily'){
    var D=F.daily_review||{};
    var html=buildDailyAdReview(F);
    container.innerHTML=html;
  } else if(grain==='weekly'){
    var wLabels=W.week_labels||[];
    var html='';
    if(tabId==='rev'){
      html+=buildWeeklyTable(W.brand_revenue||{}, wLabels, 'Revenue by Brand', '2');
      html+=buildWeeklyTable(W.channel_revenue||{}, wLabels, 'Revenue by Channel', '3');
    } else if(tabId==='ads'){
      html+=buildWeeklyAdTable(F, wLabels);
      html+=buildPlatformAdSections(F, 'weekly');
      html+=buildWeeklyBrandPerfTable(F, wLabels);
      html+=buildCampaignDetail(F, 'weekly');
    } else if(tabId==='mrg'){
      html+=buildWeeklyWaterfall(F, wLabels);
      if(W.channel_pnl) html+=buildWeeklyChannelPnL(W, wLabels);
    }
    container.innerHTML=html;
  } else {
    // Monthly — rebuild original
    var html='';
    if(tabId==='rev'){
      html+=buildBrandTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildChannelTable(F, months, mLabels, lastIdx, isPartialLast, false);
    } else if(tabId==='ads'){
      html+=buildAdTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildPlatformAdSections(F, 'monthly');
      html+=buildBrandPerfTable(F, months, mLabels, lastIdx, isPartialLast, false);
      html+=buildCampaignDetail(F, 'monthly');
    } else if(tabId==='mrg'){
      if(F.pnl_polar) html+=buildPolarPnL(F.pnl_polar);
      else html+=buildWaterfall(F, months, mLabels, lastIdx, isPartialLast);
      if(F.pnl_polar && F.pnl_polar.channel_pnl) html+=buildChannelPnL(F.pnl_polar);
    }
    container.innerHTML=html;
  }
}

// ── Daily Ad Performance Review ──────────────────────────────────────────────
function buildDailyAdReview(F){
  var D=F.daily_review||{};
  var dates=D.dates||[];
  var labels=D.date_labels||[];
  var amzSales=D.amazon_sales||[];
  var AP=D.ad_performance||{};
  var ga4Sess=D.ga4_sessions||[];
  var amzSess=D.amz_sessions||[];
  var accSess=D.accumulated_sessions||[];
  if(!dates.length) return '<div class="card" style="padding:24px;color:var(--dim)">No daily data available.</div>';

  function delta(cur,prev){
    if(!prev||prev===0) return '';
    var pct=((cur-prev)/prev*100);
    var arrow=pct>=0?'▲':'▼';
    var color=pct>=0?'#16a34a':'#dc2626';
    return ' <span style="font-size:9px;color:'+color+'">'+arrow+Math.abs(pct).toFixed(1)+'%</span>';
  }
  function deltaSpend(cur,prev){
    if(!prev||prev===0) return '';
    var pct=((cur-prev)/prev*100);
    var arrow=pct>=0?'▲':'▼';
    return ' <span style="font-size:9px;color:#6b7280">'+arrow+Math.abs(pct).toFixed(1)+'%</span>';
  }

  var html='';

  // ── Section 1: Recent 7-day cards (newest first) ──
  html+='<div class="sec"><div class="sec-title"><div class="num">1</div> Daily Performance Review (Last 7 Days)</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">';

  var startIdx=Math.max(0, dates.length-7);
  for(var i=dates.length-1; i>=startIdx; i--){
    var d=dates[i];
    var prev=i>0?i-1:-1;
    // Format date nicely: "4/2/2026 (Wed)"
    var dt=new Date(d+'T12:00:00');
    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var dateLabel=(dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear()+' ('+dayNames[dt.getDay()]+')';

    var metaCvrSpend=(AP['Meta CVR']?AP['Meta CVR'].spend[i]:0)||0;
    var metaCvrClicks=(AP['Meta CVR']?AP['Meta CVR'].clicks[i]:0)||0;
    var metaTrfSpend=(AP['Meta Traffic']?AP['Meta Traffic'].spend[i]:0)||0;
    var metaTrfClicks=(AP['Meta Traffic']?AP['Meta Traffic'].clicks[i]:0)||0;
    var metaTotalSpend=metaCvrSpend+metaTrfSpend;
    var metaTotalClicks=metaCvrClicks+metaTrfClicks;

    var ppcSpend=(AP['Amazon Ads']?AP['Amazon Ads'].spend[i]:0)||0;
    var ppcClicks=(AP['Amazon Ads']?AP['Amazon Ads'].clicks[i]:0)||0;
    var ppcSales=(AP['Amazon Ads']?AP['Amazon Ads'].sales[i]:0)||0;
    var ppcRoas=ppcSpend>0?(ppcSales/ppcSpend).toFixed(2):'—';

    var gSpend=(AP['Google Ads']?AP['Google Ads'].spend[i]:0)||0;
    var gClicks=(AP['Google Ads']?AP['Google Ads'].clicks[i]:0)||0;

    // Previous day values for delta
    var pAmzSales=prev>=0?amzSales[prev]:0;
    var pMetaSpend=prev>=0?((AP['Meta CVR']?AP['Meta CVR'].spend[prev]:0)+(AP['Meta Traffic']?AP['Meta Traffic'].spend[prev]:0)):0;
    var pPpcSpend=prev>=0?(AP['Amazon Ads']?AP['Amazon Ads'].spend[prev]:0):0;
    var pPpcSales=prev>=0?(AP['Amazon Ads']?AP['Amazon Ads'].sales[prev]:0):0;

    html+='<div class="card" style="padding:16px">';
    html+='<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:6px">'+dateLabel+'</div>';

    // Amazon Total Sales
    html+='<div style="margin-bottom:8px">';
    html+='<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px">Amazon Total Sales</div>';
    html+='<div style="font-size:18px;font-weight:700;font-family:var(--mono);color:#f59e0b">'+$(amzSales[i]||0)+delta(amzSales[i],pAmzSales)+'</div>';
    html+='</div>';

    // Meta Ads
    html+='<div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px">';
    html+='<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Meta Ads</div>';
    html+='<div style="display:flex;gap:16px">';
    html+='<div><span style="font-size:9px;color:var(--dim)">Clicks</span><br><b style="font-family:var(--mono)">'+num(metaTotalClicks)+'</b></div>';
    html+='<div><span style="font-size:9px;color:var(--dim)">Spend</span><br><b style="font-family:var(--mono)">'+$(metaTotalSpend)+deltaSpend(metaTotalSpend,pMetaSpend)+'</b></div>';
    html+='</div>';
    html+='<div style="font-size:9px;color:var(--dim);margin-top:4px">CVR: '+num(metaCvrClicks)+' clicks / '+$(metaCvrSpend)+' · Traffic: '+num(metaTrfClicks)+' clicks / '+$(metaTrfSpend)+'</div>';
    html+='</div>';

    // Amazon PPC
    html+='<div style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px">';
    html+='<div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Amazon PPC</div>';
    html+='<div style="display:flex;gap:16px">';
    html+='<div><span style="font-size:9px;color:var(--dim)">Clicks</span><br><b style="font-family:var(--mono)">'+num(ppcClicks)+'</b></div>';
    html+='<div><span style="font-size:9px;color:var(--dim)">Spend</span><br><b style="font-family:var(--mono)">'+$(ppcSpend)+deltaSpend(ppcSpend,pPpcSpend)+'</b></div>';
    html+='<div><span style="font-size:9px;color:var(--dim)">Sales</span><br><b style="font-family:var(--mono)">'+$(ppcSales)+delta(ppcSales,pPpcSales)+'</b></div>';
    html+='<div><span style="font-size:9px;color:var(--dim)">ROAS</span><br><b style="font-family:var(--mono);color:'+(parseFloat(ppcRoas)>=3?'#16a34a':'#f59e0b')+'">'+ppcRoas+'x</b></div>';
    html+='</div>';
    html+='</div>';

    // Google Ads (compact)
    if(gSpend>0){
      html+='<div style="margin-bottom:8px;font-size:10px;color:var(--dim)">Google Ads: '+num(gClicks)+' clicks / '+$(gSpend)+'</div>';
    }

    // Sessions
    html+='<div style="padding:6px 8px;background:#f0fdf4;border-radius:6px;font-size:11px">';
    html+='<span style="color:var(--dim)">Sessions:</span> <b>'+num((ga4Sess[i]||0)+(amzSess[i]||0))+'</b>';
    html+=' <span style="color:var(--dim);margin-left:8px">Accumulated:</span> <b>'+num(accSess[i]||0)+'</b>';
    html+='</div>';

    html+='</div>'; // close card
  }
  html+='</div></div>'; // close grid + sec

  // ── Section 2: 30-day table ──
  html+='<div class="sec"><div class="sec-title"><div class="num">2</div> Daily Performance (30 Days)</div>';
  html+='<div class="card"><div style="overflow-x:auto"><table>';
  html+='<thead><tr>';
  html+='<th>Date</th><th style="text-align:right">Amz Sales</th>';
  html+='<th style="text-align:right">Meta Clicks</th><th style="text-align:right">Meta Spend</th>';
  html+='<th style="text-align:right">PPC Clicks</th><th style="text-align:right">PPC Spend</th>';
  html+='<th style="text-align:right">PPC Sales</th><th style="text-align:right">ROAS</th>';
  html+='<th style="text-align:right">Google $</th>';
  html+='<th style="text-align:right">Sessions</th>';
  html+='</tr></thead><tbody>';

  for(var i=dates.length-1; i>=0; i--){
    var metaC=((AP['Meta CVR']?AP['Meta CVR'].clicks[i]:0)||0)+((AP['Meta Traffic']?AP['Meta Traffic'].clicks[i]:0)||0);
    var metaS=((AP['Meta CVR']?AP['Meta CVR'].spend[i]:0)||0)+((AP['Meta Traffic']?AP['Meta Traffic'].spend[i]:0)||0);
    var pC=(AP['Amazon Ads']?AP['Amazon Ads'].clicks[i]:0)||0;
    var pS=(AP['Amazon Ads']?AP['Amazon Ads'].spend[i]:0)||0;
    var pSa=(AP['Amazon Ads']?AP['Amazon Ads'].sales[i]:0)||0;
    var roas=pS>0?(pSa/pS).toFixed(2):'—';
    var gS=(AP['Google Ads']?AP['Google Ads'].spend[i]:0)||0;
    var sess=(ga4Sess[i]||0)+(amzSess[i]||0);
    var isWeekend=new Date(dates[i]+'T12:00:00').getDay()%6===0;
    var rowBg=isWeekend?'background:rgba(99,102,241,0.04)':'';
    html+='<tr style="'+rowBg+'">';
    html+='<td style="font-size:10px;white-space:nowrap">'+labels[i]+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(amzSales[i]||0)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+num(metaC)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(metaS)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+num(pC)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(pS)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(pSa)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px;color:'+(parseFloat(roas)>=3?'#16a34a':'#f59e0b')+'">'+roas+'x</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+$(gS)+'</td>';
    html+='<td style="text-align:right;font-family:var(--mono);font-size:10px">'+num(sess)+'</td>';
    html+='</tr>';
  }

  // Totals row
  var tAmz=0,tMC=0,tMS=0,tPC=0,tPS=0,tPSa=0,tGS=0,tSess=0;
  for(var i=0;i<dates.length;i++){
    tAmz+=amzSales[i]||0;
    tMC+=((AP['Meta CVR']?AP['Meta CVR'].clicks[i]:0)||0)+((AP['Meta Traffic']?AP['Meta Traffic'].clicks[i]:0)||0);
    tMS+=((AP['Meta CVR']?AP['Meta CVR'].spend[i]:0)||0)+((AP['Meta Traffic']?AP['Meta Traffic'].spend[i]:0)||0);
    tPC+=(AP['Amazon Ads']?AP['Amazon Ads'].clicks[i]:0)||0;
    tPS+=(AP['Amazon Ads']?AP['Amazon Ads'].spend[i]:0)||0;
    tPSa+=(AP['Amazon Ads']?AP['Amazon Ads'].sales[i]:0)||0;
    tGS+=(AP['Google Ads']?AP['Google Ads'].spend[i]:0)||0;
