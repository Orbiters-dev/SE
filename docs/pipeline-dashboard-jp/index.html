<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipeline CRM — Japan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--dim:#64748b;--a:#8b5cf6;--abg:#f5f3ff;--g:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:13px}
.ctr{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
.hero{text-align:center;margin-bottom:20px}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.5px}.hero h1 span{background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--dim);font-size:12px;margin-top:2px}
.hero .meta{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2px 10px;font-size:10px;color:var(--dim);display:inline-flex;align-items:center;gap:4px}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 3px var(--g)}
.nav-bar{display:flex;justify-content:center;gap:0;margin-bottom:20px}
.nav-bar>div{display:inline-flex;border:2px solid var(--border);border-radius:10px;overflow:hidden;font-size:12px;font-weight:700}
.nav-bar a{padding:8px 16px;color:var(--dim);text-decoration:none;cursor:pointer;transition:.15s;display:flex;align-items:center}
.nav-bar a:hover{background:var(--abg);color:var(--a)}
.nav-bar .active{background:var(--a);color:#fff;cursor:default}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.card h3{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.coming-soon{text-align:center;padding:80px 20px}
.coming-soon h2{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
.coming-soon p{color:var(--dim);font-size:13px;max-width:400px;margin:0 auto}
.coming-soon .icon{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div class="ctr">
  <!-- Top-level navigation -->
  <div class="nav-bar" style="margin-bottom:16px">
    <div>
      <a href="../ppc-dashboard/" title="Amazon PPC Intelligence">Amazon PPC</a>
      <a href="../content-dashboard/" title="Content Intelligence">Content Intelligence</a>
      <a class="active">Pipeline CRM</a>
      <a href="../financial-dashboard/" title="Financial KPIs">Financial KPIs</a>
    </div>
  </div>
  <div class="hero">
    <h1 style="display:flex;align-items:center;justify-content:center;gap:12px">&#x1F4CB; Pipeline <span>CRM</span>
      <div style="display:inline-flex;border:2px solid #e2e8f0;border-radius:8px;overflow:hidden;font-size:12px;font-weight:700;vertical-align:middle;margin-left:4px">
        <a href="../pipeline-dashboard/" style="padding:4px 14px;color:#94a3b8;text-decoration:none;cursor:pointer;transition:.15s;line-height:1.4" onmouseover="this.style.background='#eef2ff';this.style.color='#6366f1'" onmouseout="this.style.background='';this.style.color='#94a3b8'">US</a>
        <div style="padding:4px 14px;background:#ef4444;color:#fff;cursor:default;line-height:1.4">JP</div>
      </div>
    </h1>
    <div class="sub">Grosmimi Japan &#8212; Influencer Pipeline (Japan Market)</div>
    <div class="meta">
      <span class="pill"><span class="dot" style="background:#f59e0b;box-shadow:0 0 3px #f59e0b"></span>Setting Up</span>
      <span class="pill">n8n Workflow</span>
    </div>
  </div>

  <div class="coming-soon">
    <div class="icon">&#x1F1EF;&#x1F1F5;</div>
    <h2>Japan Pipeline — Coming Soon</h2>
    <p>Grosmimi Japan 인플루언서 파이프라인 구축 중. n8n 워크플로우 연동 후 활성화 예정.</p>
  </div>
</div>
</body>
</html>
