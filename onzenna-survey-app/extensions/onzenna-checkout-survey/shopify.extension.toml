# Onzenna Core Signup - Checkout UI Extension
# Shows Q4-Q7 (journey stage, baby info, other children, creator interest)
# after the contact info step in checkout.

api_version = "2024-10"

[[extensions]]
name = "Onzenna - Tell Us About You"
handle = "onzenna-checkout-survey"
type = "ui_extension"

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.contact.render-after"

[extensions.capabilities]
api_access = true
network_access = true

[extensions.settings]
  [[extensions.settings.fields]]
  key = "survey_title"
  type = "single_line_text_field"
  name = "Survey Section Title"
  description = "Title shown above the survey questions"

# Metafield access declarations - needed for reading/writing customer & order metafields
[[extensions.metafields]]
namespace = "onzenna_survey"
key = "journey_stage"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "baby_birth_month"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "has_other_children"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "other_children_detail"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "is_creator"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "signup_completed_at"
