# Onzenna Creator Branch + Loyalty CTA - Thank-You Page Extension
# Shows creator profile questions if customer indicated creator interest (Q7=Yes)
# Shows loyalty survey CTA for all customers

api_version = "2024-10"

[[extensions]]
name = "Onzenna - Creator Profile & Loyalty"
handle = "onzenna-thankyou-survey"
type = "ui_extension"

[[extensions.targeting]]
module = "./src/ThankYou.jsx"
target = "purchase.thank-you.block.render"

[extensions.capabilities]
api_access = true
network_access = true

[extensions.settings]
  [[extensions.settings.fields]]
  key = "n8n_webhook_url"
  type = "single_line_text_field"
  name = "n8n Webhook URL"
  description = "Webhook URL for creator survey submissions"

  [[extensions.settings.fields]]
  key = "loyalty_page_url"
  type = "single_line_text_field"
  name = "Loyalty Survey Page URL"
  description = "URL of the loyalty survey page (e.g., /pages/loyalty-survey)"

[[extensions.metafields]]
namespace = "onzenna_survey"
key = "is_creator"

[[extensions.metafields]]
namespace = "onzenna_creator"
key = "creator_completed_at"
